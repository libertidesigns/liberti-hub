          {num:"7",text:"leadů týdně",color:"#3a8aff"},
          {num:null,text:"Týdenní zápis nejpozději v neděli v 15:00",color:null,bold:true},
          {num:null,text:"Volat vždy v jeden smluvený den",color:null,bold:true},
          {num:null,text:"Případné doplňující hovory napsat do tabulky Hovory",color:null},
        ].map((item,i)=><div key={i} style={{...T.m,fontSize:FS.b,color:C.ivory,lineHeight:1.6}}>
          {item.num&&<span style={{color:item.color,fontWeight:700,marginRight:6}}>{item.num}</span>}
          <span style={{fontWeight:item.bold?700:400,color:item.bold?C.ivory:C.hi}}>{item.text}</span>
        </div>)}
      </div>}
    </Card>

    {/* KPI */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}} className="grid-kpi">
      {[
        {l:"Leady tento týden",v:leadsThisWeek,c:"#3aaa5a",target:7},
        {l:"Hovory tento týden",v:callsThisWeek,c:"#5a8aff"},
        {l:"Leady celkem",v:(leads||[]).length,c:C.ivory},
        {l:"Hovory celkem",v:(calls||[]).length,c:C.ivory},
      ].map(k=><Card key={k.l} sx={{padding:"12px 16px"}}>
        <Lbl c={k.l} s={{marginBottom:4}}/>
        <div style={{display:"flex",alignItems:"baseline",gap:6}}>
          <div style={{...T.t,fontSize:FS.h,fontWeight:300,color:k.c,lineHeight:1}}>{k.v}</div>
          {k.target&&<div style={{...T.m,fontSize:FS.s,color:C.dim}}>/ {k.target}</div>}
        </div>
        {k.target&&<div style={{height:3,background:C.s2,borderRadius:2,marginTop:8}}>
          <div style={{height:"100%",width:Math.min((k.v/k.target)*100,100)+"%",background:k.v>=k.target?"#3aaa5a":C.merlot,borderRadius:2,transition:"width .4s"}}/>
        </div>}
      </Card>)}
    </div>

    {/* Lead form */}
    {showLeadForm&&leadF&&<Card sx={{padding:18,marginBottom:14,borderColor:C.mBorder,animation:"scaleIn .22s cubic-bezier(.22,1,.36,1)"}}>
      <SH c={editLeadId?"Upravit lead":"Nový lead"}/>
      <div className="grid-2-inp">
        <Inp lbl="Jméno / Firma (Lead)" val={leadF.name} onChange={ul("name")} ph="Jan Novák, Firma s.r.o.…"/>
        <Inp lbl="Datum" type="date" val={leadF.date} onChange={ul("date")}/>
        <Inp lbl="Telefon" val={leadF.phone} onChange={ul("phone")} ph="+420 xxx xxx xxx"/>
        <Inp lbl="E-mail" type="email" val={leadF.email} onChange={ul("email")} ph="kontakt@firma.cz"/>
        <Inp lbl="Převzal" val={leadF.takenBy} onChange={ul("takenBy")} opts={[{v:"",l:"— vyberte osobu —"},...people.map(p=>({v:p.id,l:p.name}))]}/>
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Poznámky" val={leadF.notes} onChange={ul("notes")} ph="Poznámky k leadu…" ml rows={2}/></div>
      </div>
      <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
        <div style={{...T.m,fontSize:FS.s,color:C.dim,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>Research</div>
        <div className="grid-2-inp">
          <Inp lbl="Instagram" val={leadF.instagram} onChange={ul("instagram")} ph="@profil nebo URL"/>
          <Inp lbl="Webové stránky" val={leadF.web} onChange={ul("web")} ph="www.firma.cz"/>
          <Inp lbl="Facebook" val={leadF.facebook} onChange={ul("facebook")} ph="facebook.com/firma"/>
          <Inp lbl="Jiný marketing" val={leadF.otherMarketing} onChange={ul("otherMarketing")} ph="TikTok, LinkedIn, YouTube…"/>
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <Btn ch="Uložit lead" onClick={saveLead}/>
        <Btn ch="Zrušit" onClick={()=>{setShowLeadForm(false);setLeadF(null);setEditLeadId(null);}} v="g"/>
      </div>
    </Card>}

    {/* Call form */}
    {showCallForm&&callF&&<Card sx={{padding:18,marginBottom:14,borderColor:C.mBorder,animation:"scaleIn .22s cubic-bezier(.22,1,.36,1)"}}>
      <SH c={editCallId?"Upravit hovor":"Nový hovor"}/>
      <div className="grid-2-inp">
        <Inp lbl="Jméno kontaktu" val={callF.personName} onChange={uc("personName")} ph="Jan Novák…"/>
        <Inp lbl="Telefon" val={callF.phone} onChange={uc("phone")} ph="+420 xxx xxx xxx"/>
        <Inp lbl="Datum a čas" type="datetime-local" val={callF.datetime} onChange={uc("datetime")}/>
        <Inp lbl="Kdo volal" val={callF.calledBy} onChange={uc("calledBy")} opts={[{v:"",l:"— vyberte osobu —"},...people.map(p=>({v:p.id,l:p.name}))]}/>
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Poznámky" val={callF.notes} onChange={uc("notes")} ph="Průběh hovoru, výsledek…" ml rows={2}/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:14}}>
        <Btn ch="Uložit hovor" onClick={saveCall}/>
        <Btn ch="Zrušit" onClick={()=>{setShowCallForm(false);setCallF(null);setEditCallId(null);}} v="g"/>
      </div>
    </Card>}

    {/* Tabulka Leady */}
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <SH c={"Zápis leadů ("+(leads||[]).length+")"}/>
      </div>
      {(leads||[]).length===0
        ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"32px 0",textAlign:"center",...T.m,fontSize:FS.b,color:C.dim}}>Žádné leady — zapište první lead tlačítkem výše</div>
        :<Card>
          <div style={{display:"grid",gridTemplateColumns:"1.8fr 0.9fr 0.9fr 1fr 1fr 1.5fr auto",gap:0}}>
            {["Lead","Datum","Telefon","E-mail","Převzal","Poznámky",""].map(h=><div key={h} style={{...T.m,fontSize:FS.s,color:C.dim,padding:"9px 16px",borderBottom:`1px solid ${C.border}`,letterSpacing:"0.1em",textTransform:"uppercase"}}>{h}</div>)}
            {(leads||[]).map((l,i)=>{
              const person=people.find(p=>p.id===l.takenBy);
              const isLast=i===(leads||[]).length-1;
              return [
                <div key={l.id+"n"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.ivory,fontWeight:500}}>{l.name}</div>,
                <div key={l.id+"d"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.hi}}>{fmtD(l.date)}</div>,
                <div key={l.id+"ph"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.dim}}>{l.phone||"—"}</div>,
                <div key={l.id+"em"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.dim}}>{l.email||"—"}</div>,
                <div key={l.id+"t"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`}}>
                  {person&&<div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:person.color}}/>
                    <span style={{...T.m,fontSize:FS.b,color:C.ivory}}>{person.name}</span>
                  </div>}
                </div>,
                <div key={l.id+"nn"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.dim}}>{l.notes||"—"}</div>,
                <div key={l.id+"a"} style={{padding:"10px 14px",borderBottom:isLast?"none":`1px solid ${C.border}`,display:"flex",gap:5,alignItems:"center"}}>
                  <Btn ch="✎" onClick={()=>editLead(l)} v="g" sx={{padding:"4px 8px"}}/>
                  <Btn ch="×" onClick={()=>delLead(l.id)} v="d" sx={{padding:"4px 8px"}}/>
                </div>,
              ];
            })}
          </div>
        </Card>}
    </div>

    {/* Tabulka Hovory */}
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <SH c={"Hovory ("+(calls||[]).length+")"}/>
      </div>
      {(calls||[]).length===0
        ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"32px 0",textAlign:"center",...T.m,fontSize:FS.b,color:C.dim}}>Žádné hovory — zapište první hovor tlačítkem výše</div>
        :<Card>
          <div style={{display:"grid",gridTemplateColumns:"1.5fr 1.5fr 1fr 1fr 2fr auto",gap:0}}>
            {["Datum a čas","Jméno","Telefon","Kdo volal","Poznámky",""].map(h=><div key={h} style={{...T.m,fontSize:FS.s,color:C.dim,padding:"9px 16px",borderBottom:`1px solid ${C.border}`,letterSpacing:"0.1em",textTransform:"uppercase"}}>{h}</div>)}
            {(calls||[]).map((c,i)=>{
              const person=people.find(p=>p.id===c.calledBy);
              const isLast=i===(calls||[]).length-1;
              const dtStr=c.datetime?c.datetime.replace("T"," ").slice(0,16):fmtD(c.date||"");
              return [
                <div key={c.id+"dt"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.hi}}>{dtStr}</div>,
                <div key={c.id+"n"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.ivory,fontWeight:500}}>{c.personName}</div>,
                <div key={c.id+"ph"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.dim}}>{c.phone||"—"}</div>,
                <div key={c.id+"cb"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`}}>
                  {person&&<div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:person.color}}/>
                    <span style={{...T.m,fontSize:FS.b,color:C.ivory}}>{person.name}</span>
                  </div>}
                </div>,
                <div key={c.id+"nn"} style={{padding:"12px 16px",borderBottom:isLast?"none":`1px solid ${C.border}`,...T.m,fontSize:FS.b,color:C.dim}}>{c.notes||"—"}</div>,
                <div key={c.id+"a"} style={{padding:"10px 14px",borderBottom:isLast?"none":`1px solid ${C.border}`,display:"flex",gap:5,alignItems:"center"}}>
                  <Btn ch="✎" onClick={()=>editCall(c)} v="g" sx={{padding:"4px 8px"}}/>
                  <Btn ch="×" onClick={()=>delCall(c.id)} v="d" sx={{padding:"4px 8px"}}/>
                </div>,
              ];
            })}
          </div>
        </Card>}
    </div>

  </div>;
}


function FavPlacesModal({settings,onSave,onSelect,onClose}){
  const fps=settings.favoritePlaces||[];
  const [newPlace,setNewPlace]=useState({name:"",address:""});
  const addFav=()=>{
    if(!newPlace.name)return;
    onSave({...settings,favoritePlaces:[...fps,{id:uid(),...newPlace}]});
    setNewPlace({name:"",address:""});
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <Card sx={{width:"100%",maxWidth:480,padding:20,animation:"scaleIn .2s cubic-bezier(.22,1,.36,1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <SH c="Oblíbená místa"/>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
      </div>
      {fps.length===0&&<div style={{...T.m,fontSize:FS.b,color:C.dim,marginBottom:14}}>Zatím žádná oblíbená místa</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14,maxHeight:220,overflowY:"auto"}}>
        {fps.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.s2,borderRadius:4,border:`1px solid ${C.border}`,cursor:"pointer"}}
          onClick={()=>{onSelect(p);onClose();}}>
          <div style={{flex:1}}>
            <div style={{...T.m,fontSize:FS.b,color:C.ivory,fontWeight:500}}>{p.name}</div>
            {p.address&&<div style={{...T.m,fontSize:FS.s,color:C.dim}}>{p.address}</div>}
          </div>
          <Btn ch="Vybrat" onClick={e=>{e.stopPropagation();onSelect(p);onClose();}} sx={{padding:"4px 10px"}}/>
          <Btn ch="×" onClick={e=>{e.stopPropagation();onSave({...settings,favoritePlaces:fps.filter(x=>x.id!==p.id)});}} v="d" sx={{padding:"4px 8px"}}/>
        </div>)}
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        <div style={{...T.m,fontSize:FS.s,color:C.dim,marginBottom:8}}>Přidat nové místo</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <Inp lbl="Název" val={newPlace.name} onChange={v=>setNewPlace(p=>({...p,name:v}))} ph="Kavárna Liberti, Kancelář…"/>
          <Inp lbl="Adresa" val={newPlace.address} onChange={v=>setNewPlace(p=>({...p,address:v}))} ph="Ulice, Město"/>
          <Btn ch="Přidat oblíbené místo" onClick={addFav}/>
        </div>
      </div>
    </Card>
  </div>;
}

function MeetingsView({meetings,setMeetings,clients,settings,onSaveSettings,confirmFn}){
  const people=(settings.people||[]).filter(p=>p.active!==false);
  const blank={id:uid(),clientId:"",date:toDay(),time:"10:00",place:"",placeAddress:"",participants:[],checklist:[],notes:""};
  const [ed,setEd]=useState(null);
  const [f,setF]=useState(null);
  const [q,setQ]=useState("");
  const [showFav,setShowFav]=useState(false);
  const [newCheck,setNewCheck]=useState("");
  const u=k=>v=>setF(p=>({...p,[k]:v}));
  const now=toDay();
  const inDays=(d,n)=>{const t=new Date(now);t.setDate(t.getDate()+n);return d<=t.toISOString().slice(0,10);};

  const sorted=[...(meetings||[])].sort((a,b)=>(a.date+a.time)<(b.date+b.time)?-1:1);
  const searched=q?sorted.filter(m=>{
    const cl=clients.find(c=>c.id===m.clientId);
    return (cl?.name||cl?.company||"").toLowerCase().includes(q.toLowerCase())||
      (m.place||"").toLowerCase().includes(q.toLowerCase())||
      (m.notes||"").toLowerCase().includes(q.toLowerCase());
  }):sorted;

  const groups=[
    {id:"today",l:"Dnes",color:"#3aaa5a",items:searched.filter(m=>m.date===now)},
    {id:"week",l:"Následujících 7 dní",color:"#e0c040",items:searched.filter(m=>m.date>now&&inDays(m.date,7))},
    {id:"future",l:"Nadcházející",color:"#5a8aff",items:searched.filter(m=>m.date>now&&!inDays(m.date,7))},
    {id:"past",l:"Proběhlé",color:C.merlot,items:[...searched.filter(m=>m.date<now)].reverse()},
  ];
  const [collapsed,setCollapsed]=useState({past:true});
  const toggleCollapse=id=>setCollapsed(p=>({...p,[id]:!p[id]}));

  const save=()=>{
    if(!f||!f.date)return;
    const next=ed==="new"?[{...f,id:uid()},...(meetings||[])]:(meetings||[]).map(m=>m.id===ed?{...f}:m);
    setMeetings(next);setEd(null);setF(null);
  };
  const del=async id=>{if(await confirmFn("Smazat tuto schůzku?"))setMeetings((meetings||[]).filter(m=>m.id!==id));};
  const toggleCheck=(meetId,checkId)=>{
    setMeetings((meetings||[]).map(m=>m.id!==meetId?m:{...m,checklist:(m.checklist||[]).map(c=>c.id===checkId?{...c,done:!c.done}:c)}));
  };
  const toggleParticipant=pid=>{
    const arr=f.participants||[];
    setF(p=>({...p,participants:arr.includes(pid)?arr.filter(x=>x!==pid):[...arr,pid]}));
  };

  const MeetingCard=({m})=>{
    const cl=clients.find(c=>c.id===m.clientId);
    const clName=cl?.company||cl?.name||"";
    const mPeople=people.filter(p=>(m.participants||[]).includes(p.id));
    const doneCount=(m.checklist||[]).filter(c=>c.done).length;
    const totalCheck=(m.checklist||[]).length;
    const dayDiff=Math.round((new Date(m.date)-new Date(now))/(1000*60*60*24));
    const statusColor=m.date===now?"#3aaa5a":dayDiff>0&&dayDiff<=7?"#e0c040":dayDiff>7?"#5a8aff":C.merlot;
    return <Card sx={{padding:"14px 18px",borderLeft:`3px solid ${statusColor}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
            <span style={{...T.t,fontSize:FS.h,fontWeight:300,color:C.ivory}}>{clName||"Schůzka"}</span>
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:mPeople.length?8:0}}>
            <span style={{...T.m,fontSize:FS.b,color:statusColor}}>{fmtD(m.date)}</span>
            <span style={{...T.m,fontSize:FS.b,color:C.hi}}>{m.time||"—"}</span>
            {(m.place||m.placeAddress)&&<span style={{...T.m,fontSize:FS.b,color:C.hi}}>{m.place||(m.placeAddress&&m.placeAddress.split(",")[0])||""}</span>}
          </div>
          {mPeople.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {mPeople.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:5,padding:"2px 9px",borderRadius:12,background:p.color+"22",border:`1px solid ${p.color}44`}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:p.color}}/>
              <span style={{...T.m,fontSize:FS.s,color:C.ivory}}>{p.name}</span>
            </div>)}
          </div>}
          {m.notes&&<div style={{...T.m,fontSize:FS.s,color:C.dim,marginTop:6}}>{m.notes}</div>}
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,flexShrink:0}}>
          <div style={{display:"flex",gap:6}}>
            <Btn ch="Upravit" onClick={()=>{setF({...m,checklist:m.checklist||[]});setEd(m.id);setNewCheck("");}} v="g" sx={{padding:"5px 10px"}}/>
            <Btn ch="Smazat" onClick={()=>del(m.id)} v="d" sx={{padding:"5px 10px"}}/>
          </div>
          {totalCheck>0&&<span style={{...T.m,fontSize:FS.s,color:doneCount===totalCheck?"#3aaa5a":C.dim}}>{doneCount}/{totalCheck} splněno</span>}
        </div>
      </div>
      {totalCheck>0&&<div style={{marginTop:12,borderTop:`1px solid ${C.border}`,paddingTop:10,display:"flex",flexDirection:"column",gap:5}}>
        {(m.checklist||[]).map(item=><div key={item.id} onClick={()=>toggleCheck(m.id,item.id)}
          style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"3px 0"}}>
          <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${item.done?C.merlot:C.border}`,background:item.done?C.merlot+"33":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
            {item.done&&<span style={{color:C.merlot,fontSize:10}}>✓</span>}
          </div>
          <span style={{...T.m,fontSize:FS.b,color:item.done?C.dim:C.ivory,textDecoration:item.done?"line-through":"none"}}>{item.text}</span>
        </div>)}
      </div>}
    </Card>;
  };

  return <div className="anim-fadein">
    {showFav&&onSaveSettings&&<FavPlacesModal settings={settings} onSave={onSaveSettings}
      onSelect={p=>{if(f)setF(prev=>({...prev,place:p.name,placeAddress:p.address||""}));}}
      onClose={()=>setShowFav(false)}/>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div>
        <div style={{...T.t,fontSize:FS.h,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>MEETINGS</div>
        <div style={{...T.m,fontSize:FS.s,color:C.dim,marginTop:2}}>Plánování schůzek</div>
      </div>
      <Btn ch="+ Nová schůzka" onClick={()=>{setF({...blank,id:uid()});setEd("new");setNewCheck("");}}/>
    </div>

    <div style={{marginBottom:16}}><SearchBar value={q} onChange={setQ} ph="Hledat schůzky…"/></div>

    {ed&&f&&<Card sx={{padding:20,marginBottom:16,borderColor:C.mBorder,animation:"scaleIn .22s cubic-bezier(.22,1,.36,1)"}}>
      <SH c={ed==="new"?"Nová schůzka":"Upravit schůzku"}/>
      <div className="grid-2-inp" style={{marginBottom:14}}>
        <Inp lbl="Klient" val={f.clientId} onChange={u("clientId")}
          opts={[{v:"",l:"— vyberte klienta —"},...clients.map(c=>({v:c.id,l:c.company||c.name}))]}/>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <div style={{flex:1}}><Inp lbl="Místo setkání" val={f.place} onChange={u("place")} ph="Kavárna, kancelář, online…"/></div>
          <Btn ch="Oblíbená" onClick={()=>setShowFav(true)} v="g" sx={{padding:"8px 10px",flexShrink:0,marginBottom:0}}/>
        </div>
        <Inp lbl="Adresa" val={f.placeAddress||""} onChange={u("placeAddress")} ph="Přesná adresa (volitelné)"/>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><Inp lbl="Datum" type="date" val={f.date} onChange={u("date")}/></div>
          <div style={{flex:1}}><Inp lbl="Čas" type="time" val={f.time} onChange={u("time")}/></div>
        </div>
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Poznámky / Agenda" val={f.notes||""} onChange={u("notes")} ph="Cíl schůzky, témata…" ml rows={2}/></div>
      </div>

function RolesTab({settings,onSave,confirmFn}){
  const [roleF,setRoleF]=useState(null);
  const [roleEd,setRoleEd]=useState(null);
  const [showCode,setShowCode]=useState({});
  const roles=settings.systemRoles||[
    {v:"admin",l:"Admin",code:"1473695",isAdmin:true,description:"Plný přístup"},
    {v:"employee",l:"Zaměstnanec",code:"1793812",isAdmin:false,description:""},
  ];

  const saveRole=()=>{
    if(!roleF||!roleF.l)return;
    let next;
    if(roleEd){
      next=roles.map(r=>r.v===roleEd?{...r,...roleF}:r);
    } else {
      const newRole={v:"role_"+uid(),l:roleF.l,code:roleF.code||"",isAdmin:false,description:roleF.description||""};
      next=[...roles,newRole];
    }
    onSave({...settings,systemRoles:next});
    // Aktualizuj cache
    localStorage.setItem("liberti_roles",JSON.stringify(next));
    setRoleF(null);setRoleEd(null);
  };

  const delRole=v=>{
    if(v==="admin"){confirmFn("Admin roli nelze smazat.");return;}
    confirmFn("Smazat roli "+roles.find(r=>r.v===v)?.l+"?",()=>{
      const next=roles.filter(r=>r.v!==v);
      onSave({...settings,systemRoles:next});
      localStorage.setItem("liberti_roles",JSON.stringify(next));
    });
  };

  const startEdit=r=>{setRoleF({l:r.l,code:r.code||"",description:r.description||"",isAdmin:r.isAdmin});setRoleEd(r.v);};

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <SH c={"Systémové role ("+roles.length+")"}/>
      <Btn ch="+ Nová role" onClick={()=>{setRoleF({l:"",code:"",description:"",isAdmin:false});setRoleEd(null);}} v="g" sx={{padding:"5px 12px"}}/>
    </div>
    <div style={{...T.m,fontSize:FS.s,color:C.dim,marginBottom:12,lineHeight:1.7}}>
      Každá role má vlastní přístupový kód. Admin role má vždy plný přístup.
      Oprávnění stránek nastavíš v záložce Viditelnost.
    </div>

    {roleF&&!roleEd&&<Card sx={{padding:16,marginBottom:12,borderColor:C.mBorder,animation:"scaleIn .22s cubic-bezier(.22,1,.36,1)"}}>
      <SH c="Nová role"/>
      <div className="grid-2-inp">
        <Inp lbl="Název role" val={roleF.l} onChange={v=>setRoleF(p=>({...p,l:v}))} ph="Designer, Sales…"/>
        <Inp lbl="Přístupový kód (7 číslic)" val={roleF.code} onChange={v=>setRoleF(p=>({...p,code:v.replace(/\D/g,"").slice(0,7)}))} ph="1234567" type="text"/>
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Popis" val={roleF.description||""} onChange={v=>setRoleF(p=>({...p,description:v}))} ph="Krátký popis role…"/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:12}}>
        <Btn ch="Vytvořit roli" onClick={saveRole}/>
        <Btn ch="Zrušit" onClick={()=>setRoleF(null)} v="g"/>
      </div>
    </Card>}

    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {roles.map(r=><Card key={r.v} sx={{padding:"14px 18px"}}>
        {roleEd===r.v&&roleF
          ?<div>
            <div className="grid-2-inp">
              <Inp lbl="Název role" val={roleF.l} onChange={v=>setRoleF(p=>({...p,l:v}))}/>
              <div>
                <Lbl c="Přístupový kód"/>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input value={showCode[r.v]?roleF.code:"•".repeat(roleF.code?.length||0)}
                    onChange={e=>{if(showCode[r.v])setRoleF(p=>({...p,code:e.target.value.replace(/\D/g,"").slice(0,7)}));}}
                    placeholder="1234567"
                    style={{flex:1,background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"11px 12px",color:C.ivory,...T.m,fontSize:FS.b,outline:"none"}}/>
                  <button onClick={()=>setShowCode(s=>({...s,[r.v]:!s[r.v]}))} style={{...T.m,fontSize:FS.s,background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 10px",cursor:"pointer",color:C.dim,flexShrink:0}}>{showCode[r.v]?"Skrýt":"Zobrazit"}</button>
                </div>
              </div>
              <div style={{gridColumn:"1/-1"}}><Inp lbl="Popis" val={roleF.description||""} onChange={v=>setRoleF(p=>({...p,description:v}))}/></div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <Btn ch="Uložit" onClick={saveRole}/>
              <Btn ch="Zrušit" onClick={()=>{setRoleF(null);setRoleEd(null);}} v="g"/>
            </div>
          </div>
          :<div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                <span style={{...T.m,fontSize:FS.b,color:C.ivory,fontWeight:500}}>{r.l}</span>
                {r.isAdmin&&<span style={{...T.m,fontSize:FS.s,color:"#5a8aff",background:"#5a8aff22",padding:"1px 7px",borderRadius:10}}>Admin</span>}
              </div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                {r.description&&<span style={{...T.m,fontSize:FS.s,color:C.dim}}>{r.description}</span>}
                <span style={{...T.m,fontSize:FS.s,color:C.dim}}>Kód: {showCode[r.v]?r.code||"—":"•••••••"}</span>
                <button onClick={()=>setShowCode(s=>({...s,[r.v]:!s[r.v]}))} style={{...T.m,fontSize:FS.s,background:"transparent",border:"none",cursor:"pointer",color:C.merlot,padding:0}}>{showCode[r.v]?"skrýt":"zobrazit kód"}</button>
              </div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <Btn ch="Upravit" onClick={()=>startEdit(r)} v="g" sx={{padding:"5px 10px"}}/>
              {!r.isAdmin&&<Btn ch="Smazat" onClick={()=>delRole(r.v)} v="d" sx={{padding:"5px 10px"}}/>}
            </div>
          </div>}
      </Card>)}
    </div>
  </div>;
}


function TeamView({settings,onSave,timeEntries,benefitCategories,teams,setTeams,confirmFn}){
  const [people,setPeople]=useState(settings.people||[]);
  const [ed,setEd]=useState(null);const [f,setF]=useState(null);
  const [teamEd,setTeamEd]=useState(null);const [teamF,setTeamF]=useState(null);
  const [activeTab,setActiveTab]=useState("members"); // "members" | "teams"
  const [dragPersonId,setDragPersonId]=useState(null);
  const [openAddTeamId,setOpenAddTeamId]=useState(null);
  const u=k=>v=>setF(p=>({...p,[k]:v}));
  // All benefit program IDs from all categories
  const allProgs=(benefitCategories||[]).flatMap(cat=>(cat.programs||[]).map(p=>({...p,catName:cat.name,catColor:cat.color})));
  const save=()=>{if(!f.name)return;const next=ed==="new"?[...people,f]:people.map(p=>p.id===ed?f:p);setPeople(next);onSave({...settings,people:next});setEd(null);setF(null);};
  const del=id=>{const next=people.filter(p=>p.id!==id);setPeople(next);onSave({...settings,people:next});};
  const toggle=id=>{const next=people.map(p=>p.id===id?{...p,active:!p.active}:p);setPeople(next);onSave({...settings,people:next});};
  const TEAM_COLORS=["#5a8aff","#3aaa5a","#e08040","#c084fc","#f0d060","#8B1A1A","#40c0c0"];
  const saveTeam=()=>{
    if(!teamF||!teamF.name)return;
    const next=teamEd==="new"?[...(teams||[]),{...teamF,id:uid()}]:(teams||[]).map(t=>t.id===teamEd?teamF:t);
    setTeams(next);setTeamEd(null);setTeamF(null);
  };
  const toggleTeamMember=(teamId,personId)=>{
    const next=(teams||[]).map(t=>{
      if(t.id!==teamId)return t;
      const has=(t.memberIds||[]).includes(personId);
      return {...t,memberIds:has?(t.memberIds||[]).filter(id=>id!==personId):[...(t.memberIds||[]),personId]};
    });
    setTeams(next);
  };
  const onDragOver=e=>e.preventDefault();
  const onDrop=(e,teamId)=>{
    e.preventDefault();
    if(!dragPersonId)return;
    toggleTeamMember(teamId,dragPersonId);
    setDragPersonId(null);
  };

  return <div className="anim-fadein">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <div>
        <div style={{...T.t,fontSize:26,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>TÝM</div>
        <div style={{...T.m,fontSize:FS.b,color:C.dim,marginTop:2}}>Členové · Role · Benefity · Skupiny</div>
      </div>

function useTimer(onSave){
  const [tick,setTick]=useState(0);
  const state=useRef({running:false,elapsed:0,personId:"",projectId:"",taskId:"",desc:"",saved:false});
  const rafRef=useRef(null);
  const startTsRef=useRef(null);
  const pausedRef=useRef(0);
  const s=state.current;
  const redraw=useCallback(()=>setTick(t=>t+1),[]);
  const tick_fn=useCallback(()=>{
    s.elapsed=pausedRef.current+Math.floor((Date.now()-startTsRef.current)/1000);
    redraw();
    rafRef.current=requestAnimationFrame(tick_fn);
  },[]);
  const start=useCallback(()=>{
    startTsRef.current=Date.now();
    pausedRef.current=s.elapsed;
    s.running=true;s.saved=false;
    rafRef.current=requestAnimationFrame(tick_fn);
    redraw();
  },[]);
  const pause=useCallback(()=>{
    pausedRef.current=s.elapsed;
    s.running=false;
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    redraw();
  },[]);
  const reset=useCallback(()=>{
    s.running=false;s.elapsed=0;s.saved=false;
    pausedRef.current=0;
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    redraw();
  },[]);
  const save=useCallback(()=>{
    if(s.elapsed<30)return;
    const mins=Math.max(1,Math.round(s.elapsed/60));
    onSave({personId:s.personId,projectId:s.projectId,taskId:s.taskId,
      minutes:mins,description:s.desc||"Timer záznam",date:toDay(),billed:false});
    s.running=false;s.elapsed=0;s.saved=true;
    pausedRef.current=0;s.desc="";
    if(rafRef.current)cancelAnimationFrame(rafRef.current);
    redraw();
    setTimeout(()=>{s.saved=false;redraw();},2000);
  },[]);
  useEffect(()=>()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);},[]);
  const setPersonId=useCallback(v=>{s.personId=v;redraw();},[]);
  const setProjectId=useCallback(v=>{s.projectId=v;s.taskId="";redraw();},[]);
  const setTaskId=useCallback(v=>{s.taskId=v;redraw();},[]);
  const setDesc=useCallback(v=>{s.desc=v;redraw();},[]);
  return {...s,start,pause,reset,save,setPersonId,setProjectId,setTaskId,setDesc,
    active:s.running||s.elapsed>0};
}

    display:"flex",alignItems:"center",gap:12,
    boxShadow:"0 4px 24px rgba(0,0,0,0.6)",
    cursor:"pointer",minWidth:200
  }} onClick={onClick}>
    {running&&<div style={{width:7,height:7,borderRadius:"50%",background:C.merlot,flexShrink:0,animation:"pulse 1.4s ease infinite"}}/>}

        {person?person.name:"---"}{proj?" · "+proj.name:""}
      </div>
    </div>
    <div style={{display:"flex",gap:6,flexShrink:0}}>
      {running
        ?<button onClick={e=>{e.stopPropagation();pause();}} style={{background:"transparent",border:`1px solid ${C.merlot}`,borderRadius:3,color:C.merlot,cursor:"pointer",padding:"5px 8px",...T.m,fontSize:FS.b}}>II</button>

    </div>

}


function HoursView({timer,timeEntries,setTimeEntries,projects,tasks,settings,confirmFn}){
  const people=settings.people||[];
  const [f,setF]=useState({id:uid(),personId:people[0]?.id||"",projectId:"",taskId:"",date:toDay(),minutes:0,description:"",rate:people[0]?.rate||510,billed:false});
  const [q,setQ]=useState("");const [pFilter,setPFilter]=useState("all");
  const u=k=>v=>setF(p=>({...p,[k]:v}));
  const personTasks=tasks.filter(t=>t.projectId===f.projectId&&t.status!=="Hotovo");
  const addEntry=()=>{
    if(!f.minutes||!f.personId)return;
    const person=people.find(p=>p.id===f.personId);
    const rate=person?.rate||0;
    setTimeEntries([{...f,id:uid(),rate},...timeEntries]);
    setF(prev=>({id:uid(),personId:prev.personId,projectId:prev.projectId,taskId:"",date:prev.date,minutes:0,description:"",rate,billed:false}));
  };
  const del=async id=>{if(await confirmFn("Smazat záznam?"))setTimeEntries(timeEntries.filter(x=>x.id!==id));};
  const filtered=timeEntries.filter(e=>{
    const mQ=!q||(e.description+(projects.find(p=>p.id===e.projectId)?.name||"")).toLowerCase().includes(q.toLowerCase());
    const mP=pFilter==="all"||e.personId===pFilter;
    return mQ&&mP;
  });
  const grouped={};filtered.forEach(e=>{const d=e.date||"—";if(!grouped[d])grouped[d]=[];grouped[d].push(e);});
  const sortedDates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  const totalMins=filtered.reduce((s,e)=>s+(e.minutes||0),0);
  const totalVal=filtered.reduce((s,e)=>s+calcEntryVal(e,people),0);
  return <div className="anim-fadein">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <div><div style={{...T.t,fontSize:26,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>HODINY</div>
        <div style={{...T.m,fontSize:FS.b,color:C.dim,marginTop:2}}>Záznamy odpracovaného času</div></div>
    </div>
    <LiveTimer timer={timer} people={people} projects={projects} tasks={tasks}/>
    <Card sx={{padding:18,marginBottom:16,borderColor:C.bHi}}>
      <SH c="Zaznamenat čas"/>
      <div className="grid-2-inp">
        <Inp lbl="Kdo" val={f.personId} onChange={v=>{const p=people.find(x=>x.id===v);u("personId")(v);if(p)u("rate")(p.rate||0);}} opts={people.filter(p=>p.active!==false).map(p=>({v:p.id,l:p.name}))} ph="Vyber osobu"/>
        <Inp lbl="Projekt" val={f.projectId} onChange={v=>{u("projectId")(v);u("taskId")("");}} opts={[{v:"",l:"— bez projektu —"},...projects.map(p=>({v:p.id,l:p.name}))]}/>
        {f.projectId&&personTasks.length>0&&<Inp lbl="Úkol (volitelný)" val={f.taskId} onChange={u("taskId")} opts={[{v:"",l:"— bez úkolu —"},...personTasks.map(t=>({v:t.id,l:t.title}))]}/>}
        <Inp lbl="Datum" type="date" val={f.date} onChange={u("date")}/>
        <Inp lbl="Čas (minuty)" type="number" val={f.minutes} onChange={v=>u("minutes")(+v)} ph="60"/>
        <Inp lbl="Popis práce" val={f.description} onChange={u("description")} ph="Co bylo uděláno…"/>
      </div>
      {f.minutes>0&&f.personId&&<div style={{...T.m,fontSize:FS.b,color:"#3aaa5a",marginTop:10,marginBottom:4}}>{fmtMins(f.minutes)} · {FMT(calcEntryVal(f,people))}</div>}
      <div style={{marginTop:12}}><Btn ch="+ Přidat záznam" onClick={addEntry} dis={!f.minutes||!f.personId}/></div>
    </Card>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
      <Card sx={{padding:"10px 14px"}}><Lbl c="Celkem hodin" s={{fontSize:7.5,marginBottom:2}}/><div style={{...T.t,fontSize:18,fontWeight:300,color:C.ivory}}>{fmtMins(totalMins)}</div></Card>
      <Card sx={{padding:"10px 14px"}}><Lbl c="Hodnota" s={{fontSize:7.5,marginBottom:2}}/><div style={{...T.t,fontSize:18,fontWeight:300,color:"#5a8aff"}}>{FMT(totalVal)}</div></Card>
      <Card sx={{padding:"10px 14px"}}><Lbl c="Záznamy" s={{fontSize:7.5,marginBottom:2}}/><div style={{...T.t,fontSize:18,fontWeight:300,color:C.hi}}>{filtered.length}</div></Card>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
      <SearchBar value={q} onChange={setQ} ph="Hledat záznamy…"/>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {[{id:"all",l:"Vše"},...people.filter(p=>p.active!==false).map(p=>({id:p.id,l:p.name,c:p.color}))].map(p=>(
          <button key={p.id} onClick={()=>setPFilter(p.id)} style={{padding:"5px 10px",background:pFilter===p.id?(p.c||C.merlot):"transparent",border:`1px solid ${pFilter===p.id?(p.c||C.merlot):C.border}`,borderRadius:3,cursor:"pointer",...T.m,fontSize:FS.s,color:pFilter===p.id?C.bg:C.dim,whiteSpace:"nowrap",transition:"all .15s"}}>{p.l}</button>
        ))}
      </div>
    </div>
    {sortedDates.length===0
      ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"40px 0",textAlign:"center",...T.m,fontSize:FS.b,color:C.dim}}>Žádné záznamy hodin</div>
      :sortedDates.map(date=>{
        const de=grouped[date];const dayMins=de.reduce((s,e)=>s+(e.minutes||0),0);const dayVal=de.reduce((s,e)=>s+calcEntryVal(e,people),0);
        return <div key={date} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",padding:"6px 4px",marginBottom:4}}>
            <span style={{...T.m,fontSize:FS.b,fontWeight:600,color:C.hi,letterSpacing:"0.08em"}}>{fmtD(date)}</span>
            <span style={{...T.m,fontSize:FS.s,color:C.dim}}>{fmtMins(dayMins)} · {FMT(dayVal)}</span>
          </div>
          <Card>{de.map((e,i)=>{
            const person=people.find(p=>p.id===e.personId);
            const proj=projects.find(p=>p.id===e.projectId);
            const task=tasks.find(t=>t.id===e.taskId);
            return <div key={e.id} onMouseEnter={x=>x.currentTarget.style.background=C.s0} onMouseLeave={x=>x.currentTarget.style.background="transparent"}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:i<de.length-1?`1px solid ${C.border}`:"none",transition:"background .1s"}}>
              <div style={{width:4,height:28,background:person?.color||C.merlot,borderRadius:2,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:2,flexWrap:"wrap"}}>
                  {person&&<span style={{...T.m,fontSize:FS.b,color:person.color,fontWeight:500}}>{person.name}</span>}
                  {proj&&<span style={{...T.m,fontSize:FS.b,color:C.ivory}}>{proj.name}</span>}
                  {task&&<span style={{...T.m,fontSize:FS.s,color:C.dim}}>↳ {task.title}</span>}
                  {e.billed&&<span style={{...T.m,fontSize:FS.s,color:"#3aaa5a",border:"1px solid #1a4828",borderRadius:3,padding:"1px 5px"}}>Vyfakt.</span>}
                </div>
                {e.description&&<div style={{...T.m,fontSize:FS.s,color:C.dim,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.description}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginRight:8}}>
                <div style={{...T.t,fontSize:14,fontWeight:300,color:C.ivory}}>{fmtMins(e.minutes)}</div>
                <div style={{...T.m,fontSize:FS.s,color:"#5a8aff"}}>{FMT(calcEntryVal(e,people))}</div>
              </div>
              <Btn ch="×" onClick={()=>del(e.id)} v="d" sx={{padding:"5px 8px"}}/>
            </div>;
          })}</Card>
        </div>;
      })}
  </div>;
}

function TasksView({tasks,setTasks,projects,settings,confirmFn}){
  const people=settings.people||[];
  const blank={id:uid(),projectId:"",assignedTo:"",title:"",status:"Todo",priority:"Střední",deadline:"",note:""};
  const [ed,setEd]=useState(null);const [f,setF]=useState(null);
  const [projF,setProjF]=useState("all");const [statusF,setStatusF]=useState("active");const [q,setQ]=useState("");
  const u=k=>v=>setF(p=>({...p,[k]:v}));
  const save=()=>{if(!f.title)return;setTasks(ed==="new"?[f,...tasks]:tasks.map(x=>x.id===ed?f:x));setEd(null);setF(null);};
  const del=async id=>{if(await confirmFn("Smazat úkol?"))setTasks(tasks.filter(x=>x.id!==id));};
  const cycleStatus=id=>{const o=["Todo","Probíhá","Hotovo"];setTasks(tasks.map(t=>t.id===id?{...t,status:o[(o.indexOf(t.status)+1)%3]}:t));};
  const filtered=tasks.filter(t=>{
    const mP=projF==="all"||t.projectId===projF;
    const mS=statusF==="all"||t.status===statusF||(statusF==="active"&&t.status!=="Hotovo");
    const mQ=!q||t.title.toLowerCase().includes(q.toLowerCase());
    return mP&&mS&&mQ;
  });
  const statC={Todo:C.dim,"Probíhá":"#5a8aff",Hotovo:"#3aaa5a"};
  return <div className="anim-fadein">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <div><div style={{...T.t,fontSize:26,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>ÚKOLY</div>
        <div style={{...T.m,fontSize:FS.b,color:C.dim,marginTop:2}}>{tasks.filter(t=>t.status!=="Hotovo").length} aktivních · {tasks.filter(t=>t.status==="Hotovo").length} hotových</div></div>
      <Btn ch="+ Přidat úkol" onClick={()=>{setF({...blank,id:uid()});setEd("new");}}/>
    </div>
    {ed&&f&&<Card sx={{padding:18,marginBottom:14,borderColor:C.mBorder,animation:"scaleIn .22s cubic-bezier(.22,1,.36,1)"}}>
      <SH c={ed==="new"?"Nový úkol":"Upravit úkol"}/>
      <div className="grid-2-inp">
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Název úkolu" val={f.title} onChange={u("title")} ph="Co je potřeba udělat…"/></div>
        <Inp lbl="Projekt" val={f.projectId} onChange={u("projectId")} opts={[{v:"",l:"— bez projektu —"},...projects.map(p=>({v:p.id,l:p.name}))]}/>
        <Inp lbl="Přiřadit" val={f.assignedTo} onChange={u("assignedTo")} opts={[{v:"",l:"— nepřiřazeno —"},...people.filter(p=>p.active!==false).map(p=>({v:p.id,l:p.name}))]}/>
        <Inp lbl="Status" val={f.status} onChange={u("status")} opts={STATUSES_TASK.map(v=>({v,l:v}))}/>
        <Inp lbl="Priorita" val={f.priority} onChange={u("priority")} opts={["Nízká","Střední","Vysoká"].map(v=>({v,l:v}))}/>
        <Inp lbl="Deadline" type="date" val={f.deadline} onChange={u("deadline")}/>
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Poznámka" val={f.note} onChange={u("note")} ml rows={2}/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:14}}><Btn ch="Uložit" onClick={save}/><Btn ch="Zrušit" onClick={()=>{setEd(null);setF(null);}} v="g"/></div>
    </Card>}
    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
      <SearchBar value={q} onChange={setQ} ph="Hledat úkoly…"/>
    </div>
    <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
      {[{id:"all",l:"Vše"},...projects.map(p=>({id:p.id,l:p.name}))].map(p=>(
        <button key={p.id} onClick={()=>setProjF(p.id)} style={{padding:"4px 10px",background:projF===p.id?C.merlot:"transparent",border:`1px solid ${projF===p.id?C.merlot:C.border}`,borderRadius:3,cursor:"pointer",...T.m,fontSize:FS.s,color:projF===p.id?C.ivory:C.dim,whiteSpace:"nowrap",transition:"all .15s"}}>{p.l}</button>
      ))}
      <div style={{width:1,background:C.border,margin:"0 3px"}}/>
      {[{id:"active",l:"Aktivní"},{id:"all",l:"Vše"},{id:"Todo",l:"Todo"},{id:"Probíhá",l:"Probíhá"},{id:"Hotovo",l:"Hotovo"}].map(s=>(
        <button key={s.id} onClick={()=>setStatusF(s.id)} style={{padding:"4px 10px",background:statusF===s.id?(statC[s.id]||C.merlot):"transparent",border:`1px solid ${statusF===s.id?(statC[s.id]||C.merlot):C.border}`,borderRadius:3,cursor:"pointer",...T.m,fontSize:FS.s,color:statusF===s.id?C.bg:C.dim,whiteSpace:"nowrap",transition:"all .15s"}}>{s.l}</button>
      ))}
    </div>
    {filtered.length===0&&!ed
      ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"40px 0",textAlign:"center"}}>
          <div style={{...T.t,fontSize:20,letterSpacing:"0.2em",color:C.dim,marginBottom:14}}>ŽÁDNÉ ÚKOLY</div>
          <Btn ch="+ Přidat úkol" onClick={()=>{setF({...blank,id:uid()});setEd("new");}}/>
        </div>
      :<Card>{filtered.map((t,i)=>{
        const proj=projects.find(p=>p.id===t.projectId);
        const person=people.find(p=>p.id===t.assignedTo);
        const overdue=t.deadline&&new Date(t.deadline)<new Date()&&t.status!=="Hotovo";
        return <div key={t.id} onMouseEnter={x=>x.currentTarget.style.background=C.s0} onMouseLeave={x=>x.currentTarget.style.background="transparent"}
          style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none",transition:"background .1s",opacity:t.status==="Hotovo"?0.5:1}}>
          <button onClick={()=>cycleStatus(t.id)} style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${statC[t.status]||C.dim}`,background:t.status==="Hotovo"?statC[t.status]:"transparent",cursor:"pointer",flexShrink:0,transition:"all .15s"}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:2,flexWrap:"wrap"}}>
              <span style={{...T.m,fontSize:12,fontWeight:500,color:t.status==="Hotovo"?C.dim:C.ivory,textDecoration:t.status==="Hotovo"?"line-through":"none"}}>{t.title}</span>
              <span style={{...T.m,fontSize:FS.s,color:PRIORITY_C[t.priority]||C.dim,border:"1px solid currentColor",borderRadius:3,padding:"1px 5px"}}>{t.priority}</span>
              {proj&&<span style={{...T.m,fontSize:FS.s,color:proj.color||C.merlot,border:"1px solid currentColor",borderRadius:3,padding:"1px 5px"}}>{proj.name}</span>}
            </div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {person&&<span style={{...T.m,fontSize:FS.s,color:person.color}}>{person.name}</span>}
              {t.deadline&&<span style={{...T.m,fontSize:FS.s,color:overdue?"#e04040":C.dim}}>{overdue?"⚠ ":""}{fmtD(t.deadline)}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <Btn ch="✎" onClick={()=>{setF({...t});setEd(t.id);}} v="g" sx={{padding:"5px 8px"}}/>
            <Btn ch="×" onClick={()=>del(t.id)} v="d" sx={{padding:"5px 8px"}}/>
          </div>
        </div>;
      })}</Card>}
  </div>;
}

function ProjectDetail({proj,tasks,setTasks,timeEntries,expenses,clients,settings,invoices,onInvoice,onBack,confirmFn}){
  const people=settings.people||[];
  const cl=clients.find(c=>c.id===proj.clientId);

  const pExp=expenses.filter(e=>e.projectId===proj.id);
  const pInv=invoices.filter(i=>i.projectId===proj.id);
  const unbilled=pEntries.filter(e=>!e.billed);
  const unbilledVal=unbilled.reduce((s,e)=>s+calcEntryVal(e,people),0);

      <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}}>

      {unbilled.length>0&&<Btn ch={`Fakturovat ${unbilled.length}× (${FMT(unbilledVal)})`} onClick={()=>onInvoice(proj,unbilled,people)} sx={{background:C.merlot,border:"none"}}/>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}} className="grid-kpi">
      {[{l:"Hodiny",v:fmtMins(pEntries.reduce((s,e)=>s+(e.minutes||0),0)),c:C.ivory},{l:"Hodnota hodin",v:FMT(pEntries.reduce((s,e)=>s+calcEntryVal(e,people),0)),c:"#5a8aff"},{l:"Vyfakturováno",v:FMT(billedInvVal),c:"#3aaa5a"},{l:"Výdaje",v:FMT(pExp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0)),c:"#e08040"}].map(s=><Card key={s.l} sx={{padding:"10px 14px"}}><Lbl c={s.l} s={{fontSize:7.5,marginBottom:3}}/><div style={{...T.t,fontSize:17,fontWeight:300,color:s.c}}>{s.v}</div></Card>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}} className="grid-fin-2">
      <Card sx={{padding:"14px 18px"}}>
        <SH c="Úkoly"/>

          <Btn ch="+" onClick={addTask} sx={{padding:"8px 12px"}}/>
        </div>
        {pTasks.length===0?<div style={{...T.m,fontSize:FS.b,color:C.dim,textAlign:"center",padding:"8px 0"}}>Žádné úkoly</div>

              <button onClick={()=>cycleStatus(t.id)} style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${statC[t.status]||C.dim}`,background:t.status==="Hotovo"?statC[t.status]:"transparent",cursor:"pointer",flexShrink:0}}/>
              <span style={{...T.m,fontSize:FS.b,color:t.status==="Hotovo"?C.dim:C.ivory,flex:1,textDecoration:t.status==="Hotovo"?"line-through":"none"}}>{t.title}</span>
              {person&&<span style={{...T.m,fontSize:FS.s,color:person.color}}>{person.name}</span>}
              <span style={{...T.m,fontSize:FS.s,color:statC[t.status]||C.dim}}>{t.status}</span>

          :[...pEntries].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,10).map((e,i)=>{
            const person=people.find(p=>p.id===e.personId);
            return <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:i<Math.min(pEntries.length,10)-1?`1px solid ${C.border}`:"none"}}>
              <div style={{width:4,height:4,borderRadius:"50%",background:person?.color||C.merlot,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                {person&&<span style={{...T.m,fontSize:FS.b,color:person.color,marginRight:6}}>{person.name}</span>}
                <span style={{...T.m,fontSize:FS.b,color:C.hi,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block",maxWidth:110}}>{e.description||"—"}</span>
              </div>
              <span style={{...T.m,fontSize:FS.s,color:C.dim,flexShrink:0}}>{fmtD(e.date)}</span>
              <span style={{...T.t,fontSize:12,fontWeight:300,color:e.billed?"#3aaa5a":C.ivory,flexShrink:0}}>{fmtMins(e.minutes)}</span>
            </div>;})}
      </Card>
    </div>
  </div>;
}

function ProjectsView({projects,setProjects,tasks,setTasks,timeEntries,expenses,clients,settings,invoices,onInvoice,confirmFn}){
  const [detail,setDetail]=useState(null);
  if(detail){
    const proj=projects.find(p=>p.id===detail);
    if(!proj){setDetail(null);return null;}
    return <ProjectDetail proj={proj} projects={projects} setProjects={setProjects} tasks={tasks} setTasks={setTasks} timeEntries={timeEntries} expenses={expenses} clients={clients} settings={settings} invoices={invoices} onInvoice={onInvoice} onBack={()=>setDetail(null)} confirmFn={confirmFn}/>;
  }
  const blank={id:uid(),name:"",clientId:"",status:"Aktivní",budget:0,deadline:"",color:PROJ_COLORS[0],note:""};
  const [ed,setEd]=useState(null);const [f,setF]=useState(null);const [q,setQ]=useState("");
  const u=k=>v=>setF(p=>({...p,[k]:v}));
  const save=()=>{if(!f.name)return;setProjects(ed==="new"?[f,...projects]:projects.map(x=>x.id===ed?f:x));setEd(null);setF(null);};
  const del=async id=>{if(await confirmFn("Smazat projekt?"))setProjects(projects.filter(x=>x.id!==id));};
  const filtered=q?projects.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())):projects;
  const stC={"Aktivní":"#3aaa5a","Pozastaveno":"#e08040","Dokončeno":"#5a5a6a","Archivováno":C.dim};
  const people=settings.people||[];
  return <div className="anim-fadein">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <div><div style={{...T.t,fontSize:26,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>PROJEKTY</div>
        <div style={{...T.m,fontSize:FS.b,color:C.dim,marginTop:2}}>{projects.filter(p=>p.status==="Aktivní").length} aktivních</div></div>
      <Btn ch="+ Nový projekt" onClick={()=>{setF({...blank,id:uid(),color:PROJ_COLORS[projects.length%PROJ_COLORS.length]});setEd("new");}}/>
    </div>
    {ed&&f&&<Card sx={{padding:18,marginBottom:14,borderColor:C.mBorder,animation:"scaleIn .22s cubic-bezier(.22,1,.36,1)"}}>
      <SH c={ed==="new"?"Nový projekt":"Upravit projekt"}/>
      <div className="grid-2-inp">
        <Inp lbl="Název projektu" val={f.name} onChange={u("name")} ph="Rebrand klienta…"/>
        <Inp lbl="Klient" val={f.clientId} onChange={u("clientId")} opts={[{v:"",l:"— bez klienta —"},...clients.map(c=>({v:c.id,l:c.name||c.company}))]}/>
        <Inp lbl="Stav" val={f.status} onChange={u("status")} opts={["Aktivní","Pozastaveno","Dokončeno","Archivováno"].map(v=>({v,l:v}))}/>
        <Inp lbl="Rozpočet (Kč)" type="number" val={f.budget} onChange={v=>u("budget")(+v)}/>
        <Inp lbl="Deadline" type="date" val={f.deadline} onChange={u("deadline")}/>
        <div><Lbl c="Barva projektu"/>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
            {PROJ_COLORS.map(c=><div key={c} onClick={()=>u("color")(c)} style={{width:20,height:20,borderRadius:3,background:c,cursor:"pointer",border:`2px solid ${f.color===c?C.ivory:"transparent"}`,transition:"border .15s"}}/>)}
          </div>
        </div>
        <div style={{gridColumn:"1/-1"}}><Inp lbl="Poznámka" val={f.note} onChange={u("note")} ml rows={2}/></div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:14}}><Btn ch="Uložit" onClick={save}/><Btn ch="Zrušit" onClick={()=>{setEd(null);setF(null);}} v="g"/></div>
    </Card>}
    <div style={{marginBottom:12}}><SearchBar value={q} onChange={setQ} ph="Hledat projekty…"/></div>
    {filtered.length===0&&!ed
      ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"56px 0",textAlign:"center"}}>
          <div style={{...T.t,fontSize:20,letterSpacing:"0.2em",color:C.dim,marginBottom:14}}>ŽÁDNÉ PROJEKTY</div>
          <Btn ch="+ Nový projekt" onClick={()=>{setF({...blank,id:uid()});setEd("new");}}/>
        </div>
      :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
        {filtered.map(p=>{
          const cl=clients.find(c=>c.id===p.clientId);
          const openT=tasks.filter(t=>t.projectId===p.id&&t.status!=="Hotovo").length;
          const pHours=timeEntries.filter(e=>e.projectId===p.id).reduce((s,e)=>s+(e.minutes||0),0);
          const pInvV=invoices.filter(i=>i.projectId===p.id).reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);
          const pExpV=expenses.filter(e=>e.projectId===p.id).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
          const overdue=p.deadline&&new Date(p.deadline)<new Date()&&p.status==="Aktivní";
          return <Card key={p.id} sx={{padding:"16px 18px",cursor:"pointer",transition:"border-color .15s,background .15s"}}
            onClick={()=>setDetail(p.id)}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=p.color||C.merlot;e.currentTarget.style.background=C.s0;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.s1;}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                <div style={{width:8,height:32,borderRadius:2,background:p.color||C.merlot,flexShrink:0}}/>
                <div><div style={{...T.t,fontSize:16,fontWeight:300,color:C.ivory,letterSpacing:"0.08em"}}>{p.name}</div>
                  {cl&&<div style={{...T.m,fontSize:FS.s,color:C.hi,marginTop:1}}>{cl.name||cl.company}</div>}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <span style={{...T.m,fontSize:FS.s,letterSpacing:"0.08em",textTransform:"uppercase",color:stC[p.status]||C.dim,border:"1px solid currentColor",borderRadius:3,padding:"1px 6px",whiteSpace:"nowrap"}}>{p.status}</span>
                {overdue&&<span style={{...T.m,fontSize:FS.s,color:"#e04040"}}>⚠ po deadline</span>}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:10}}>
              {[{l:"Úkoly",v:openT>0?openT+" otevřených":"—"},{l:"Hodiny",v:pHours>0?fmtMins(pHours):"—"},{l:"Vyfakturováno",v:pInvV>0?FMT(pInvV):"—"},{l:"Výdaje",v:pExpV>0?FMT(pExpV):"—"}].map(s=><div key={s.l} style={{background:C.s2,borderRadius:3,padding:"4px 8px"}}>
                <div style={{...T.m,fontSize:FS.s,color:C.dim,marginBottom:1}}>{s.l}</div>
                <div style={{...T.m,fontSize:FS.b,color:C.ivory}}>{s.v}</div>
              </div>)}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              {p.deadline?<span style={{...T.m,fontSize:FS.s,color:overdue?"#e04040":C.dim}}>{fmtD(p.deadline)}</span>:<span/>}
              <div style={{display:"flex",gap:5}} onClick={e=>e.stopPropagation()}>
                <Btn ch="✎" onClick={e=>{e.stopPropagation();setF({...p});setEd(p.id);}} v="g" sx={{padding:"4px 7px"}}/>
                <Btn ch="×" onClick={e=>{e.stopPropagation();del(p.id);}} v="d" sx={{padding:"4px 7px"}}/>
              </div>
            </div>
          </Card>;
        })}
      </div>}
  </div>;
}


/* ── useTimer hook ───────────────────────────────────────────────── */

/* ── App ───────────────────────────────────────────────────────── */
function App(){
  const [authed,setAuthed]=useState(()=>{
    const r=localStorage.getItem("liberti_auth_role");
    const u=localStorage.getItem("liberti_user");
    return !!(r&&u);
  });
  const [authRole,setAuthRole]=useState(()=>{
    const r=localStorage.getItem("liberti_auth_role");
    if(!r)return null;
    if(r==="admin")return {v:"admin",l:"Admin",isAdmin:true};
    try{const roles=JSON.parse(localStorage.getItem("liberti_roles")||"[]");return roles.find(x=>x.v===r)||{v:r,l:r,isAdmin:false};}catch(e){return {v:r,l:r,isAdmin:false};}
  });
  const [authUser,setAuthUser]=useState(()=>localStorage.getItem("liberti_user")||null);
  const [invoices,setInvState]=useState([]);
  const [clients,setCliState]=useState([]);
  const [templateItems,setTplState]=useState([]);
  const [vouchers,setVchState]=useState([]);
  const [projects,setProjState]=useState([]);
  const [tasks,setTaskState]=useState([]);
  const [timeEntries,setEntryState]=useState([]);
  const [expenses,setExpState]=useState([]);
  const [incomes,setIncState]=useState([]);
  const [benefitCategories,setBenCatState]=useState([]);
  const [teams,setTeamsState]=useState([]);
  const [leads,setLeadsState]=useState([]);
  const [calls,setCallsState]=useState([]);
  const [meetings,setMeetState]=useState([]);
  const [changeLog,setLogState]=useState([]);
  const [settings,setSetState]=useState(DEF);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [loadErr,setLoadErr]=useState("");
  const [module,setModule]=useState("fakturace");
  const [view,setView]=useState("archive");
  const [finView,setFinView]=useState("overview");
  const [offView,setOffView]=useState("projects");
  const [finPeriod,setFinPeriod]=useState("year");
  const [incPeriod,setIncPeriod]=useState("year");
  const [expPeriod,setExpPeriod]=useState("year");
  const [editing,setEditing]=useState(null);
  const [toast,setToast]=useState("");
  const {confirm,Modal}=useConfirm();
  // Timer — lives here so it persists across navigation
  // Timer — persists across navigation via useRef inside useTimer
  const timerSaveFn=useRef(null);
  const timer=useTimer(useCallback((entry)=>{
    if(timerSaveFn.current)timerSaveFn.current(entry);
  },[]));
  timerSaveFn.current=(entry)=>{
    const person=(settings.people||[]).find(p=>p.id===entry.personId);
    const rate=person?person.rate||0:0;
    const newEntry=Object.assign({},entry,{id:uid(),rate:rate});
    const updated=[newEntry,...timeEntries];
    setEntries(updated);
    showToast("✓ Čas uložen");
  };


  useEffect(()=>{if(authed)load();},[authed]);
  useEffect(()=>{
    const onClose=()=>localStorage.removeItem("liberti_auth");
    window.addEventListener("pagehide",onClose);
    return()=>window.removeEventListener("pagehide",onClose);
  },[]);

  const load=async()=>{
    setLoading(true);setLoadErr("");
    const safe=p=>p.catch(()=>null);
    const[inv,cli,tpl,vch,set,proj,tsk,te,exp,inc,bcat,tms,lds,cls,mts,clog]=await Promise.all([
      safe(apiRead("invoices")),safe(apiRead("clients")),safe(apiRead("templateItems")),safe(apiRead("vouchers")),
      safe(apiRead("settings")),safe(apiRead("projects")),safe(apiRead("tasks")),safe(apiRead("timeEntries")),safe(apiRead("expenses")),safe(apiRead("incomes"))
    ]);
    // If core data completely missing AND we have no cached data → show error
    if(!Array.isArray(inv)&&!Array.isArray(cli)&&!inv&&!cli){
      setLoadErr("Nepodařilo se připojit k databázi. Zkontroluj připojení k internetu.");
    } else {
      setInvState(Array.isArray(inv)?inv:invoices);
      setCliState(Array.isArray(cli)?cli:clients);
      setTplState(Array.isArray(tpl)?tpl:templateItems);
      setVchState(Array.isArray(vch)?vch:vouchers);
      setProjState(Array.isArray(proj)?proj:projects);
      setTaskState(Array.isArray(tsk)?tsk:tasks);
      setEntryState(Array.isArray(te)?te:timeEntries);
      setExpState(Array.isArray(exp)?exp:expenses);
      setIncState(Array.isArray(inc)?inc:incomes);
      setBenCatState(Array.isArray(bcat)?bcat:benefitCategories);
      setTeamsState(Array.isArray(tms)?tms:teams);
      setLeadsState(Array.isArray(lds)?lds:leads);
      setCallsState(Array.isArray(cls)?cls:calls);
      setMeetState(Array.isArray(mts)?mts:meetings);
      setLogState(Array.isArray(clog)?clog:changeLog);
      const newSettings=set&&typeof set==="object"?{...DEF,...set}:DEF;
      setSetState(newSettings);
      // Cache roles pro offline login
      const roles=newSettings.systemRoles||DEF.systemRoles||[];
      if(roles.length>0)localStorage.setItem("liberti_roles",JSON.stringify(roles));
    }
    setLoading(false);
  };

  const CORE_TYPES=["invoices","clients","settings"];
  const bgSave=async(type,data)=>{setSaving(true);try{await apiWrite(type,data);}catch(e){if(CORE_TYPES.includes(type))showToast("⚠ Chyba uložení");}finally{setSaving(false);}};
  const setInv=d=>{setInvState(d);bgSave("invoices",d);};
  const setCli=d=>{setCliState(d);bgSave("clients",d);};
  const setTpl=d=>{setTplState(d);bgSave("templateItems",d);};
  const setVch=d=>{setVchState(d);bgSave("vouchers",d);};
  const setProj=d=>{setProjState(d);bgSave("projects",d);};
  const setTasks=d=>{setTaskState(d);bgSave("tasks",d);};
  const setEntries=d=>{setEntryState(d);bgSave("timeEntries",d);};
  // Timer save handled in useTimer callback above
  const setExp=d=>{setExpState(d);bgSave("expenses",d);};
  const setInc=d=>{setIncState(d);bgSave("incomes",d);};
  const setBenCat=d=>{setBenCatState(d);bgSave("benefitCategories",d);};
  const setTeams=d=>{setTeamsState(d);bgSave("teams",d);};
  const setLeads=d=>{setLeadsState(d);bgSave("leads",d);};
  const setMeetings=d=>{setMeetState(d);bgSave("meetings",d);};
  const addLog=(action,type,description)=>{
    if(authRole!=="admin"&&authRole!=="employee")return;
    const entry={id:uid(),action,type,description,user:authRole==="admin"?"Admin":authUser||"",ts:new Date().toISOString()};
    setLogState(prev=>{const next=[entry,...prev].slice(0,500);bgSave("changeLog",next);return next;});
  };
  const setCalls=d=>{setCallsState(d);bgSave("calls",d);};
  const setSet=d=>{setSetState(d);bgSave("settings",d);};
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),3000);};

  const mkNum=()=>`${settings.prefix||"FAK"}-${new Date().getFullYear()}-${String(settings.nextNum||1).padStart(4,"0")}`;
  const newInv=(prefillClient)=>{
    const d=toDay();
    const cl=prefillClient||(clients[0])||{};
    setEditing({id:uid(),number:mkNum(),variableSymbol:"",status:"Koncept",issueDate:d,duzp:d,duzpManual:false,dueDate:plusD(d,settings.payDays||14),paymentMethod:"Převodem",client:{...cl},items:[{id:uid(),description:"",qty:1,unit:"ks",unitPrice:0}],note:"",vatEnabled:!!settings.vatPayer,vatRate:21,discount:{enabled:false,type:"pct",value:0},projectId:""});
    setView("editor");
  };
  const saveInv=inv=>{
    const isNew=!invoices.find(i=>i.id===inv.id);
    const upd=isNew?[inv,...invoices]:invoices.map(i=>i.id===inv.id?inv:i);
    setInv(upd);
    if(isNew)setSet({...settings,nextNum:(settings.nextNum||1)+1});
    setEditing(inv);showToast("✓ Uloženo");
  };
  const dupInv=inv=>{
    const d=toDay();
    setEditing({...inv,id:uid(),number:mkNum(),status:"Koncept",issueDate:d,duzp:d,duzpManual:false,dueDate:plusD(d,settings.payDays||14)});
    setSet({...settings,nextNum:(settings.nextNum||1)+1});
    setView("editor");
  };
  const logout=async()=>{
    const ok=await confirm("Odhlásit se z LIBERTI Hub?");
    if(ok){
      localStorage.removeItem("liberti_auth_role");
      localStorage.removeItem("liberti_user");
      setAuthed(false);setAuthRole(null);setAuthUser(null);
    }
  };

  // ── Project → Invoice generation ──────────────────────────────
  const invoiceProject=(proj,unbilledEntries,people)=>{
    const d=toDay();
    const cl=clients.find(c=>c.id===proj.clientId);
    // Group entries by person + description
    const grouped={};
    unbilledEntries.forEach(e=>{
      const person=people.find(p=>p.id===e.personId);
      const key=(person?.name||"Práce")+"|"+(e.description||"Práce na projektu");
      if(!grouped[key])grouped[key]={desc:`${person?.name||"Práce"} — ${e.description||"Práce na projektu"}`,mins:0,rate:e.rate||0};
      grouped[key].mins+=e.minutes||0;
    });
    const items=Object.values(grouped).map(g=>({
      id:uid(),description:g.desc,qty:Math.round(g.mins/60*100)/100,unit:"hod",unitPrice:g.rate
    }));
    const newI={
      id:uid(),number:mkNum(),variableSymbol:"",status:"Koncept",
      issueDate:d,duzp:d,duzpManual:false,dueDate:plusD(d,settings.payDays||14),
      paymentMethod:"Převodem",
      client:cl?{id:cl.id,name:cl.name,company:cl.company,street:cl.street,city:cl.city,zip:cl.zip,country:cl.country,ico:cl.ico,dic:cl.dic,email:cl.email,phone:cl.phone}:{},
      items,note:`Faktura za projekt: ${proj.name}`,
      vatEnabled:!!settings.vatPayer,vatRate:21,discount:{enabled:false,type:"pct",value:0},
      projectId:proj.id
    };
    // Mark entries as billed
    const updEntries=timeEntries.map(e=>unbilledEntries.find(u=>u.id===e.id)?{...e,billed:true,invoiceId:newI.id}:e);
    setEntries(updEntries);
    setInv([newI,...invoices]);
    setSet({...settings,nextNum:(settings.nextNum||1)+1});
    setEditing(newI);
    setModule("fakturace");
    setView("editor");
    showToast(`✓ Faktura ${newI.number} vytvořena`);
  };

  if(!authed)return <PinLogin onSuccess={(role,user)=>{
    setAuthed(true);setAuthRole(role);setAuthUser(user);
  }}/>;
  if(loading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
        <div style={{fontFamily:"'Teko',sans-serif",fontWeight:300,fontSize:"clamp(48px,8vw,72px)",letterSpacing:"0.26em",textIndent:"0.26em",color:C.ivory,lineHeight:1,textAlign:"center"}}>
          LIBERTI
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{height:1,width:60,background:"rgba(139,26,26,.6)"}}/>
          <div style={{fontFamily:"'Teko',sans-serif",fontWeight:300,fontSize:20,letterSpacing:"0.44em",textTransform:"uppercase",color:C.merlot}}>HUB</div>
          <div style={{height:1,width:60,background:"rgba(139,26,26,.6)"}}/>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}><Spin sz={14}/><span style={{...T.m,fontSize:FS.s,letterSpacing:"0.2em",textTransform:"uppercase",color:C.dim}}>Načítám…</span></div>
    </div>
  );
  if(loadErr)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:380,width:"100%",textAlign:"center"}}>
        <div style={{marginBottom:22}}><BrandLogo height={24} color={C.ivory}/></div>
        <Card sx={{padding:"24px",borderColor:C.mBorder}}>
          <div style={{...T.t,fontSize:18,letterSpacing:"0.14em",color:"#e06060",marginBottom:10}}>CHYBA PŘIPOJENÍ</div>
          <div style={{...T.m,fontSize:FS.b,color:C.hi,lineHeight:1.7,marginBottom:20}}>{loadErr}</div>
          <Btn ch="Zkusit znovu" onClick={load}/>
        </Card>
      </div>
    </div>
  );

  const NAV_FAK=[
    {id:"settings",l:"Nastavení",icon:"◇"},
    {id:"clients",l:"Klienti",icon:"○"},
    {id:"items",l:"Položky",icon:"≡"},
    {id:"vouchers",l:"Vouchery",icon:"◈"},
    {id:"archive",l:"Faktury",icon:"◫"},
    ...(authRole==="admin"?[{id:"visibility",l:"Viditelnost",icon:"◑"},{id:"log",l:"LOG",icon:"◷"}]:[]),
  ];
  const NAV_FIN=[
    {id:"overview",l:"Přehled",icon:"◎"},
    {id:"incomes",l:"Příjmy",icon:"↑"},
    {id:"expenses",l:"Výdaje",icon:"↓"},
    {id:"cashflow",l:"Cashflow",icon:"⇄"},
  ];
  const NAV_OFF=[
    {id:"projects",l:"Projekty",icon:"◻"},
    {id:"tasks",l:"Úkoly",icon:"☑"},
    {id:"hours",l:"Hodiny",icon:"◷"},
    {id:"meetings",l:"Meetings",icon:"◷"},
    {id:"team",l:"Tým",icon:"◉"},
    {id:"benefits",l:"Benefity",icon:"✦"},
    {id:"outreach",l:"Outreach",icon:"◈"},
  ];
  const isAdmin=authRole&&(authRole.isAdmin||authRole.v==="admin");
  const filterNav=(nav,mod)=>{
    if(isAdmin||!authRole)return nav;
    // Kontroluj rolePerms pro tuto roli
    const rp=(settings.rolePerms||{})[authRole.v]||{};
    const allowed=(rp[mod]||{}).read||[];
    // Fallback na employeeVisibility pokud rolePerms prázdné
    const evAllowed=(settings.employeeVisibility||{})[mod]||[];
    const effective=allowed.length>0?allowed:evAllowed;
    return nav.filter(n=>effective.includes(n.id));
  };

  const activeNav=module==="fakturace"?filterNav(NAV_FAK,"fakturace"):module==="finance"?filterNav(NAV_FIN,"finance"):filterNav(NAV_OFF,"office");
  const activeView=module==="fakturace"?view:module==="finance"?finView:offView;
  const setActiveView=module==="fakturace"?setView:module==="finance"?setFinView:setOffView;

  const visibleModules=isAdmin?["fakturace","finance","office"]:["fakturace","finance","office"].filter(mod=>{
    const rp=(settings.rolePerms||{})[authRole?.v]||{};
    const allowed=(rp[mod]||{}).read||[];
    const ev=(settings.employeeVisibility||{})[mod]||[];
    return (allowed.length>0||ev.length>0)||(rp[mod+"_module"]!==false);
  });
  const ModuleSwitcher=()=><div style={{display:"flex",gap:2,background:C.s2,borderRadius:4,padding:3,border:`1px solid ${C.border}`}}>
    {[{id:"fakturace",l:"Fakturace"},{id:"finance",l:"Finance"},{id:"office",l:"Office"}].filter(m=>isAdmin||visibleModules.includes(m.id)).map(m=>(
      <button key={m.id} onClick={()=>setModule(m.id)}
        style={{padding:"5px 14px",borderRadius:3,border:"none",cursor:"pointer",
          background:module===m.id?C.merlot:"transparent",
          color:module===m.id?C.ivory:C.dim,
          ...T.m,fontSize:FS.s,fontWeight:module===m.id?600:400,letterSpacing:"0.1em",textTransform:"uppercase",
          transition:"all .18s"}}
      >{m.l}</button>
    ))}
  </div>;

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
      {Modal}
      <header style={{borderBottom:`1px solid ${C.border}`,padding:"0 32px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,background:C.bg,zIndex:100}} className="header-pad">
        <div style={{display:"flex",alignItems:"center",gap:0}}>
          <span style={{display:"inline-flex",alignItems:"baseline",gap:0,lineHeight:1}}>
            <span style={{fontFamily:"'Teko',sans-serif",fontWeight:300,fontSize:19*1.45,letterSpacing:"0.26em",textIndent:"0.26em",color:C.ivory,lineHeight:1}}>LIBERTI</span>
            <span style={{fontFamily:"'Teko',sans-serif",fontWeight:300,fontSize:19*1.45,letterSpacing:"0.22em",color:C.merlot,lineHeight:1,marginLeft:"0.3em"}}>HUB</span>
          </span>
          <div style={{borderLeft:`1px solid ${C.border}`,marginLeft:16,paddingLeft:16}} className="hide-tab">
            <ModuleSwitcher/>
          </div>
          <div style={{borderLeft:`1px solid ${C.border}`,marginLeft:12,paddingLeft:4,display:"flex"}} className="hide-tab">
            {activeNav.map(n=><button key={n.id} onClick={()=>setActiveView(n.id)}
              style={{background:"none",border:"none",cursor:"pointer",padding:"0 12px",height:54,...T.m,fontSize:FS.b,fontWeight:500,letterSpacing:"0.1em",textTransform:"uppercase",
                color:activeView===n.id?C.ivory:C.dim,
                borderBottom:`2px solid ${activeView===n.id?C.merlot:"transparent"}`,
                transition:"color .15s,border-color .15s"}}>{n.l}</button>)}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {saving&&<div style={{display:"flex",alignItems:"center",gap:7}}><Spin sz={12}/><span style={{...T.m,fontSize:FS.s,color:C.dim,textTransform:"uppercase",letterSpacing:"0.12em"}} className="hide-tab">Ukládám…</span></div>}
          {toast&&!saving&&<span style={{...T.m,fontSize:FS.s,letterSpacing:"0.1em",fontWeight:500,color:toast.startsWith("⚠")?"#e06060":"#3aaa5a",animation:"fadeIn .2s ease"}}>{toast}</span>}
          {view==="editor"&&editing&&module==="fakturace"&&<div style={{display:"flex",gap:7}}>
            <Btn ch="Uložit" onClick={()=>saveInv(editing)} sx={{padding:"7px 14px"}}/>
            <Btn ch="↓ PDF" onClick={()=>{saveInv(editing);printInv(editing,settings);}} v="g" sx={{padding:"7px 12px"}}/>
            <Btn ch="← Zpět" onClick={()=>setView("archive")} v="g" sx={{padding:"7px 12px"}}/>
          </div>}
          <button onClick={()=>{load();showToast("✓ Data aktualizována");}} title="Obnovit data bez odhlášení" style={{...T.m,background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,padding:"7px 10px",cursor:"pointer",fontSize:12,color:C.dim,transition:"border-color .15s,color .15s",lineHeight:1}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.bHi;e.currentTarget.style.color=C.ivory;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.dim;}}
          >↺</button>
          <button onClick={logout} style={{...T.m,background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,padding:"7px 12px",cursor:"pointer",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.dim,transition:"border-color .15s,color .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.mBorder;e.currentTarget.style.color="#c03030";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.dim;}}
          >Odhlásit</button>
          {authUser&&<span style={{...T.m,fontSize:FS.s,color:C.dim,borderLeft:`1px solid ${C.border}`,paddingLeft:12}} className="hide-tab">
            {authRole&&authRole.l!=="Admin"&&<span style={{color:C.merlot,marginRight:6}}>{authRole.l}</span>}
            {authUser}
          </span>}
        </div>
      </header>

      <main style={{flex:1,padding:"28px 32px 90px",maxWidth:1160,width:"100%",margin:"0 auto"}} className="main-pad">
        {module==="fakturace"&&<>
          {view==="archive"&&<ArchiveView invoices={invoices} settings={settings} onNew={newInv} onEdit={inv=>{setEditing(inv);setView("editor");}} onView={inv=>printInv(inv,settings)} onDup={dupInv} onStatus={(id,s)=>setInv(invoices.map(i=>i.id===id?{...i,status:s}:i))} onDelete={id=>setInv(invoices.filter(i=>i.id!==id))} confirmFn={confirm}/>}
          {view==="editor"&&editing&&<EditorView inv={editing} clients={clients} templateItems={templateItems} vouchers={vouchers} settings={settings} onSave={inv=>{setEditing(inv);saveInv(inv);}} onCancel={()=>setView("archive")} onPrint={inv=>printInv(inv,settings)}/>}
          {view==="items"&&<ItemsView templateItems={templateItems} setTemplateItems={setTpl} confirmFn={confirm}/>}
          {view==="clients"&&<ClientsView clients={clients} setClients={setCli} invoices={invoices} timeEntries={timeEntries} projects={projects} settings={settings} confirmFn={confirm} onNewInvoice={cl=>{newInv(cl);setModule("fakturace");setView("editor");}}/>}
          {view==="vouchers"&&<VouchersView vouchers={vouchers} setVouchers={setVch} confirmFn={confirm}/>}
          {view==="settings"&&<SettingsView settings={settings} onSave={d=>{setSet(d);showToast("✓ Nastavení uloženo");}}/>}
          {view==="visibility"&&<VisibilityView settings={settings} onSave={d=>{setSet(d);showToast("✓ Uloženo");}}/>}
          {view==="log"&&<LogView changeLog={changeLog}/>}
        </>}
        {module==="finance"&&<>
          {finView==="overview"&&<FinanceDashboard invoices={invoices} incomes={incomes} timeEntries={timeEntries} expenses={expenses} settings={settings} period={finPeriod} setPeriod={setFinPeriod}/>}
          {finView==="incomes"&&<IncomesView incomes={incomes} setIncomes={setInc} period={incPeriod} setPeriod={setIncPeriod} confirmFn={confirm}/>}
          {finView==="expenses"&&<ExpensesView expenses={expenses} setExpenses={setExp} projects={projects} period={expPeriod} setPeriod={setExpPeriod} confirmFn={confirm}/>}
          {finView==="cashflow"&&<CashflowView invoices={invoices} expenses={expenses}/>}
        </>}
        {module==="office"&&<>
          {offView==="projects"&&<ProjectsView projects={projects} setProjects={setProj} tasks={tasks} setTasks={setTasks} timeEntries={timeEntries} expenses={expenses} clients={clients} settings={settings} invoices={invoices} onInvoice={invoiceProject} confirmFn={confirm}/>}
          {offView==="tasks"&&<TasksView tasks={tasks} setTasks={setTasks} projects={projects} settings={settings} confirmFn={confirm}/>}
          {offView==="hours"&&<HoursView timer={timer} timeEntries={timeEntries} setTimeEntries={setEntries} projects={projects} tasks={tasks} settings={settings} confirmFn={confirm}/>}
          {offView==="team"&&<TeamView settings={settings} onSave={d=>{setSet(d);showToast("✓ Tým uložen");}} timeEntries={timeEntries} benefitCategories={benefitCategories} teams={teams} setTeams={setTeams} confirmFn={confirm}/>}
          {offView==="benefits"&&<BenefitsView benefitCategories={benefitCategories} setBenefitCategories={setBenCat} confirmFn={confirm}/>
          }
          {offView==="meetings"&&<MeetingsView meetings={meetings} setMeetings={setMeetings} clients={clients} settings={settings} onSaveSettings={setSet} confirmFn={confirm}/>}
          {offView==="outreach"&&<OutreachView leads={leads} setLeads={setLeads} calls={calls} setCalls={setCalls} settings={settings} confirmFn={confirm}/>}
        </>}
      </main>

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:C.s1,borderTop:`1px solid ${C.border}`,zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <style>{`@media(min-width:901px){nav{display:none!important}}`}</style>
        <div style={{display:"flex",justifyContent:"center",padding:"6px 0 2px",borderBottom:`1px solid ${C.border}`}}>
          <ModuleSwitcher/>
        </div>
        <div style={{display:"flex"}}>
          {activeNav.map(n=>(
            <button key={n.id} onClick={()=>setActiveView(n.id)}
              style={{flex:1,padding:"8px 0",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,touchAction:"manipulation"}}>
              <span style={{fontSize:14,opacity:activeView===n.id?1:.3,transition:"opacity .15s"}}>{n.icon}</span>
              <span style={{...T.m,fontSize:FS.s,letterSpacing:"0.1em",textTransform:"uppercase",color:activeView===n.id?C.merlot:C.dim,fontWeight:activeView===n.id?600:400,transition:"color .15s"}}>{n.l}</span>
            </button>
          ))}
        </div>
      </nav>
      {/* Floating timer widget — visible when not on Hours view */}
      {timer.active&&!(module==="office"&&offView==="hours")&&
        <FloatingTimer timer={timer} people={settings.people||[]} projects={projects}
          onClick={()=>{setModule("office");setOffView("hours");}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

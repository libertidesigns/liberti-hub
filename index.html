<script>
var API_URL="https://script.google.com/macros/s/AKfycbynFiJRSiLmtmY5WSVTWbSwcLK-OO74Rp50RBxCZRkEGmiDPqLKveC1onG8eoKgVd77gQ/exec";
var CORRECT_PIN="2183971";
(function(){
  // Service worker registration
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
  function tryFS(){
    var el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen().catch(function(){});
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  }
  ['keydown','pointerdown','touchstart'].forEach(function(ev){
    document.addEventListener(ev,function h(){
      document.removeEventListener(ev,h);
      tryFS();
    },{once:true});
  });
})();
function jsonpCall(url,params){
  return new Promise(function(resolve,reject){
    var cbName='jcb_'+Math.random().toString(36).slice(2);
    var sc;
    var timer=setTimeout(function(){delete window[cbName];if(sc&&sc.parentNode)sc.parentNode.removeChild(sc);reject(new Error('Timeout'));},14000);
    window[cbName]=function(data){clearTimeout(timer);delete window[cbName];if(sc&&sc.parentNode)sc.parentNode.removeChild(sc);if(data.ok===false)reject(new Error(data.error||'API chyba'));else resolve(data);};
    var q=Object.keys(params).map(function(k){return k+'='+params[k];}).join('&');
    sc=document.createElement('script');sc.src=url+'?'+q+'&callback='+cbName;
    sc.onerror=function(){clearTimeout(timer);delete window[cbName];reject(new Error('Chyba načítání.'));};
    document.head.appendChild(sc);
  });
}
function apiRead(type){return jsonpCall(API_URL,{action:'read',type:type,t:Date.now()}).then(function(d){return d.data;});}
function apiWrite(type,data){var enc=encodeURIComponent(JSON.stringify(data));return jsonpCall(API_URL,{action:'write',type:type,data:enc,t:Date.now()});}
</script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const C={bg:"#060606",s0:"#0a0a0a",s1:"#0f0f0f",s2:"#141414",border:"#1e1e1e",bHi:"#252525",ivory:"#ede8dc",dim:"#3a3530",hi:"#6a6258",merlot:"#8B1A1A",mDark:"#2a0808",mBorder:"#4a1010"};
const ST={"Koncept":{c:"#5a5550",bg:"#0f0f0f",b:"#1e1e1e"},"Odesláno":{c:"#4a90d0",bg:"#060e1a",b:"#1a3060"},"Zaplaceno":{c:"#3aaa5a",bg:"#06150a",b:"#1a4828"},"Po splatnosti":{c:"#e04040",bg:"#150404",b:"#4a1010"},"Storno":{c:"#2a2520",bg:"#0a0a0a",b:"#1e1e1e"}};
const UNITS=["ks","hod","den","měsíc","projekt","sada","video","post","strana","kampaň"];
const VAT_RATES=[21,12,0];
const PAY_METHODS=["Bankovní převod","Hotovost","Platební karta","Záloha"];
const STATUSES=["Koncept","Odesláno","Zaplaceno","Po splatnosti","Storno"];
const DEF={name:"LIBERTI",tagline:"Grafika · Social · Video · Reklama",street:"",city:"",zip:"",country:"Česká republika",ico:"",dic:"",vatPayer:true,bank:"",iban:"",swift:"",email:"",phone:"",web:"",prefix:"FAK",nextNum:1,payDays:14,footNote:"Faktura je splatná převodem na uvedený bankovní účet."};
const T={t:{fontFamily:"'Teko',sans-serif"},m:{fontFamily:"'Montserrat',sans-serif"}};
const uid=()=>Math.random().toString(36).slice(2,10);
const fmt=n=>new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:2}).format(n||0);
const fmtD=d=>{if(!d)return"—";const[y,m,dd]=d.split("-");return`${parseInt(dd)}. ${parseInt(m)}. ${y}`;};
const toDay=()=>new Date().toISOString().slice(0,10);
const plusD=(d,n)=>{if(!d)return"";const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
const vsFrom=n=>n.replace(/\D/g,"").slice(-8);

function calcInv(items, vatEnabled, vatRate, discount){
  const subtotal = items.reduce((s,i)=>(s+(i.qty||0)*(i.unitPrice||0)),0);
  let discountAmt = 0;
  if(discount && discount.enabled){
    discountAmt = discount.type==="pct" ? subtotal*(discount.value||0)/100 : (discount.value||0);
    discountAmt = Math.min(discountAmt, subtotal);
  }
  const base = subtotal - discountAmt;
  const vat = vatEnabled ? base*(vatRate||21)/100 : 0;
  return {subtotal, discountAmt, base, vat, tot: base+vat};
}

/* ── Confirm Modal ─────────────────────────────────────────────── */
function ConfirmModal({msg,onYes,onNo}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)",animation:"fadeIn .18s ease"}}>
      <div style={{background:C.s1,border:`1px solid ${C.mBorder}`,borderRadius:6,padding:"28px 32px",maxWidth:360,width:"90%",animation:"scaleIn .2s cubic-bezier(.22,1,.36,1)"}}>
        <div style={{...T.m,fontSize:13,color:C.ivory,lineHeight:1.7,marginBottom:24,whiteSpace:"pre-line"}}>{msg}</div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onNo} style={{...T.m,background:"transparent",border:`1px solid ${C.bHi}`,borderRadius:4,padding:"9px 18px",cursor:"pointer",fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:C.hi}}>Zrušit</button>
          <button onClick={onYes} style={{...T.m,background:C.merlot,border:"none",borderRadius:4,padding:"9px 18px",cursor:"pointer",fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:C.ivory,fontWeight:500}}>Potvrdit</button>
        </div>
      </div>
    </div>
  );
}
function useConfirm(){
  const [state,setState]=useState(null);
  const confirm=(msg)=>new Promise(resolve=>{setState({msg,resolve});});
  const Modal=state?<ConfirmModal msg={state.msg} onYes={()=>{state.resolve(true);setState(null);}} onNo={()=>{state.resolve(false);setState(null);}}/>:null;
  return{confirm,Modal};
}

/* ── Brand Logo ─────────────────────────────────────────────────── */
function BrandLogo({height=22,color="#ede8dc"}){
  return <span style={{fontFamily:"'Teko',sans-serif",fontWeight:300,fontSize:height*1.45,letterSpacing:"0.26em",color,lineHeight:1,display:"block",textIndent:"0.26em",textAlign:"center"}}> LIBERTI</span>;
}

/* ── PIN Login ─────────────────────────────────────────────────── */
function PinLogin({onSuccess}){
  const [pin,setPin]=useState("");
  const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false);
  const [phase,setPhase]=useState("intro"); // "intro" | "pin"
  const inputRef=useRef();

  useEffect(()=>{
    if(localStorage.getItem("liberti_auth")==="1"){onSuccess();return;}
    // Intro plays, then transition to PIN
    const t=setTimeout(()=>{
      setPhase("pin");
      setTimeout(()=>inputRef.current?.focus(),400);
    },2600);
    return()=>clearTimeout(t);
  },[]);

  const check=useCallback((val)=>{
    if(val.length===CORRECT_PIN.length){
      if(val===CORRECT_PIN){localStorage.setItem("liberti_auth","1");onSuccess();}
      else{setShake(true);setErr(true);setTimeout(()=>{setShake(false);setErr(false);setPin("");inputRef.current?.focus();},650);}
    }
  },[onSuccess]);
  const handleKey=useCallback((e)=>{
    if(/^\d$/.test(e.key)&&pin.length<CORRECT_PIN.length){const next=pin+e.key;setPin(next);check(next);}
    else if(e.key==="Backspace"){setPin(p=>p.slice(0,-1));}
  },[pin,check]);

  const digits=CORRECT_PIN.length;
  const isIntro=phase==="intro";

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden",userSelect:"none",animation:isIntro?"glowPulse 2.6s ease":"none"}}
      onClick={()=>!isIntro&&inputRef.current?.focus()}>

      {/* Subtle vignette only */}
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)",pointerEvents:"none"}}/>

      {/* Logo block — transitions from centered-large to smaller */}
      <div style={{
        display:"flex",flexDirection:"column",alignItems:"center",
        transition:"transform 0.9s cubic-bezier(.22,1,.36,1), margin 0.9s cubic-bezier(.22,1,.36,1)",
        transform:isIntro?"translateY(0)":"translateY(-32px)",
        marginBottom:isIntro?0:44,
      }}>
        {/* LIBERTI */}
        <div style={{
          fontFamily:"'Teko',sans-serif",fontWeight:300,
          fontSize:isIntro?"clamp(64px,12vw,96px)":"52px",
          letterSpacing:"0.26em",textIndent:"0.26em",
          color:C.ivory,lineHeight:1,textAlign:"center",
          animation:"revealLogo 1.1s cubic-bezier(.22,1,.36,1) both",
          transition:"font-size 0.9s cubic-bezier(.22,1,.36,1)",
          willChange:"font-size",
        }}>LIBERTI</div>

        {/* HUB divider */}
        <div style={{
          display:"flex",alignItems:"center",
          width:isIntro?"clamp(240px,40vw,360px)":"220px",
          gap:14,marginTop:isIntro?18:12,
          transition:"width 0.9s cubic-bezier(.22,1,.36,1), margin 0.9s cubic-bezier(.22,1,.36,1)",
          overflow:"hidden",
        }}>
          <div style={{height:1,flex:1,background:"rgba(139,26,26,.7)",transformOrigin:"left",animation:"lineGrow .8s cubic-bezier(.22,1,.36,1) .7s both"}}/>
          <div style={{
            ...T.m,fontSize:isIntro?9:8,letterSpacing:"0.44em",textTransform:"uppercase",color:C.merlot,
            animation:"hubFade .6s cubic-bezier(.22,1,.36,1) 1s both",
            transition:"font-size 0.9s ease",flexShrink:0,
          }}>HUB</div>
          <div style={{height:1,flex:1,background:"rgba(139,26,26,.7)",transformOrigin:"right",animation:"lineGrow .8s cubic-bezier(.22,1,.36,1) .7s both"}}/>
        </div>
      </div>

      {/* PIN section — only visible in pin phase */}
      <div style={{
        display:"flex",flexDirection:"column",alignItems:"center",gap:20,
        opacity:isIntro?0:1,
        transform:isIntro?"translateY(12px)":"translateY(0)",
        transition:"opacity 0.7s ease 0.1s, transform 0.7s cubic-bezier(.22,1,.36,1) 0.1s",
        pointerEvents:isIntro?"none":"auto",
      }}>
        <div style={{...T.m,fontSize:8.5,letterSpacing:"0.32em",textTransform:"uppercase",color:C.hi}}>Zadej PIN</div>
        <div style={{display:"flex",gap:14,animation:shake?"shake .5s ease":"none"}}>
          {Array.from({length:digits}).map((_,i)=>(
            <div key={i} style={{width:13,height:13,borderRadius:"50%",
              background:err?"#5a0a0a":i<pin.length?C.merlot:C.s2,
              border:`1px solid ${err?"#8B1A1A":i<pin.length?C.merlot:C.border}`,
              transition:"all .15s cubic-bezier(.22,1,.36,1)",
              boxShadow:i<pin.length&&!err?"0 0 14px rgba(139,26,26,.6)":"none",
              animation:i===pin.length&&!err?"pulse 1.4s ease infinite":"none"
            }}/>
          ))}
        </div>
        <input ref={inputRef} type="tel" inputMode="numeric" value={pin} onChange={()=>{}} onKeyDown={handleKey}
          style={{position:"absolute",opacity:0,width:1,height:1,pointerEvents:"none",top:"50%"}}/>
        {err&&<div style={{...T.m,fontSize:9,letterSpacing:"0.22em",color:"#c03030",textTransform:"uppercase",animation:"fadeIn .2s ease"}}>Nesprávný PIN</div>}
      </div>

      <div style={{position:"absolute",bottom:28,textAlign:"center",opacity:isIntro?0:0.6,transition:"opacity 1s ease 0.4s"}}>
        <div style={{...T.m,fontSize:7.5,letterSpacing:"0.22em",color:C.dim,textTransform:"uppercase"}}>Liberti Hub · 2026</div>
      </div>
    </div>
  );
}

/* ── Atoms ─────────────────────────────────────────────────────── */
function Lbl({c,s={}}){return <div style={{...T.m,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:C.dim,marginBottom:5,...s}}>{c}</div>;}
function Pill({s}){const st=ST[s]||ST.Koncept;return <span style={{...T.m,fontSize:9,fontWeight:300,letterSpacing:"0.12em",textTransform:"uppercase",color:st.c,background:st.bg,border:`1px solid ${st.b}`,borderRadius:3,padding:"3px 9px",whiteSpace:"nowrap"}}>{s}</span>;}
function Spin({sz=18}){return <div style={{width:sz,height:sz,border:`2px solid ${C.border}`,borderTop:`2px solid ${C.merlot}`,borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>;}
function Card({children,sx={}}){return <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:4,...sx}}>{children}</div>;}
function SH({c}){return <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><span style={{...T.t,fontSize:17,fontWeight:600,letterSpacing:"0.16em",color:C.ivory,textTransform:"uppercase"}}>{c}</span><div style={{flex:1,height:1,background:C.border}}/></div>;}
function Inp({lbl,val,onChange,ph,type="text",ml,rows=3,opts,sx={}}){
  const base={width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"11px 12px",color:C.ivory,...T.m,fontSize:13,resize:"vertical",boxSizing:"border-box",transition:"border-color .15s",...sx};
  const strVal = val===null||val===undefined?"":String(val);
  return <div>{lbl&&<Lbl c={lbl}/>}{ml?<textarea value={strVal} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={rows} style={base}/>:opts?<select value={strVal} onChange={e=>onChange(e.target.value)} style={{...base,cursor:"pointer",appearance:"none"}}>{opts.map(o=><option key={o.v??o} value={o.v??o}>{o.l??o}</option>)}</select>:<input type={type} value={strVal} onChange={e=>onChange(e.target.value)} placeholder={ph} style={base}/>}</div>;
}
function Btn({ch,onClick,v="p",sx={},dis=false}){
  const vs={p:{bg:C.merlot,c:C.ivory,b:"none"},g:{bg:"transparent",c:C.hi,b:`1px solid ${C.bHi}`},d:{bg:"transparent",c:"#c03030",b:"1px solid #3a0e0e"}};
  const st=vs[v]||vs.p;
  return <button onClick={onClick} disabled={dis} style={{...st,background:st.bg,color:st.c,border:st.b,borderRadius:4,padding:"11px 18px",cursor:dis?"not-allowed":"pointer",...T.m,fontSize:10,fontWeight:500,letterSpacing:"0.14em",textTransform:"uppercase",opacity:dis?.4:1,touchAction:"manipulation",transition:"opacity .15s",...sx}}>{ch}</button>;
}
function ChkRow({label,checked,onChange,note}){
  const id="chk_"+Math.random().toString(36).slice(2,8);
  return(
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,cursor:"pointer"}} onClick={()=>onChange(!checked)}>
      <input type="checkbox" id={id} checked={!!checked} onChange={e=>{e.stopPropagation();onChange(e.target.checked);}} onClick={e=>e.stopPropagation()} style={{width:16,height:16,cursor:"pointer",accentColor:C.merlot,flexShrink:0}}/>
      <div>
        <label htmlFor={id} style={{...T.m,fontSize:13,color:C.hi,cursor:"pointer",display:"block"}}>{label}</label>
        {note&&<div style={{...T.m,fontSize:9,color:C.dim,marginTop:1}}>{note}</div>}
      </div>
    </div>
  );
}

/* ── Print ─────────────────────────────────────────────────────── */
function printInv(inv, settings) {
  var c = calcInv(inv.items, inv.vatEnabled, inv.vatRate, inv.discount);
  var cl = inv.client || {};
  var vs = inv.variableSymbol || vsFrom(inv.number);
  var isVat = !!inv.vatEnabled;
  var vatRate = inv.vatRate || 21;
  var docType = isVat ? 'DAŇOVÝ DOKLAD' : 'FAKTURA';

  var rows = inv.items.map(function(i) {
    var b = (i.qty||0)*(i.unitPrice||0);
    return '<tr><td class="td-d">'+(i.description||'—')+'</td>'
      +'<td class="td-n">'+i.qty+'</td>'
      +'<td class="td-u">'+i.unit+'</td>'
      +'<td class="td-n">'+fmt(i.unitPrice)+'</td>'
      +'<td class="td-t">'+fmt(b)+'</td></tr>';
  }).join('');

  var payBlock = '';
  if (settings.bank || settings.iban) {
    payBlock = '<div class="pay-sec"><div class="pay-lbl">Platební údaje</div><table class="pay-tbl">';
    if (settings.bank)  payBlock += '<tr><td class="pk">Číslo účtu</td><td class="pv">'+settings.bank+'</td></tr>';
    if (settings.iban)  payBlock += '<tr><td class="pk">IBAN</td><td class="pv">'+settings.iban+'</td></tr>';
    if (settings.swift) payBlock += '<tr><td class="pk">SWIFT/BIC</td><td class="pv">'+settings.swift+'</td></tr>';
    if (vs)             payBlock += '<tr><td class="pk">Variabilní symbol</td><td class="pv"><strong>'+vs+'</strong></td></tr>';
    payBlock += '</table></div>';
  }

  // Supplier meta rows
  var suppMeta = '';
  var suppAddr = [settings.street, [settings.zip, settings.city].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if (suppAddr)  suppMeta += '<tr><td class="mk">Adresa:</td><td class="mv">'+suppAddr+'</td></tr>';
  if (settings.ico)   suppMeta += '<tr><td class="mk">IČO:</td><td class="mv">'+settings.ico+'</td></tr>';
  if (settings.dic && isVat) suppMeta += '<tr><td class="mk">DIČ:</td><td class="mv">'+settings.dic+'</td></tr>';
  if (settings.email) suppMeta += '<tr><td class="mk">E-mail:</td><td class="mv">'+settings.email+'</td></tr>';
  if (settings.phone) suppMeta += '<tr><td class="mk">Tel:</td><td class="mv">'+settings.phone+'</td></tr>';

  // Client meta rows
  var clMeta = '';
  var clAddr = [cl.street, [cl.zip, cl.city].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if (clAddr)  clMeta += '<tr><td class="mk">Adresa:</td><td class="mv">'+clAddr+'</td></tr>';
  if (cl.ico)   clMeta += '<tr><td class="mk">IČO:</td><td class="mv">'+cl.ico+'</td></tr>';
  if (cl.dic)   clMeta += '<tr><td class="mk">DIČ:</td><td class="mv">'+cl.dic+'</td></tr>';
  if (cl.email) clMeta += '<tr><td class="mk">E-mail:</td><td class="mv">'+cl.email+'</td></tr>';
  if (cl.phone) clMeta += '<tr><td class="mk">Tel:</td><td class="mv">'+cl.phone+'</td></tr>';

  // Totals block
  var totalsInner = '';
  if (c.discountAmt > 0) {
    var discLabel = 'Sleva';

/* ── Drag-and-drop hook ────────────────────────────────────────── */
function useDragSort(items, setItems){
  const dragIdx = useRef(null);
  const [overIdx, setOverIdx] = useState(null);

  const onDragStart = (idx) => { dragIdx.current = idx; };
  const onDragOver  = (e, idx) => { e.preventDefault(); setOverIdx(idx); };
  const onDrop      = (idx) => {
    if(dragIdx.current === null || dragIdx.current === idx) { setOverIdx(null); return; }
    const arr = [...items];
    const [moved] = arr.splice(dragIdx.current, 1);
    arr.splice(idx, 0, moved);
    setItems(arr);
    dragIdx.current = null;
    setOverIdx(null);
  };
  const onDragEnd   = () => { dragIdx.current = null; setOverIdx(null); };

  const rowProps = (idx) => ({
    draggable: true,
    onDragStart: () => onDragStart(idx),
    onDragOver:  (e) => onDragOver(e, idx),
    onDrop:      () => onDrop(idx),
    onDragEnd:   onDragEnd,
  });

  return { rowProps, overIdx };
}

function VoucherGroupedList({vouchers,filtered,q,rowProps,overIdx,statusC,onEdit,onDup,onDel}){
  // Group by name prefix — everything before the last "-NN" suffix
  const getGroup=code=>{const m=code.match(/^(.*)-\d+$/);return m?m[1]:code;};
  const groups={};
  filtered.forEach(v=>{const g=getGroup(v.code);if(!groups[g])groups[g]=[];groups[g].push(v);});
  const groupNames=Object.keys(groups);
  const [collapsed,setCollapsed]=useState({});
  const toggleGroup=g=>setCollapsed(p=>({...p,[g]:!p[g]}));

  // If searching or all groups have 1 item, flat list
  const useGroups=!q&&groupNames.some(g=>groups[g].length>1);

  if(!useGroups){
    // Flat list
    return <Card>
      {filtered.length===0&&<div style={{padding:"28px 18px",textAlign:"center",...T.m,fontSize:12,color:C.dim}}>Žádná shoda</div>}
      {filtered.map(v=>{
        const idx=vouchers.findIndex(x=>x.id===v.id);
        return <VoucherRow key={v.id} v={v} idx={idx} q={q} rowProps={rowProps} overIdx={overIdx} statusC={statusC} onEdit={onEdit} onDup={onDup} onDel={onDel}/>;
      })}
    </Card>;
  }

  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {groupNames.map(g=>{
      const items=groups[g];
      const isOpen=!collapsed[g];
      const isSingle=items.length===1;
      const activeCount=items.filter(v=>v.status==="Aktivní").length;
      if(isSingle){
        const v=items[0];
        const idx=vouchers.findIndex(x=>x.id===v.id);
        return <Card key={g}>
          <VoucherRow v={v} idx={idx} q={q} rowProps={rowProps} overIdx={overIdx} statusC={statusC} onEdit={onEdit} onDup={onDup} onDel={onDel}/>
        </Card>;
      }
      return <Card key={g}>
        {/* Group header */}
        <div onClick={()=>toggleGroup(g)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",cursor:"pointer",borderBottom:isOpen?`1px solid ${C.border}`:"none",userSelect:"none"}}
          onMouseEnter={e=>e.currentTarget.style.background=C.s0}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{...T.t,fontSize:17,fontWeight:600,letterSpacing:"0.12em",color:C.ivory}}>{g}</span>
            <span style={{...T.m,fontSize:9,color:C.dim,background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 8px",letterSpacing:"0.08em"}}>{items.length} ks</span>
            {activeCount>0&&<span style={{...T.m,fontSize:9,color:"#3aaa5a",letterSpacing:"0.08em"}}>{activeCount} aktivních</span>}
          </div>
          <span style={{color:C.dim,fontSize:14,transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(180deg)":"rotate(0)"}}>▾</span>
        </div>
        {/* Group rows */}
        {isOpen&&items.map(v=>{
          const idx=vouchers.findIndex(x=>x.id===v.id);
          return <VoucherRow key={v.id} v={v} idx={idx} q={q} rowProps={rowProps} overIdx={overIdx} statusC={statusC} onEdit={onEdit} onDup={onDup} onDel={onDel} indent/>;
        })}
      </Card>;
    })}
  </div>;
}

function VoucherRow({v,idx,q,rowProps,overIdx,statusC,onEdit,onDup,onDel,indent=false}){
  return <div {...(q?"":rowProps(idx))}
    style={{display:"flex",alignItems:"center",padding:`11px ${indent?"28px":"18px"}`,borderBottom:`1px solid ${C.border}`,background:overIdx===idx&&!q?"#161616":"transparent",transition:"background .1s",cursor:q?"default":"grab",gap:8}}>
    {!q&&<span style={{color:C.dim,fontSize:14,marginRight:8,cursor:"grab",userSelect:"none",flexShrink:0}}>⠿</span>}
    <div style={{flex:1,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{...T.t,fontSize:15,fontWeight:600,letterSpacing:"0.1em",color:C.ivory}}>{v.code}</div>
        <span style={{...T.m,fontSize:8,fontWeight:300,letterSpacing:"0.1em",textTransform:"uppercase",color:statusC[v.status]||C.hi,background:"transparent",border:`1px solid ${statusC[v.status]||C.border}`,borderRadius:3,padding:"1px 7px"}}>{v.status}</span>
        <span style={{...T.m,fontSize:11,color:C.ivory,fontWeight:500}}>{v.type==="pct"?v.value+"%":new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:0}).format(v.value)} sleva</span>
        {v.validTo&&<span style={{...T.m,fontSize:10,color:C.dim}}>do {v.validTo.slice(0,7)}</span>}
      </div>
      {v.name&&<div style={{...T.m,fontSize:10,color:C.dim,marginTop:2}}>{v.name}</div>}
    </div>
    <div style={{display:"flex",gap:6,flexShrink:0}}>
      <Btn ch="Duplikovat" onClick={()=>onDup(v)} v="g" sx={{padding:"5px 9px",fontSize:8}}/>
      <Btn ch="Upravit" onClick={()=>onEdit(v)} v="g" sx={{padding:"5px 9px",fontSize:8}}/>
      <Btn ch="×" onClick={()=>onDel(v.id)} v="d" sx={{padding:"5px 9px"}}/>
    </div>
  </div>;
}

            style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,cursor:"pointer",color:C.hi,...T.m,fontSize:11,marginBottom:4}}>
            <span>{inv.client?.id?(inv.client.name||inv.client.company||"Vybraný klient"):"Vybrat z adresáře…"}</span>
            <span style={{fontSize:14,transition:"transform .2s",transform:clientOpen?"rotate(180deg)":"rotate(0)"}}>▾</span>
          </button>
          {clientOpen&&<div style={{border:`1px solid ${C.border}`,borderRadius:3,overflow:"hidden",marginBottom:10,animation:"fadeIn .18s ease"}}>
            {clients.map(cl=><div key={cl.id} onPointerDown={()=>{setInv(p=>({...p,client:{...cl}}));setClientOpen(false);}}
              style={{padding:"10px 14px",cursor:"pointer",background:inv.client?.id===cl.id?C.mDark:C.s1,borderBottom:`1px solid ${C.border}`,transition:"background .1s",touchAction:"manipulation"}}
              onMouseEnter={e=>e.currentTarget.style.background=inv.client?.id===cl.id?C.mDark:C.s0}
              onMouseLeave={e=>e.currentTarget.style.background=inv.client?.id===cl.id?C.mDark:C.s1}>
              <div style={{...T.m,fontSize:12,fontWeight:500,color:C.ivory}}>{cl.name||cl.company}</div>
              {cl.company&&cl.name&&<div style={{...T.m,fontSize:10,color:C.hi}}>{cl.company}</div>}
            </div>)}
          </div>}
          <div style={{height:1,background:C.border,marginBottom:14}}/>
        </div>}
        <div className="grid-2-inp">
          <Inp lbl="Jméno" val={inv.client?.name} onChange={uc("name")} ph="Jan Novák"/>
          <Inp lbl="Firma" val={inv.client?.company} onChange={uc("company")} ph="Firma s.r.o."/>
          <Inp lbl="Ulice" val={inv.client?.street} onChange={uc("street")} ph="Ulice 123"/>
          <Inp lbl="Město" val={inv.client?.city} onChange={uc("city")} ph="Praha"/>
          <Inp lbl="PSČ" val={inv.client?.zip} onChange={uc("zip")} ph="110 00"/>
          <Inp lbl="Stát" val={inv.client?.country||"Česká republika"} onChange={uc("country")}/>
          <Inp lbl="IČO" val={inv.client?.ico} onChange={uc("ico")} ph="12345678"/>
          <Inp lbl="DIČ" val={inv.client?.dic} onChange={uc("dic")} ph="CZ12345678"/>
          <div style={{gridColumn:"1/-1"}}><Inp lbl="E-mail" type="email" val={inv.client?.email} onChange={uc("email")} ph="klient@firma.cz"/></div>
          <div style={{gridColumn:"1/-1"}}><Inp lbl="Telefon" val={inv.client?.phone} onChange={uc("phone")} ph="+420"/></div>
        </div>
      </div>
    </div>

    {/* Items */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <SH c="Položky"/>
      {templateItems.length>0&&<div style={{position:"relative",marginBottom:16}}>
        <Btn ch="+ Ze šablon" onClick={()=>setTplOpen(o=>!o)} v="g" sx={{padding:"7px 12px",fontSize:9}}/>
        {tplOpen&&<div style={{position:"absolute",right:0,top:"calc(100% + 4px)",background:C.s1,border:`1px solid ${C.bHi}`,borderRadius:4,zIndex:200,minWidth:240,boxShadow:"0 12px 40px rgba(0,0,0,.8)",animation:"fadeDown .18s ease"}}>
          {templateItems.map(tpl=><div key={tpl.id} onClick={()=>{addTpl(tpl);setTplOpen(false);}}
            style={{padding:"10px 14px",cursor:"pointer",...T.m,fontSize:12,color:C.ivory,borderBottom:`1px solid ${C.border}`}}
            onMouseEnter={e=>e.currentTarget.style.background=C.s2}
            onMouseLeave={e=>e.currentTarget.style.background="none"}>
            <div>{tpl.description}</div>
            <div style={{fontSize:10,color:C.hi,marginTop:1}}>{fmt(tpl.unitPrice)} / {tpl.unit}</div>
          </div>)}
        </div>}
      </div>}
    </div>

    <div className="tbl-wrap" style={{marginBottom:18}}>
      <div style={{minWidth:500}}>
        <Card sx={{overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 64px 80px 110px 90px 32px",background:C.s2,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,gap:6}}>
            {["Popis","Počet","Jednotka","Cena/ks","Celkem",""].map((h,i)=><div key={i} style={{...T.m,fontSize:8,letterSpacing:"0.14em",textTransform:"uppercase",color:C.dim}}>{h}</div>)}
          </div>
          {inv.items.length===0&&<div style={{padding:20,textAlign:"center",...T.m,fontSize:12,color:C.dim}}>Zatím žádné položky</div>}
          {inv.items.map(item=>{
            const total=(item.qty||0)*(item.unitPrice||0);
            return <div key={item.id} style={{display:"grid",gridTemplateColumns:"1fr 64px 80px 110px 90px 32px",padding:"8px 12px",borderBottom:`1px solid ${C.border}`,alignItems:"center",gap:6}}>
              <input value={item.description} onChange={e=>ui(item.id,"description",e.target.value)} placeholder="Popis…" style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 9px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%"}}/>
              <input type="number" min="0" step="0.5" value={item.qty} onChange={e=>ui(item.id,"qty",+e.target.value)} style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 6px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%",textAlign:"center"}}/>
              <select value={item.unit} onChange={e=>ui(item.id,"unit",e.target.value)} style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 6px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%",appearance:"none"}}>{UNITS.map(u=><option key={u}>{u}</option>)}</select>
              <input type="number" min="0" value={item.unitPrice} onChange={e=>ui(item.id,"unitPrice",+e.target.value)} style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 6px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%",textAlign:"right"}}/>
              <div style={{...T.m,fontSize:12,color:C.ivory,textAlign:"right",whiteSpace:"nowrap"}}>{fmt(total)}</div>
              <button onClick={()=>di(item.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1,touchAction:"manipulation"}}>×</button>
            </div>;
          })}
          <div style={{padding:"10px 12px",background:C.s2,borderTop:`1px solid ${C.border}`}}>
            <Btn ch="+ Přidat položku" onClick={ai} v="g" sx={{padding:"8px 14px",fontSize:10}}/>
          </div>
        </Card>
      </div>
    </div>

    {/* Totals box */}
    {inv.items.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:22}}>
      <Card sx={{padding:"18px 22px",minWidth:270}}>
        {/* Rows */}
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
          {c.discountAmt>0&&<>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:11,color:C.hi}}><span>Mezisoučet</span><span>{fmt(c.subtotal)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:11,color:"#e08040"}}><span>Sleva {disc.type==="pct"?`(${disc.value}%)`:`(${fmt(disc.value)})`}</span><span>−{fmt(c.discountAmt)}</span></div>
          </>}
          {inv.vatEnabled&&<>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:11,color:C.hi}}><span>Základ DPH {inv.vatRate??21}%</span><span>{fmt(c.base)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:11,color:C.hi}}><span>DPH {inv.vatRate??21}%</span><span>{fmt(c.vat)}</span></div>
          </>}
        </div>
        {(c.discountAmt>0||inv.vatEnabled)&&<div style={{height:1,background:C.border,marginBottom:12}}/>}
        {/* Total — label above amount */}
        <div>
          <div style={{...T.m,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:C.hi,marginBottom:4}}>Celkem k úhradě</div>
          <div style={{...T.t,fontSize:36,fontWeight:700,color:C.ivory,lineHeight:1}}>{fmt(c.tot)}</div>
          {inv.vatEnabled&&<div style={{...T.m,fontSize:8,letterSpacing:"0.14em",color:C.dim,marginTop:3,textTransform:"uppercase"}}>Včetně DPH {inv.vatRate??21}%</div>}
        </div>
      </Card>
    </div>}

    <div style={{display:"flex",gap:8,paddingTop:18,borderTop:`1px solid ${C.border}`,flexWrap:"wrap"}}>
      <Btn ch="Uložit" onClick={()=>{onSave(inv);onCancel();}}/>
      <Btn ch="↓ Uložit & PDF" onClick={()=>{onSave(inv);onPrint(inv);onCancel();}} v="g"/>
      <Btn ch="Náhled PDF" onClick={()=>onPrint(inv)} v="g"/>
      <Btn ch="← Zpět" onClick={onCancel} v="g" sx={{marginLeft:"auto"}}/>
    </div>
  </div>;
}

/* ── Archive ───────────────────────────────────────────────────── */
function ArchiveView({invoices,settings,onNew,onEdit,onView,onDup,onStatus,onDelete,confirmFn}){
  const [filter,setFilter]=useState("Vše");
  const [menu,setMenu]=useState(null);
  const mRef=useRef();
  useEffect(()=>{const h=e=>{if(mRef.current&&!mRef.current.contains(e.target))setMenu(null);};document.addEventListener("pointerdown",h);return()=>document.removeEventListener("pointerdown",h);},[]);
  const yr=new Date().getFullYear();
  const yI=invoices.filter(i=>i.issueDate?.startsWith(String(yr)));
  const geff=inv=>inv.status==="Odesláno"&&inv.dueDate&&new Date(inv.dueDate)<new Date()?"Po splatnosti":inv.status;
  const getC=inv=>calcInv(inv.items,inv.vatEnabled,inv.vatRate,inv.discount);
  const stats=[
    {l:`Fakturováno ${yr}`,v:yI.reduce((s,i)=>s+getC(i).tot,0),c:C.ivory},
    {l:"Zaplaceno",v:yI.filter(i=>i.status==="Zaplaceno").reduce((s,i)=>s+getC(i).tot,0),c:"#3aaa5a"},
    {l:"Čeká",v:yI.filter(i=>["Odesláno","Po splatnosti"].includes(i.status)).reduce((s,i)=>s+getC(i).tot,0),c:"#e08040"},
    {l:"Koncepty",v:yI.filter(i=>i.status==="Koncept").length,c:C.hi,cnt:true}
  ];
  const filtered=filter==="Vše"?invoices:filter==="Po splatnosti"?invoices.filter(i=>geff(i)==="Po splatnosti"):invoices.filter(i=>i.status===filter);
  const del=async id=>{
    const inv=invoices.find(i=>i.id===id);
    const ok=await confirmFn(`Smazat fakturu ${inv?.number||""}?\nTato akce je nevratná.`);
    if(ok)onDelete(id);
  };
  return <div className="anim-fadein">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
      <div style={{...T.t,fontSize:28,fontWeight:700,letterSpacing:"0.14em",color:C.ivory}}>FAKTURY</div>
      <Btn ch="+ Nová faktura" onClick={onNew} sx={{padding:"9px 18px"}}/>
    </div>
    <div className="grid-4" style={{marginBottom:24}}>
      {stats.map(s=><Card key={s.l} sx={{padding:"14px 18px"}}>
        <Lbl c={s.l} s={{marginBottom:4,fontSize:8}}/>
        <div style={{...T.t,fontSize:s.cnt?26:20,fontWeight:600,color:s.c,lineHeight:1.2}}>{s.cnt?s.v+" ks":fmt(s.v)}</div>
      </Card>)}
    </div>
    <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch",marginBottom:12}}>
      {["Vše","Koncept","Odesláno","Zaplaceno","Po splatnosti","Storno"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.merlot:"transparent",border:`1px solid ${filter===f?C.merlot:C.border}`,borderRadius:3,padding:"7px 12px",cursor:"pointer",...T.m,fontSize:9,fontWeight:filter===f?500:400,letterSpacing:"0.12em",textTransform:"uppercase",color:filter===f?C.ivory:C.dim,whiteSpace:"nowrap",transition:"all .15s",touchAction:"manipulation"}}>{f}</button>
      ))}
    </div>
    {filtered.length===0
      ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"64px 0",textAlign:"center"}}>
        <div style={{...T.t,fontSize:22,letterSpacing:"0.2em",color:C.dim,marginBottom:8}}>ŽÁDNÉ FAKTURY</div>
        <div style={{...T.m,fontSize:11,color:C.dim,marginBottom:20}}>{filter==="Vše"?"Začni vytvořením první faktury":"Žádná faktura neodpovídá filtru"}</div>
        {filter==="Vše"&&<Btn ch="+ Nová faktura" onClick={onNew}/>}
      </div>
      :<Card>
        {filtered.map((inv,idx)=>{
          const c2=getC(inv);const eff=geff(inv);const past=eff==="Po splatnosti";
          return <div key={inv.id} onClick={()=>onView(inv)}
            onMouseEnter={e=>e.currentTarget.style.background=C.s0}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}
            style={{padding:"14px 18px",borderBottom:idx<filtered.length-1?`1px solid ${C.border}`:"none",cursor:"pointer",transition:"background .1s",animation:`fadeIn .22s ease ${Math.min(idx,8)*0.04}s both`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,flexWrap:"wrap"}}>
                  <div style={{...T.t,fontSize:15,fontWeight:600,letterSpacing:"0.08em",color:C.ivory}}>{inv.number}</div>
                  <Pill s={eff}/>
                </div>
                <div style={{...T.m,fontSize:13,color:C.ivory,fontWeight:500,marginBottom:3}}>{inv.client?.name||inv.client?.company||<span style={{color:C.dim}}>—</span>}</div>
                {inv.client?.company&&inv.client?.name&&<div style={{...T.m,fontSize:10,color:C.hi,marginBottom:3}}>{inv.client.company}</div>}
                <div style={{display:"flex",gap:18,marginTop:4}}>
                  <span style={{...T.m,fontSize:10,color:C.hi}}>Vystaveno: {fmtD(inv.issueDate)}</span>
                  <span style={{...T.m,fontSize:10,color:past?"#e04040":C.hi,fontWeight:past?600:400}}>Splatnost: {fmtD(inv.dueDate)}</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <div style={{...T.t,fontSize:20,fontWeight:300,color:C.ivory}}>{fmt(c2.tot)}</div>
                <div ref={menu===inv.id?mRef:null} onClick={e=>e.stopPropagation()} style={{position:"relative"}}>
                  <button onPointerDown={e=>{e.stopPropagation();setMenu(p=>p===inv.id?null:inv.id);}}
                    style={{background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"7px 11px",cursor:"pointer",color:C.hi,fontSize:16,touchAction:"manipulation"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=C.bHi}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}
                  >⋯</button>
                  {menu===inv.id&&<div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:C.s1,border:`1px solid ${C.bHi}`,borderRadius:4,zIndex:300,minWidth:190,boxShadow:"0 20px 60px rgba(0,0,0,.9)",animation:"fadeDown .18s ease"}}>
                    {[
                      {l:"↓ Tisknout / PDF",a:()=>{onView(inv);setMenu(null);}},
                      {l:"Upravit",a:()=>{onEdit(inv);setMenu(null);}},
                      {l:"Duplikovat",a:()=>{onDup(inv);setMenu(null);}},
                      {sep:true},
                      ...STATUSES.filter(s=>s!==inv.status).map(s=>({l:`→ ${s}`,a:()=>{onStatus(inv.id,s);setMenu(null);}})),
                      {sep:true},
                      {l:"Smazat fakturu",a:async()=>{setMenu(null);await del(inv.id);},danger:true}
                    ].map((item,i)=>item.sep
                      ?<div key={i} style={{height:1,background:C.border,margin:"3px 0"}}/>
                      :<button key={i} onClick={item.a}
                        style={{display:"block",width:"100%",background:"none",border:"none",padding:"11px 16px",cursor:"pointer",textAlign:"left",...T.m,fontSize:12,color:item.danger?"#c03030":C.ivory,touchAction:"manipulation"}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.s2}
                        onMouseLeave={e=>e.currentTarget.style.background="none"}
                      >{item.l}</button>
                    )}
                  </div>}
                </div>
              </div>
            </div>
          </div>;
        })}
      </Card>
    }
  </div>;
}

/* ── App ───────────────────────────────────────────────────────── */
function App(){
  const [authed,setAuthed]=useState(()=>localStorage.getItem("liberti_auth")==="1");
  const [invoices,setInvState]=useState([]);
  const [clients,setCliState]=useState([]);
  const [templateItems,setTplState]=useState([]);
  const [vouchers,setVchState]=useState([]);
  const [settings,setSetState]=useState(DEF);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [loadErr,setLoadErr]=useState("");
  const [view,setView]=useState("archive");
  const [editing,setEditing]=useState(null);
  const [toast,setToast]=useState("");
  const {confirm,Modal}=useConfirm();

  useEffect(()=>{if(authed)load();},[authed]);

  useEffect(()=>{
    const onClose=()=>localStorage.removeItem("liberti_auth");
    window.addEventListener("pagehide",onClose);
    return()=>window.removeEventListener("pagehide",onClose);
  },[]);

  const load=async()=>{
    setLoading(true);setLoadErr("");
    try{
      const safe=p=>p.catch(()=>null);
      const[inv,cli,tpl,vch,set]=await Promise.all([
        apiRead("invoices"),apiRead("clients"),safe(apiRead("templateItems")),safe(apiRead("vouchers")),apiRead("settings")
      ]);
      setInvState(Array.isArray(inv)?inv:[]);
      setCliState(Array.isArray(cli)?cli:[]);
      setTplState(Array.isArray(tpl)?tpl:[]);
      setVchState(Array.isArray(vch)?vch:[]);
      setSetState(set&&typeof set==="object"?{...DEF,...set}:DEF);
    }catch(e){setLoadErr(e.message);}
    setLoading(false);
  };

  const CORE_TYPES=["invoices","clients","settings"];
  const bgSave=async(type,data)=>{setSaving(true);try{await apiWrite(type,data);}catch(e){if(CORE_TYPES.indexOf(type)>=0)showToast("⚠ Chyba ukládání");else showToast("⚠ Aktualizuj Apps Script pro ukládání "+type);}setSaving(false);};
  const setInv=d=>{setInvState(d);bgSave("invoices",d);};
  const setCli=d=>{setCliState(d);bgSave("clients",d);};
  const setTpl=d=>{setTplState(d);bgSave("templateItems",d);};
  const setVch=d=>{setVchState(d);bgSave("vouchers",d);};
  const setSet=d=>{setSetState(d);bgSave("settings",d);};
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),3000);};

  const mkNum=()=>`${settings.prefix||"FAK"}-${new Date().getFullYear()}-${String(settings.nextNum||1).padStart(3,"0")}`;
  const newInv=()=>{
    const d=toDay();
    setEditing({id:uid(),number:mkNum(),variableSymbol:"",status:"Koncept",issueDate:d,duzp:d,dueDate:plusD(d,settings.payDays||14),paymentMethod:"Bankovní převod",client:{},items:[],note:"",vatEnabled:!!settings.vatPayer,vatRate:21,discount:{enabled:false,type:"pct",value:0},createdAt:Date.now()});
    setView("editor");
  };
  const saveInv=inv=>{
    const isNew=!invoices.find(i=>i.id===inv.id);
    const upd=isNew?[inv,...invoices]:invoices.map(i=>i.id===inv.id?inv:i);
    setInv(upd);
    if(isNew)setSet({...settings,nextNum:(settings.nextNum||1)+1});
    setEditing(inv);
    showToast("✓ Uloženo");
  };
  const dupInv=inv=>{
    const d=toDay();
    setEditing({...inv,id:uid(),number:mkNum(),status:"Koncept",issueDate:d,duzp:d,duzpManual:false,dueDate:plusD(d,settings.payDays||14),createdAt:Date.now()});
    setSet({...settings,nextNum:(settings.nextNum||1)+1});
    setView("editor");
  };
  const logout=async()=>{
    const ok=await confirm("Odhlásit se z LIBERTI Hub?");
    if(ok){localStorage.removeItem("liberti_auth");setAuthed(false);}
  };

  if(!authed)return <PinLogin onSuccess={()=>setAuthed(true)}/>;
  if(loading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18}}>
      <BrandLogo height={28} color={C.ivory}/>
      <div style={{display:"flex",alignItems:"center",gap:10}}><Spin sz={15}/><span style={{...T.m,fontSize:9,letterSpacing:"0.2em",color:C.dim,textTransform:"uppercase"}}>Načítám…</span></div>
    </div>
  );
  if(loadErr)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:380,width:"100%",textAlign:"center"}}>
        <div style={{marginBottom:22}}><BrandLogo height={24} color={C.ivory}/></div>
        <Card sx={{padding:"24px",borderColor:C.mBorder}}>
          <div style={{...T.t,fontSize:18,letterSpacing:"0.14em",color:"#e06060",marginBottom:10}}>CHYBA PŘIPOJENÍ</div>
          <div style={{...T.m,fontSize:11,color:C.hi,lineHeight:1.7,marginBottom:20}}>{loadErr}</div>
          <Btn ch="Zkusit znovu" onClick={load}/>
        </Card>
      </div>
    </div>
  );

  const NAV=[
    {id:"settings",l:"Nastavení",icon:"◇"},
    {id:"clients",l:"Klienti",icon:"○"},
    {id:"items",l:"Položky",icon:"≡"},
    {id:"vouchers",l:"Vouchery",icon:"◈"},
    {id:"archive",l:"Faktury",icon:"◫"}
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
      {Modal}
      <header style={{borderBottom:`1px solid ${C.border}`,padding:"0 32px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,background:C.bg,zIndex:100}} className="header-pad">
        <div style={{display:"flex",alignItems:"center"}}>
          <BrandLogo height={19} color={C.ivory}/>
          <span style={{...T.m,fontSize:7.5,letterSpacing:"0.2em",textTransform:"uppercase",color:C.merlot,borderLeft:`1px solid ${C.border}`,paddingLeft:14,marginLeft:14}} className="hide-tab">Hub</span>
          <div style={{borderLeft:`1px solid ${C.border}`,marginLeft:12,paddingLeft:4,display:"flex"}} className="hide-tab">
            {NAV.map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"0 12px",height:54,...T.m,fontSize:10,fontWeight:500,letterSpacing:"0.13em",textTransform:"uppercase",color:view===n.id?C.ivory:C.dim,borderBottom:`2px solid ${view===n.id?C.merlot:"transparent"}`,transition:"color .15s,border-color .15s"}}>{n.l}</button>)}
          </div>
        </div>
        {/* Always visible: saving indicator + toast + logout */}
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {saving&&<div style={{display:"flex",alignItems:"center",gap:7}}><Spin sz={12}/><span style={{...T.m,fontSize:9,color:C.dim,textTransform:"uppercase",letterSpacing:"0.12em"}} className="hide-tab">Ukládám…</span></div>}
          {toast&&!saving&&<span style={{...T.m,fontSize:9,letterSpacing:"0.12em",color:toast.startsWith("⚠")?"#e06060":"#3aaa5a",animation:"fadeIn .2s ease"}}>{toast}</span>}
          {view==="editor"&&editing&&<div style={{display:"flex",gap:7}}>
            <Btn ch="Uložit" onClick={()=>saveInv(editing)} sx={{padding:"7px 14px"}}/>
            <Btn ch="↓ PDF" onClick={()=>{saveInv(editing);printInv(editing,settings);}} v="g" sx={{padding:"7px 12px"}}/>
            <Btn ch="← Zpět" onClick={()=>setView("archive")} v="g" sx={{padding:"7px 12px"}}/>
          </div>}
          <button onClick={logout} style={{...T.m,background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,padding:"7px 12px",cursor:"pointer",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.dim,transition:"border-color .15s,color .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.mBorder;e.currentTarget.style.color="#c03030";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.dim;}}
          >Odhlásit</button>
        </div>
      </header>

      <main style={{flex:1,padding:"28px 32px 90px",maxWidth:1160,width:"100%",margin:"0 auto"}} className="main-pad">
        {view==="archive"&&<ArchiveView invoices={invoices} settings={settings} onNew={newInv} onEdit={inv=>{setEditing(inv);setView("editor");}} onView={inv=>printInv(inv,settings)} onDup={dupInv} onStatus={(id,s)=>setInv(invoices.map(i=>i.id===id?{...i,status:s}:i))} onDelete={id=>setInv(invoices.filter(i=>i.id!==id))} confirmFn={confirm}/>}
        {view==="editor"&&editing&&<EditorView inv={editing} clients={clients} templateItems={templateItems} vouchers={vouchers} settings={settings} onSave={inv=>{setEditing(inv);saveInv(inv);}} onCancel={()=>setView("archive")} onPrint={inv=>printInv(inv,settings)}/>}
        {view==="items"&&<ItemsView templateItems={templateItems} setTemplateItems={setTpl} confirmFn={confirm}/>}
        {view==="clients"&&<ClientsView clients={clients} setClients={setCli} confirmFn={confirm}/>}
        {view==="vouchers"&&<VouchersView vouchers={vouchers} setVouchers={setVch} confirmFn={confirm}/>}
        {view==="settings"&&<SettingsView settings={settings} onSave={d=>{setSet(d);showToast("✓ Nastavení uloženo");}}/>}
      </main>

      {/* Bottom nav mobile */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:C.s1,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        <style>{`@media(min-width:901px){nav{display:none!important}}`}</style>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setView(n.id)}
            style={{flex:1,padding:"10px 0",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,touchAction:"manipulation"}}>
            <span style={{fontSize:15,opacity:view===n.id?1:.3,transition:"opacity .15s"}}>{n.icon}</span>
            <span style={{...T.m,fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",color:view===n.id?C.merlot:C.dim,fontWeight:view===n.id?600:400,transition:"color .15s"}}>{n.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

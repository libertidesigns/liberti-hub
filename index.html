function jsonpCall(url,params){
  return new Promise(function(resolve,reject){
    var cbName='jcb_'+Math.random().toString(36).slice(2);
    var sc;
    var timer=setTimeout(function(){delete window[cbName];if(sc&&sc.parentNode)sc.parentNode.removeChild(sc);reject(new Error('Timeout'));},14000);
    window[cbName]=function(data){clearTimeout(timer);delete window[cbName];if(sc&&sc.parentNode)sc.parentNode.removeChild(sc);if(data.ok===false)reject(new Error(data.error||'API chyba'));else resolve(data);};
    var q=Object.keys(params).map(function(k){return k+'='+params[k];}).join('&');
    sc=document.createElement('script');sc.src=url+'?'+q+'&callback='+cbName;
    sc.onerror=function(){clearTimeout(timer);delete window[cbName];reject(new Error('Chyba načítání.'));};
    document.head.appendChild(sc);
  });
}
function apiRead(type){return jsonpCall(API_URL,{action:'read',type:type,t:Date.now()}).then(function(d){return d.data;});}
function apiWrite(type,data){var enc=encodeURIComponent(JSON.stringify(data));return jsonpCall(API_URL,{action:'write',type:type,data:enc,t:Date.now()});}

function calcInv(items, vatEnabled, vatRate, discount){
  const subtotal = items.reduce((s,i)=>(s+(i.qty||0)*(i.unitPrice||0)),0);
  let discountAmt = 0;
  if(discount && discount.enabled){
    discountAmt = discount.type==="pct" ? subtotal*(discount.value||0)/100 : (discount.value||0);
    discountAmt = Math.min(discountAmt, subtotal);
  }
  const base = subtotal - discountAmt;
  const vat = vatEnabled ? base*(vatRate||21)/100 : 0;
  return {subtotal, discountAmt, base, vat, tot: base+vat};
}

function playIntroSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==="suspended")ctx.resume();
    const now=ctx.currentTime;
    const mk=(type,freq,start,end,gainPeak,gainStart,gainEnd)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type;o.frequency.setValueAtTime(freq,now+start);
      g.gain.setValueAtTime(gainStart||0,now+start);
      g.gain.linearRampToValueAtTime(gainPeak,now+start+0.15);
      g.gain.linearRampToValueAtTime(gainEnd||0,now+end);
      o.connect(g);g.connect(ctx.destination);
      o.start(now+start);o.stop(now+end+0.05);
    };
    mk("sine",42,0,2.8,0.18,0,0);           // sub drone
    mk("triangle",110,0.1,2.5,0.06,0,0);    // mid warmth
    mk("sine",880,0.75,1.9,0.035,0,0);      // shimmer
    mk("sine",528,2.55,3.8,0.08,0,0.001);   // chime
  }catch(e){}
}

function PinLogin({onSuccess}){
  const [pin,setPin]=useState("");
  const [phase,setPhase]=useState("intro");
  const [username,setUsername]=useState(()=>localStorage.getItem("liberti_user")||"");
  const [usernameErr,setUsernameErr]=useState("");
  const [matchedRole,setMatchedRole]=useState(null);
  const [pinErr,setPinErr]=useState(false);
  const T300={fontFamily:"'Teko',sans-serif",fontWeight:300};

  const getCachedRoles=()=>{
    try{return JSON.parse(localStorage.getItem("liberti_roles")||"[]");}catch(e){return [];}
  };

  // Auto-login pokud máme uloženou session
  useEffect(()=>{
    const savedRole=localStorage.getItem("liberti_auth_role");
    const savedUser=localStorage.getItem("liberti_user");
    if(savedRole&&savedUser){
      const isAdm=savedRole==="admin";
      const roles=getCachedRoles();
      const role=isAdm?{v:"admin",l:"Admin",isAdmin:true}:(roles.find(r=>r.v===savedRole)||{v:savedRole,l:savedRole,isAdmin:false});
      onSuccess(role,savedUser);
      return;
    }
    const sa=setTimeout(()=>{try{playIntroSound();}catch(e){}},300);
    const t=setTimeout(()=>setPhase("pin"),2600);
    return()=>{clearTimeout(sa);clearTimeout(t);}
  },[]);

  // Keyboard
  useEffect(()=>{
    const h=e=>{
      if(phase==="pin"){
        if(/^[0-9]$/.test(e.key))handleDigit(e.key);
        else if(e.key==="Backspace")setPin(p=>p.slice(0,-1));
      } else if(phase==="username"&&e.key==="Enter"){
        doLogin();
      }
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[phase,matchedRole,username]);

  const checkCode=code=>{
    if(code===ADMIN_PIN)return {v:"admin",l:"Admin",isAdmin:true};
    const roles=getCachedRoles();
    return roles.find(r=>r.code&&r.code===code)||null;
  };

  const handleDigit=d=>{
    const next=pin+d;
    setPin(next);
    if(next.length===7){
      const role=checkCode(next);
      if(role){
        setPinErr(false);
        if(role.isAdmin){
          // Admin - přihlásí se bez username
          localStorage.setItem("liberti_auth_role","admin");
          localStorage.setItem("liberti_user","admin");
          setPin("");
          onSuccess(role,"admin");
        } else {
          setMatchedRole(role);
          setPin("");
          setPhase("username");
        }
      } else {
        setPinErr(true);
        setTimeout(()=>{setPin("");setPinErr(false);},600);
      }
    }
  };

  const doLogin=()=>{
    const u=username.trim().toLowerCase();
    if(!u){setUsernameErr("Zadej přihlašovací jméno");return;}
    if(!matchedRole)return;
    localStorage.setItem("liberti_auth_role",matchedRole.v);
    localStorage.setItem("liberti_user",u);
    onSuccess(matchedRole,u);
  };

  const isIntro=phase==="intro";
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)",pointerEvents:"none"}}/>

      {/* Logo */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",
        transform:isIntro?"translateY(0)":"translateY(-32px)",marginBottom:isIntro?0:44,
        transition:"transform 0.9s cubic-bezier(.22,1,.36,1),margin 0.9s cubic-bezier(.22,1,.36,1)"}}>
        <div style={{...T300,fontSize:isIntro?"clamp(64px,12vw,96px)":"52px",
          letterSpacing:"0.26em",textIndent:"0.26em",color:C.ivory,lineHeight:1,textAlign:"center",
          animation:"revealLogo 1.1s cubic-bezier(.22,1,.36,1) both",
          transition:"font-size 0.9s cubic-bezier(.22,1,.36,1)"}}>LIBERTI</div>
        <div style={{display:"flex",alignItems:"center",
          width:isIntro?"clamp(240px,40vw,360px)":"220px",gap:14,marginTop:isIntro?18:12,
          transition:"width 0.9s cubic-bezier(.22,1,.36,1)",overflow:"hidden"}}>
          <div style={{height:1,flex:1,background:"rgba(139,26,26,.7)",transformOrigin:"left",animation:"lineGrow .8s cubic-bezier(.22,1,.36,1) .7s both"}}/>
          <div style={{...T300,fontSize:isIntro?22:16,letterSpacing:"0.44em",color:C.merlot,
            animation:"hubFade .6s cubic-bezier(.22,1,.36,1) 1s both",transition:"font-size 0.9s ease",flexShrink:0}}>HUB</div>
          <div style={{height:1,flex:1,background:"rgba(139,26,26,.7)",transformOrigin:"right",animation:"lineGrow .8s cubic-bezier(.22,1,.36,1) .7s both"}}/>
        </div>
      </div>

      {/* PIN */}
      {phase==="pin"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20,
        opacity:isIntro?0:1,transform:isIntro?"translateY(12px)":"translateY(0)",
        transition:"opacity 0.7s ease 0.1s,transform 0.7s cubic-bezier(.22,1,.36,1) 0.1s",
        pointerEvents:isIntro?"none":"auto"}}>
        <div style={{...T.m,fontSize:FS.s,letterSpacing:"0.32em",textTransform:"uppercase",color:C.hi}}>Zadej přístupový kód</div>
        <div style={{display:"flex",gap:14}}>
          {Array.from({length:7}).map((_,i)=>(
            <div key={i} style={{width:13,height:13,borderRadius:"50%",
              background:pinErr?"#5a0a0a":i<pin.length?C.merlot:C.s2,
              border:`1px solid ${pinErr?"#8B1A1A":i<pin.length?C.merlot:C.border}`,
              transition:"all .15s",
              boxShadow:i<pin.length&&!pinErr?"0 0 10px rgba(139,26,26,.5)":"none"}}/>
          ))}
        </div>
        {pinErr&&<div style={{...T.m,fontSize:FS.s,color:"#c03030",letterSpacing:"0.2em",textTransform:"uppercase",animation:"fadeIn .2s ease"}}>Nesprávný kód</div>}
        <div className="pin-numpad" style={{marginTop:8}}>
          {[[1,2,3],[4,5,6],[7,8,9],["","0","⌫"]].map((row,ri)=>(
            <div key={ri} style={{display:"flex",gap:12,justifyContent:"center",marginBottom:10}}>
              {row.map((d,di)=>(
                <button key={di}
                  onClick={()=>{if(d==="⌫")setPin(p=>p.slice(0,-1));else if(d!=="")handleDigit(String(d));}}
                  disabled={d===""}
                  style={{width:64,height:64,borderRadius:"50%",
                    border:`1px solid ${d===""?"transparent":C.border}`,
                    background:d===""?"transparent":C.s2,cursor:d===""?"default":"pointer",
                    color:C.ivory,...T300,fontSize:26,display:"flex",alignItems:"center",justifyContent:"center",
                    WebkitTapHighlightColor:"transparent",touchAction:"manipulation"}}>
                  {d}
                </button>
              ))}
            </div>
          ))}
        </div>
      </div>}

      {/* Username */}
      {phase==="username"&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16,
        animation:"fadeIn .4s ease",maxWidth:340,width:"90%"}}>
        {matchedRole&&<div style={{...T300,fontSize:20,letterSpacing:"0.2em",color:C.merlot,textAlign:"center"}}>
          {matchedRole.l}
        </div>}
        <div style={{...T.m,fontSize:FS.s,letterSpacing:"0.2em",textTransform:"uppercase",color:C.hi}}>Přihlašovací jméno</div>
        <div style={{...T.m,fontSize:FS.s,color:C.dim,textAlign:"center",lineHeight:1.7}}>
          bez diakritiky, např. <span style={{color:C.ivory}}>novak.jan</span>
        </div>
        <div style={{width:"100%"}}>
          <input value={username} onChange={e=>{setUsername(e.target.value.toLowerCase());setUsernameErr("");}}
            placeholder="novak.jan" autoFocus
            style={{width:"100%",boxSizing:"border-box",background:C.s2,
              border:`1px solid ${usernameErr?C.merlot:C.border}`,borderRadius:4,
              padding:"14px 18px",color:C.ivory,...T.m,fontSize:FS.b,outline:"none",textAlign:"center"}}/>
          {usernameErr&&<div style={{...T.m,fontSize:FS.s,color:C.merlot,marginTop:6,textAlign:"center"}}>{usernameErr}</div>}
        </div>
        <button onClick={doLogin}
          style={{...T300,fontSize:22,letterSpacing:"0.2em",background:C.merlot,color:C.ivory,border:"none",borderRadius:4,padding:"12px 40px",cursor:"pointer"}}>
          Vstoupit
        </button>
        <button onClick={()=>{setPhase("pin");setPin("");setMatchedRole(null);setUsernameErr("");}}
          style={{...T.m,fontSize:FS.s,color:C.dim,background:"transparent",border:"none",cursor:"pointer"}}>Zpět</button>
      </div>}

      <div style={{position:"absolute",bottom:28,opacity:isIntro?0:0.6,transition:"opacity 1s ease 1.2s"}}>
        <div style={{...T.m,fontSize:FS.s,letterSpacing:"0.22em",color:C.dim,textTransform:"uppercase"}}>{"Liberti Hub · "+new Date().getFullYear()}</div>
      </div>
    </div>
  );
}

function Pill({s}){const st=ST[s]||ST.Koncept;return <span style={{...T.m,fontSize:FS.s,fontWeight:300,letterSpacing:"0.12em",textTransform:"uppercase",color:st.c,background:st.bg,border:`1px solid ${st.b}`,borderRadius:3,padding:"3px 9px",whiteSpace:"nowrap"}}>{s}</span>;}
function Spin({sz=18}){return <div style={{width:sz,height:sz,border:`2px solid ${C.border}`,borderTop:`2px solid ${C.merlot}`,borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>;}
function Card({children,sx={}}){return <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:4,...sx}}>{children}</div>;}
function SH({c}){return <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><span style={{...T.t,fontSize:17,fontWeight:600,letterSpacing:"0.16em",color:C.ivory,textTransform:"uppercase"}}>{c}</span><div style={{flex:1,height:1,background:C.border}}/></div>;}
function Inp({lbl,val,onChange,ph,type="text",ml,rows=3,opts,sx={}}){
  const base={width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"11px 12px",color:C.ivory,...T.m,fontSize:13,resize:"vertical",boxSizing:"border-box",transition:"border-color .15s",...sx};
  const strVal = val===null||val===undefined?"":String(val);
  return <div>{lbl&&<Lbl c={lbl}/>}{ml?<textarea value={strVal} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={rows} style={base}/>:opts?<select value={strVal} onChange={e=>onChange(e.target.value)} style={{...base,cursor:"pointer",appearance:"none"}}>{opts.map(o=><option key={o.v??o} value={o.v??o}>{o.l??o}</option>)}</select>:<input type={type} value={strVal} onChange={e=>onChange(e.target.value)} placeholder={ph} style={base}/>}</div>;
}
function Btn({ch,onClick,v="p",sx={},dis=false}){
  const vs={p:{bg:C.merlot,c:C.ivory,b:"none"},g:{bg:"transparent",c:C.hi,b:`1px solid ${C.bHi}`},d:{bg:"transparent",c:"#c03030",b:"1px solid #3a0e0e"}};
  const st=vs[v]||vs.p;
  return <button onClick={onClick} disabled={dis} style={{...st,background:st.bg,color:st.c,border:st.b,borderRadius:4,padding:"11px 18px",cursor:dis?"not-allowed":"pointer",...T.m,fontSize:FS.b,fontWeight:500,letterSpacing:"0.1em",textTransform:"uppercase",opacity:dis?.4:1,touchAction:"manipulation",transition:"opacity .15s",...sx}}>{ch}</button>;
}
function ChkRow({label,checked,onChange,note}){
  const id="chk_"+Math.random().toString(36).slice(2,8);
  return(
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,cursor:"pointer"}} onClick={()=>onChange(!checked)}>
      <input type="checkbox" id={id} checked={!!checked} onChange={e=>{e.stopPropagation();onChange(e.target.checked);}} onClick={e=>e.stopPropagation()} style={{width:16,height:16,cursor:"pointer",accentColor:C.merlot,flexShrink:0}}/>
      <div>
        <label htmlFor={id} style={{...T.m,fontSize:13,color:C.hi,cursor:"pointer",display:"block"}}>{label}</label>
        {note&&<div style={{...T.m,fontSize:FS.s,color:C.dim,marginTop:1}}>{note}</div>}
      </div>
    </div>
  );
}

/* ── Print ─────────────────────────────────────────────────────── */
function printInv(inv, settings) {
  var c = calcInv(inv.items, inv.vatEnabled, inv.vatRate, inv.discount);
  var cl = inv.client || {};
  var vs = inv.variableSymbol || vsFrom(inv.number);
  var isVat = !!inv.vatEnabled;
  var vatRate = inv.vatRate || 21;
  var docType = isVat ? 'DAŇOVÝ DOKLAD' : 'FAKTURA';

  var rows = inv.items.map(function(i) {
    var b = (i.qty||0)*(i.unitPrice||0);
    return '<tr><td class="td-d">'+(i.description||'—')+'</td>'
      +'<td class="td-n">'+i.qty+'</td>'
      +'<td class="td-u">'+i.unit+'</td>'
      +'<td class="td-n">'+fmt(i.unitPrice)+'</td>'
      +'<td class="td-t">'+fmt(b)+'</td></tr>';
  }).join('');

  var payBlock = '';
  if (settings.bank || settings.iban) {
    payBlock = '<div class="pay-sec"><div class="pay-lbl">Platební údaje</div><table class="pay-tbl">';
    if (settings.bank)  payBlock += '<tr><td class="pk">Číslo účtu</td><td class="pv">'+settings.bank+'</td></tr>';
    if (settings.iban)  payBlock += '<tr><td class="pk">IBAN</td><td class="pv">'+settings.iban+'</td></tr>';
    if (settings.swift) payBlock += '<tr><td class="pk">SWIFT/BIC</td><td class="pv">'+settings.swift+'</td></tr>';
    if (vs)             payBlock += '<tr><td class="pk">Variabilní symbol</td><td class="pv"><strong>'+vs+'</strong></td></tr>';
    payBlock += '</table></div>';
  }

  // Supplier meta rows
  var suppMeta = '';
  var suppAddr = [settings.street, [settings.zip, settings.city].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if (suppAddr)  suppMeta += '<tr><td class="mk">Adresa:</td><td class="mv">'+suppAddr+'</td></tr>';
  if (settings.ico)   suppMeta += '<tr><td class="mk">IČO:</td><td class="mv">'+settings.ico+'</td></tr>';
  if (settings.dic && isVat) suppMeta += '<tr><td class="mk">DIČ:</td><td class="mv">'+settings.dic+'</td></tr>';
  if (settings.email) suppMeta += '<tr><td class="mk">E-mail:</td><td class="mv">'+settings.email+'</td></tr>';
  if (settings.phone) suppMeta += '<tr><td class="mk">Tel:</td><td class="mv">'+settings.phone+'</td></tr>';

  // Client meta rows
  var clMeta = '';
  var clAddr = [cl.street, [cl.zip, cl.city].filter(Boolean).join(' ')].filter(Boolean).join(', ');
  if (clAddr)  clMeta += '<tr><td class="mk">Adresa:</td><td class="mv">'+clAddr+'</td></tr>';
  if (cl.ico)   clMeta += '<tr><td class="mk">IČO:</td><td class="mv">'+cl.ico+'</td></tr>';
  if (cl.dic)   clMeta += '<tr><td class="mk">DIČ:</td><td class="mv">'+cl.dic+'</td></tr>';
  if (cl.email) clMeta += '<tr><td class="mk">E-mail:</td><td class="mv">'+cl.email+'</td></tr>';
  if (cl.phone) clMeta += '<tr><td class="mk">Tel:</td><td class="mv">'+cl.phone+'</td></tr>';

  // Totals block
  var totalsInner = '';
  if (c.discountAmt > 0) {
    var discLabel = 'Sleva';
    if (inv.discount && inv.discount.voucherCode) discLabel = 'Sleva ('+inv.discount.voucherCode+')';
    totalsInner += '<tr><td class="vl">Mezisoučet</td><td class="vv">'+fmt(c.subtotal)+'</td></tr>';
    totalsInner += '<tr><td class="vl">'+discLabel+'</td><td class="vv">−'+fmt(c.discountAmt)+'</td></tr>';
    totalsInner += '<tr><td class="vl">Základ</td><td class="vv">'+fmt(c.base)+'</td></tr>';
  }
  if (isVat) {
    if (c.discountAmt === 0) totalsInner += '<tr><td class="vl">Základ DPH '+vatRate+'%</td><td class="vv">'+fmt(c.base)+'</td></tr>';
    totalsInner += '<tr><td class="vl">DPH '+vatRate+'%</td><td class="vv">'+fmt(c.vat)+'</td></tr>';
  }

  var html = '<!DOCTYPE html><html lang="cs"><head><meta charset="utf-8">'
    + '<title>'+inv.number+'</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">'
    + '<style>'
    + '*{box-sizing:border-box;margin:0;padding:0}'
    + 'body{font-family:Montserrat,sans-serif;background:#fff;color:#111;font-size:12.5px;line-height:1.5}'
    + '@page{size:A4;margin:14mm 17mm}'
    + '@media print{.np{display:none!important}}'
    + '.page{max-width:790px;margin:0 auto;padding:36px 0}'
    + '.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}'
    + '.logo-text{font-family:Teko,sans-serif;font-weight:600;font-size:38px;letter-spacing:7px;color:#111;line-height:1}'
    + '.doc-info{text-align:right}'
    + '.doc-type{font-family:Teko,sans-serif;font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#bbb;margin-bottom:3px}'
    + '.doc-num{font-family:Teko,sans-serif;font-size:24px;font-weight:600;letter-spacing:3px;color:#111}'
    + 'hr.div{border:none;border-top:1.5px solid #111;margin-bottom:20px}'
    + '.parties{display:grid;grid-template-columns:1fr 28px 1fr;margin-bottom:18px}'
    + '.party-lbl{font-family:Teko,sans-serif;font-size:9px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#ccc;margin-bottom:6px}'
    + '.party-name{font-size:14px;font-weight:600;color:#111;margin-bottom:3px}'
    + '.party-addr{font-size:11.5px;color:#555;line-height:1.6;margin-bottom:5px}'
    /* Aligned meta table */
    + 'table.meta{border-collapse:collapse}'
    + '.mk{font-size:11px;color:#bbb;padding:1.5px 10px 1.5px 0;white-space:nowrap;vertical-align:top}'
    + '.mv{font-size:11.5px;color:#333;padding:1.5px 0;vertical-align:top}'
    /* Date meta box */
    + '.meta-box{display:grid;grid-template-columns:repeat(5,1fr);background:#f8f8f8;border:1px solid #ebebeb;border-radius:4px;margin-bottom:20px;overflow:hidden}'
    + '.mc{padding:10px 13px;border-right:1px solid #ebebeb}'
    + '.mc:last-child{border-right:none}'
    + '.ml{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:#ccc;height:26px;display:flex;align-items:flex-start;line-height:1.25}'
    + '.mv2{font-size:12px;font-weight:500;color:#111;margin-top:2px}'
    /* Items table */
    + 'table.items{width:100%;border-collapse:collapse;margin-bottom:14px}'
    + 'th{font-family:Teko,sans-serif;font-size:9.5px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#bbb;border-bottom:1.5px solid #111;padding:6px 5px;text-align:left}'
    + '.th-r{text-align:right}'
    + '.td-d{padding:9px 5px;border-bottom:1px solid #f0f0f0;font-size:12.5px;color:#111}'
    + '.td-n{padding:9px 5px;border-bottom:1px solid #f0f0f0;text-align:right;font-size:11.5px;color:#555;white-space:nowrap}'
    + '.td-u{padding:9px 5px;border-bottom:1px solid #f0f0f0;text-align:center;font-size:11px;color:#bbb}'
    + '.td-t{padding:9px 5px;border-bottom:1px solid #f0f0f0;text-align:right;font-size:12.5px;font-weight:500;color:#111;white-space:nowrap}'
    /* Totals */
    + '.totals-wrap{display:flex;justify-content:flex-end;margin-bottom:20px}'
    + '.totals-box{min-width:260px;background:#f8f8f8;border:1px solid #ebebeb;border-radius:4px;padding:14px 18px}'
    + 'table.vat{width:100%;border-collapse:collapse;margin-bottom:10px}'
    + '.vl{font-size:11px;color:#aaa;padding:2px 0}'
    + '.vv{text-align:right;font-size:11px;color:#888;padding:2px 0}'
    + '.tot-div{border:none;border-top:1px solid #ddd;margin:10px 0}'
    + '.grand-lbl{font-family:Teko,sans-serif;font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#111;margin-bottom:4px;text-align:right}'
    + '.grand-val{font-family:Teko,sans-serif;font-size:30px;font-weight:700;color:#111;line-height:1;text-align:right}'
    + '.incl-vat{font-size:8px;color:#ccc;letter-spacing:1.5px;margin-top:3px;text-align:right}'
    /* Pay */
    + '.pay-sec{margin-bottom:18px}'
    + '.pay-lbl{font-family:Teko,sans-serif;font-size:9.5px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:#bbb;margin-bottom:7px}'
    + 'table.pay-tbl{border-collapse:collapse}'

    + '.pv{font-size:12px;font-weight:500;color:#111;padding:2px 0}'
    + '.note-blk{border-top:1px solid #eee;padding-top:11px;margin-bottom:16px;font-size:11.5px;color:#666;line-height:1.65}'
    + '.foot-note{font-size:10px;color:#ccc;line-height:1.65;margin-bottom:0;border-top:1px solid #f0f0f0;padding-top:7px}'
    + '.print-btn{position:fixed;top:14px;right:14px;background:#111;color:#fff;border:none;padding:8px 16px;cursor:pointer;font-family:Montserrat,sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;border-radius:3px;z-index:99}'
    + '</style></head><body>'
    + '<button class="print-btn np" onclick="window.print()">↓ Uložit PDF / Tisk</button>'
    + '<div class="page">'
    /* Header */
    + '<div class="hd"><div class="logo-text">LIBERTI</div>'
    + '<div class="doc-info"><div class="doc-type">'+docType+'</div><div class="doc-num">'+inv.number+'</div></div></div>'
    + '<hr class="div">'
    /* Parties */
    + '<div class="parties">'
    + '<div><div class="party-lbl">Dodavatel</div>'
    + '<div class="party-name">'+settings.name+'</div>'
    + (suppMeta?'<table class="meta"><tbody>'+suppMeta+'</tbody></table>':'')

    + '<div><div class="party-lbl">Odběratel</div>'

    + '<div class="meta-box">'

    + '<div class="mc"><div class="ml">DUZP</div><div class="mv2">'+fmtD(inv.duzp||inv.issueDate)+'</div></div>'
    + '<div class="mc"><div class="ml">Datum splatnosti</div><div class="mv2"><strong>'+fmtD(inv.dueDate)+'</strong></div></div>'
    + '<div class="mc"><div class="ml">Způsob platby</div><div class="mv2">'+(inv.paymentMethod||'—')+'</div></div>'
    + '<div class="mc"><div class="ml">Variabilní symbol</div><div class="mv2"><strong>'+vs+'</strong></div></div>'
    + '</div>'
    /* Items */
    + '<table class="items"><thead><tr>'
    + '<th style="width:44%">Popis plnění</th>'
    + '<th class="th-r" style="width:8%">Počet</th>'
    + '<th style="width:7%;text-align:center">Jedn.</th>'
    + '<th class="th-r" style="width:14%">Cena/ks</th>'
    + '<th class="th-r">Celkem</th>'
    + '</tr></thead><tbody>'+rows+'</tbody></table>'
    /* Totals */
    + '<div class="totals-wrap"><div class="totals-box">'
    + (totalsInner?'<table class="vat"><tbody>'+totalsInner+'</tbody></table><hr class="tot-div">':'')
    + '<div class="grand-lbl">Celkem k úhradě</div>'
    + '<div class="grand-val">'+fmt(c.tot)+'</div>'
    + (isVat?'<div class="incl-vat">VČETNĚ DPH '+vatRate+'%</div>':'')
    + '</div></div>'
    + payBlock
    + (inv.note?'<div class="note-blk"><strong>Poznámka:</strong> '+inv.note+'</div>':'')
    + (settings.footNote?'<div class="foot-note">'+settings.footNote+'</div>':'')
    + '</div>'
    + '<scr'+'ipt>document.fonts.ready.then(function(){setTimeout(function(){window.print();},400);});<\/scr'+'ipt>'
    + '</body></html>';

  var w = window.open('', '_blank');
  if (!w) { alert('Povolte vyskakovací okna pro tisk/PDF.'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

function LogView({changeLog}){
  const sorted=[...(changeLog||[])].sort((a,b)=>b.ts>a.ts?1:-1);
  const ACT_COLORS={create:"#3aaa5a",update:"#5a8aff",delete:"#e04040"};
  return <div className="anim-fadein">
    <div style={{marginBottom:22}}>
      <div style={{...T.t,fontSize:FS.h,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>LOG</div>
      <div style={{...T.m,fontSize:FS.s,color:C.dim,marginTop:2}}>Historie změn · {sorted.length} záznamů</div>
    </div>
    {sorted.length===0&&<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"40px 0",textAlign:"center",...T.m,fontSize:FS.b,color:C.dim}}>Zatím žádné změny v logu</div>}
    {sorted.length>0&&<Card>
      {sorted.slice(0,200).map((entry,i)=>{
        const isLast=i===Math.min(sorted.length,200)-1;
        const col=ACT_COLORS[entry.action]||C.hi;
        return <div key={entry.id||i} style={{display:"flex",alignItems:"flex-start",gap:14,padding:"11px 18px",borderBottom:isLast?"none":`1px solid ${C.border}`}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:col,flexShrink:0,marginTop:5}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{...T.m,fontSize:FS.b,color:C.ivory}}>{entry.description}</span>
              <span style={{...T.m,fontSize:FS.s,padding:"1px 7px",borderRadius:10,background:col+"22",color:col}}>{entry.action==="create"?"Vytvořeno":entry.action==="update"?"Upraveno":"Smazáno"}</span>
            </div>
            <div style={{display:"flex",gap:12,marginTop:3,flexWrap:"wrap"}}>
              {entry.user&&<span style={{...T.m,fontSize:FS.s,color:C.dim}}>{entry.user}</span>}
              <span style={{...T.m,fontSize:FS.s,color:C.dim}}>{entry.ts?new Date(entry.ts).toLocaleString("cs-CZ"):"—"}</span>
              {entry.type&&<span style={{...T.m,fontSize:FS.s,color:C.dim,background:C.s2,padding:"0 6px",borderRadius:3}}>{entry.type}</span>}
            </div>
          </div>
        </div>;
      })}
      {sorted.length>200&&<div style={{...T.m,fontSize:FS.s,color:C.dim,padding:"10px 18px",textAlign:"center"}}>Zobrazeno 200 z {sorted.length} záznamů</div>}
    </Card>}
  </div>;
}


function VisibilityView({settings,onSave}){
  const ALL_FAK=[
    {id:"settings",l:"Nastavení"},{id:"clients",l:"Klienti"},{id:"items",l:"Položky"},
    {id:"vouchers",l:"Vouchery"},{id:"archive",l:"Faktury"},
  ];
  const ALL_FIN=[
    {id:"overview",l:"Přehled"},{id:"incomes",l:"Příjmy"},
    {id:"expenses",l:"Výdaje"},{id:"cashflow",l:"Cashflow"},
  ];
  const ALL_OFF=[
    {id:"projects",l:"Projekty"},{id:"tasks",l:"Úkoly"},{id:"hours",l:"Hodiny"},
    {id:"meetings",l:"Meetings"},{id:"team",l:"Tým"},{id:"benefits",l:"Benefity"},{id:"outreach",l:"Outreach"},
  ];
  const MODULES=[
    {id:"fakturace",l:"Fakturace",pages:ALL_FAK},
    {id:"finance",l:"Finance",pages:ALL_FIN},
    {id:"office",l:"Office",pages:ALL_OFF},
  ];
  // Pouze ne-admin role
  const allRoles=(settings.systemRoles||[]).filter(r=>!r.isAdmin);
  const [selRole,setSelRole]=useState(allRoles[0]?.v||"");
  const rolePerms=settings.rolePerms||{};

  const getPerms=(role,mod)=>rolePerms[role]?.[mod]||{read:[],write:[]};
  const togglePerm=(role,mod,id,type)=>{
    const curr=getPerms(role,mod);
    const arr=curr[type]||[];
    const next=arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];
    const newRolePerms={...rolePerms,[role]:{...rolePerms[role],[mod]:{...curr,[type]:next}}};
    if(type==="read"&&arr.includes(id)){
      newRolePerms[role][mod].write=(newRolePerms[role][mod].write||[]).filter(x=>x!==id);
    }
    if(type==="write"&&!arr.includes(id)){
      newRolePerms[role][mod].read=[...new Set([...(newRolePerms[role][mod].read||[]),id])];
    }
    onSave({...settings,rolePerms:newRolePerms});
  };
  const toggleModule=(role,mod)=>{
    const key=mod+"_visible";
    const curr=(rolePerms[role]||{})[key];
    const next=curr===false?true:false;
    onSave({...settings,rolePerms:{...rolePerms,[role]:{...(rolePerms[role]||{}),[key]:next}}});
  };
  const isModVisible=(role,mod)=>{
    const v=(rolePerms[role]||{})[mod+"_visible"];
    return v!==false; // default: visible
  };

  if(allRoles.length===0)return <div className="anim-fadein">
    <div style={{...T.m,fontSize:FS.b,color:C.dim,padding:"40px 0",textAlign:"center"}}>
      Nejprve vytvořte role v záložce Role
    </div>
  </div>;

  return <div className="anim-fadein">
    <div style={{marginBottom:20}}>
      <div style={{...T.t,fontSize:FS.h,fontWeight:700,letterSpacing:"0.15em",color:C.ivory}}>VIDITELNOST & OPRÁVNĚNÍ</div>
      <div style={{...T.m,fontSize:FS.s,color:C.dim,marginTop:2}}>Nastavení přístupu pro každou roli zvlášť</div>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
      {allRoles.map(r=><button key={r.v} onClick={()=>setSelRole(r.v)}
        style={{...T.m,fontSize:FS.b,padding:"8px 18px",borderRadius:4,cursor:"pointer",
          border:`1px solid ${selRole===r.v?C.merlot:C.border}`,
          background:selRole===r.v?C.mDark:"transparent",
          color:selRole===r.v?C.ivory:C.hi,transition:"all .15s"}}>{r.l}</button>)}
    </div>
    <Card sx={{padding:"10px 18px",marginBottom:14,display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>

/* ── Drag-and-drop hook ────────────────────────────────────────── */
function useDragSort(items, setItems){
  const dragIdx = useRef(null);
  const [overIdx, setOverIdx] = useState(null);

  const onDragStart = (idx) => { dragIdx.current = idx; };
  const onDragOver  = (e, idx) => { e.preventDefault(); setOverIdx(idx); };
  const onDrop      = (idx) => {
    if(dragIdx.current === null || dragIdx.current === idx) { setOverIdx(null); return; }
    const arr = [...items];
    const [moved] = arr.splice(dragIdx.current, 1);
    arr.splice(idx, 0, moved);
    setItems(arr);
    dragIdx.current = null;
    setOverIdx(null);
  };
  const onDragEnd   = () => { dragIdx.current = null; setOverIdx(null); };

  const rowProps = (idx) => ({
    draggable: true,
    onDragStart: () => onDragStart(idx),
    onDragOver:  (e) => onDragOver(e, idx),
    onDrop:      () => onDrop(idx),
    onDragEnd:   onDragEnd,
  });

  return { rowProps, overIdx };
}

function VoucherGroupedList({vouchers,filtered,q,rowProps,overIdx,statusC,onEdit,onDup,onDel}){
  // Group by name prefix — everything before the last "-NN" suffix
  const getGroup=code=>{const m=code.match(/^(.*)-\d+$/);return m?m[1]:code;};
  const groups={};
  filtered.forEach(v=>{const g=getGroup(v.code);if(!groups[g])groups[g]=[];groups[g].push(v);});
  const groupNames=Object.keys(groups);
  const [collapsed,setCollapsed]=useState({});
  const toggleGroup=g=>setCollapsed(p=>({...p,[g]:!p[g]}));

  // If searching or all groups have 1 item, flat list
  const useGroups=!q&&groupNames.some(g=>groups[g].length>1);

  if(!useGroups){
    // Flat list
    return <Card>
      {filtered.length===0&&<div style={{padding:"28px 18px",textAlign:"center",...T.m,fontSize:12,color:C.dim}}>Žádná shoda</div>}
      {filtered.map(v=>{
        const idx=vouchers.findIndex(x=>x.id===v.id);
        return <VoucherRow key={v.id} v={v} idx={idx} q={q} rowProps={rowProps} overIdx={overIdx} statusC={statusC} onEdit={onEdit} onDup={onDup} onDel={onDel}/>;
      })}
    </Card>;
  }

  return <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {groupNames.map(g=>{
      const items=groups[g];
      const isOpen=!collapsed[g];
      const isSingle=items.length===1;
      const activeCount=items.filter(v=>v.status==="Aktivní").length;
      if(isSingle){
        const v=items[0];
        const idx=vouchers.findIndex(x=>x.id===v.id);
        return <Card key={g}>
          <VoucherRow v={v} idx={idx} q={q} rowProps={rowProps} overIdx={overIdx} statusC={statusC} onEdit={onEdit} onDup={onDup} onDel={onDel}/>
        </Card>;
      }
      return <Card key={g}>
        {/* Group header */}
        <div onClick={()=>toggleGroup(g)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",cursor:"pointer",borderBottom:isOpen?`1px solid ${C.border}`:"none",userSelect:"none"}}
          onMouseEnter={e=>e.currentTarget.style.background=C.s0}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{...T.t,fontSize:17,fontWeight:600,letterSpacing:"0.12em",color:C.ivory}}>{g}</span>
            <span style={{...T.m,fontSize:FS.s,color:C.dim,background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"2px 8px",letterSpacing:"0.08em"}}>{items.length} ks</span>
            {activeCount>0&&<span style={{...T.m,fontSize:FS.s,color:"#3aaa5a",letterSpacing:"0.08em"}}>{activeCount} aktivních</span>}
          </div>
          <span style={{color:C.dim,fontSize:14,transition:"transform .2s",display:"inline-block",transform:isOpen?"rotate(180deg)":"rotate(0)"}}>▾</span>
        </div>
        {/* Group rows */}
        {isOpen&&items.map(v=>{
          const idx=vouchers.findIndex(x=>x.id===v.id);
          return <VoucherRow key={v.id} v={v} idx={idx} q={q} rowProps={rowProps} overIdx={overIdx} statusC={statusC} onEdit={onEdit} onDup={onDup} onDel={onDel} indent/>;
        })}
      </Card>;
    })}
  </div>;
}

function VoucherRow({v,idx,q,rowProps,overIdx,statusC,onEdit,onDup,onDel,indent=false}){
  return <div {...(q?"":rowProps(idx))}
    style={{display:"flex",alignItems:"center",padding:`11px ${indent?"28px":"18px"}`,borderBottom:`1px solid ${C.border}`,background:overIdx===idx&&!q?"#161616":"transparent",transition:"background .1s",cursor:q?"default":"grab",gap:8}}>
    {!q&&<span style={{color:C.dim,fontSize:14,marginRight:8,cursor:"grab",userSelect:"none",flexShrink:0}}>⠿</span>}
    <div style={{flex:1,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div style={{...T.t,fontSize:15,fontWeight:600,letterSpacing:"0.1em",color:C.ivory}}>{v.code}</div>
        <span style={{...T.m,fontSize:FS.s,fontWeight:300,letterSpacing:"0.1em",textTransform:"uppercase",color:statusC[v.status]||C.hi,background:"transparent",border:`1px solid ${statusC[v.status]||C.border}`,borderRadius:3,padding:"1px 7px"}}>{v.status}</span>
        <span style={{...T.m,fontSize:FS.b,color:C.ivory,fontWeight:500}}>{v.type==="pct"?v.value+"%":new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:0}).format(v.value)} sleva</span>
        {v.validTo&&<span style={{...T.m,fontSize:FS.b,color:C.dim}}>do {v.validTo.slice(0,7)}</span>}
      </div>
      {v.name&&<div style={{...T.m,fontSize:FS.b,color:C.dim,marginTop:2}}>{v.name}</div>}
    </div>
    <div style={{display:"flex",gap:6,flexShrink:0}}>
      <Btn ch="Duplikovat" onClick={()=>onDup(v)} v="g" sx={{padding:"5px 9px",fontSize:8}}/>
      <Btn ch="Upravit" onClick={()=>onEdit(v)} v="g" sx={{padding:"5px 9px",fontSize:8}}/>
      <Btn ch="×" onClick={()=>onDel(v.id)} v="d" sx={{padding:"5px 9px"}}/>
    </div>
  </div>;
}

function ClientsView({clients,setClients,invoices,timeEntries,projects,settings,confirmFn,onNewInvoice}){
  const blank={id:uid(),name:"",company:"",street:"",city:"",zip:"",country:"Česká republika",ico:"",dic:"",email:"",phone:"",web:"",notes:"",startDate:toDay()};
  const [ed,setEd]=useState(null);
  const [f,setF]=useState(null);
  const [q,setQ]=useState("");
  const [detail,setDetail]=useState(null); // client id for detail view
  const u=k=>v=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    if(!f.name&&!f.company)return;
    setClients(ed==="new"?[...clients,f]:clients.map(c=>c.id===ed?f:c));
    setEd(null);setF(null);
  };
  const del=async id=>{
    const ok=await confirmFn("Smazat tohoto klienta z adresáře?");
    if(ok){setClients(clients.filter(x=>x.id!==id));if(detail===id)setDetail(null);}
  };
  const {rowProps,overIdx}=useDragSort(clients,setClients);
  const filtered=q?clients.filter(x=>(x.name+x.company+x.email).toLowerCase().includes(q.toLowerCase())):clients;

  // ── Client detail calculations ──
  const detailClient=detail?clients.find(c=>c.id===detail):null;
  const clientInv=detail?(invoices||[]).filter(i=>(i.client?.id===detail||i.clientId===detail)):[];
  const clientProjs=detail?(projects||[]).filter(p=>p.clientId===detail):[];
  const clientProjIds=clientProjs.map(p=>p.id);
  const clientEntries=detail?(timeEntries||[]).filter(e=>clientProjIds.includes(e.projectId)):[];
  const now=new Date(),yr=now.getFullYear();

  const totalInvoiced=clientInv.filter(i=>["Zaplaceno","Odesláno","Po splatnosti"].includes(i.status)).reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);
  const totalPaid=clientInv.filter(i=>i.status==="Zaplaceno").reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);
  const totalPending=clientInv.filter(i=>["Odesláno","Po splatnosti"].includes(i.status)).reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);
  const avgInv=clientInv.length>0?totalInvoiced/clientInv.length:0;
  const totalHours=clientEntries.reduce((s,e)=>s+(e.minutes||0),0);
  const totalHoursVal=clientEntries.reduce((s,e)=>s+calcEntryVal(e,settings.people||[]),0);

  // Collaboration duration
  const collabStart=detailClient?.startDate||clientInv.sort((a,b)=>a.issueDate>b.issueDate?1:-1)[0]?.issueDate;
  const collabMonths=collabStart?Math.max(1,Math.round((new Date()-new Date(collabStart))/(1000*60*60*24*30.4))):0;

  // Monthly revenue for this client (last 12 months)

    const d=new Date(now);d.setMonth(d.getMonth()-11+i);
    const k=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    return clientInv.filter(x=>["Zaplaceno","Odesláno"].includes(x.status)&&(x.issueDate||"").startsWith(k)).reduce((s,inv)=>s+calcInv(inv.items,inv.vatEnabled,inv.vatRate,inv.discount).tot,0);
  });
  const moLabels=Array.from({length:12},(_,i)=>{const d=new Date(now);d.setMonth(d.getMonth()-11+i);return MO_NAMES[d.getMonth()];});

        <div style={{flex:1}}>
          <div style={{...T.t,fontSize:FS.h,fontWeight:700,letterSpacing:"0.12em",color:C.ivory}}>{detailClient.company||detailClient.name}</div>
          {detailClient.company&&detailClient.name&&<div style={{...T.m,fontSize:FS.s,color:C.dim}}>{detailClient.name}</div>}

        <Btn ch="× Smazat" onClick={()=>del(detailClient.id)} v="d" sx={{padding:"7px 14px"}}/>

                {cl.company&&cl.name&&<span style={{...T.m,fontSize:FS.s,color:C.hi}}>{cl.company}</span>}
                {clInvCount>0&&<span style={{...T.m,fontSize:FS.s,color:C.dim}}>{clInvCount} faktur</span>}
                {clRevenue>0&&<span style={{...T.t,fontSize:FS.s,fontWeight:300,color:"#3aaa5a"}}>{FMT(clRevenue)}</span>}
              </div>

                {(cl.city||cl.street)&&<span style={{...T.m,fontSize:FS.s,color:C.dim}}>{[cl.street,[cl.zip,cl.city].filter(Boolean).join(" ")].filter(Boolean).join(", ")}</span>}

            </div>
          </div>;
        })}
      </Card>}
  </div>;
}

        <div style={{...T.t,fontSize:32,fontWeight:700,letterSpacing:"0.12em",color:C.ivory,lineHeight:1}}>{inv.number}</div>
        <div style={{...T.m,fontSize:FS.b,color:C.dim,marginTop:4}}>{inv.vatEnabled?"Daňový doklad":"Faktura"}</div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <Pill s={inv.status==="Odesláno"&&inv.dueDate&&new Date(inv.dueDate)<new Date()?"Po splatnosti":inv.status}/>
        <select value={inv.status} onChange={e=>u("status")(e.target.value)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px",color:C.ivory,...T.m,fontSize:FS.b,outline:"none",cursor:"pointer"}}>
          {STATUSES.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
    </div>

    <div className="grid-2" style={{marginBottom:26}}>
      {/* LEFT — basic info */}
      <div>
        <SH c="Základní údaje"/>
        <div className="grid-2-inp" style={{marginBottom:14}}>
          <Inp lbl="Číslo faktury" val={inv.number} onChange={u("number")}/>
          <Inp lbl="Variabilní symbol" val={inv.variableSymbol} onChange={u("variableSymbol")} ph={vsFrom(inv.number)}/>
          <Inp lbl="Datum vystavení" type="date" val={inv.issueDate} onChange={v=>{u("issueDate")(v);if(!inv.duzpManual)u("duzp")(v);u("dueDate")(plusD(v,settings.payDays));}}/>
          <Inp lbl="DUZP" type="date" val={inv.duzp} onChange={v=>{u("duzp")(v);setInv(p=>({...p,duzpManual:true}));}}/>
          <Inp lbl="Datum splatnosti" type="date" val={inv.dueDate} onChange={u("dueDate")}/>
          <Inp lbl="Způsob platby" val={inv.paymentMethod} onChange={u("paymentMethod")} opts={PAY_METHODS.map(v=>({v,l:v}))}/>
        </div>
        <Inp lbl="Poznámka (volitelně)" val={inv.note} onChange={u("note")} ph="Např. za měsíc leden 2025…" ml rows={2}/>

        {/* DPH sekce */}
        <div style={{marginTop:16}}>
          <SH c="DPH"/>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <ChkRow label="Faktura s DPH" checked={!!inv.vatEnabled} onChange={v=>setInv(p=>({...p,vatEnabled:v}))}/>
            {inv.vatEnabled&&<div>
              <Lbl c="Sazba DPH"/>
              <div style={{display:"flex",gap:8}}>
                {VAT_RATES.map(r=><button key={r} onClick={()=>u("vatRate")(r)}
                  style={{flex:1,padding:"10px 0",...T.t,fontSize:18,fontWeight:500,letterSpacing:"0.06em",background:(inv.vatRate??21)===r?C.merlot:C.s2,border:`1px solid ${(inv.vatRate??21)===r?C.merlot:C.border}`,borderRadius:3,color:C.ivory,cursor:"pointer",transition:"all .15s"}}>
                  {r}%
                </button>)}
              </div>
            </div>}
          </div>
        </div>

        {/* Sleva sekce */}
        <div style={{marginTop:16}}>
          <SH c="Sleva"/>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <ChkRow label="Přidat slevu na fakturu" checked={!!disc.enabled} onChange={v=>setInv(p=>({...p,discount:{...disc,enabled:v}}))}/>
            {disc.enabled&&<>
              {/* Voucher picker */}
              {vouchers.filter(v=>v.status==="Aktivní").length>0&&<div>
                <Lbl c="Použít voucher"/>
                <select onChange={e=>{
                  const v=vouchers.find(x=>x.id===e.target.value);
                  if(!v)return;
                  setInv(p=>({...p,discount:{...disc,type:v.type==="czk"?"czk":"pct",value:parseFloat(v.value)||0,voucherId:v.id,voucherCode:v.code}}));
                }} value={disc.voucherId||""}
                  style={{width:"100%",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,padding:"11px 12px",color:disc.voucherId?C.ivory:C.dim,...T.m,fontSize:13,outline:"none",appearance:"none",cursor:"pointer"}}>
                  <option value="">— Vybrat voucher —</option>
                  {vouchers.filter(v=>v.status==="Aktivní").map(v=><option key={v.id} value={v.id}>{v.code} — {v.type==="pct"?v.value+"%":fmt(v.value)}{v.name?" ("+v.name+")":""}</option>)}
                </select>
                {disc.voucherCode&&<div style={{...T.m,fontSize:FS.s,color:"#3aaa5a",marginTop:4,letterSpacing:"0.1em"}}>✓ Voucher {disc.voucherCode} aplikován</div>}
              </div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
                <div>
                  <Lbl c="Typ slevy"/>
                  <div style={{display:"flex",gap:8}}>
                    {[{v:"pct",l:"%"},{v:"czk",l:"Kč"}].map(t=><button key={t.v} onClick={()=>setInv(p=>({...p,discount:{...disc,type:t.v,voucherId:undefined,voucherCode:undefined}}))}
                      style={{flex:1,padding:"10px",...T.m,fontSize:FS.b,background:disc.type===t.v?C.merlot:C.s2,border:`1px solid ${disc.type===t.v?C.merlot:C.border}`,borderRadius:3,color:C.ivory,cursor:"pointer",transition:"all .15s"}}>
                      {t.l}
                    </button>)}
                  </div>
                </div>
                <Inp lbl={disc.type==="pct"?"Výše slevy (%)":"Výše slevy (Kč)"} type="number" val={disc.value} onChange={v=>setInv(p=>({...p,discount:{...disc,value:v===''?0:parseFloat(v)||0,voucherId:undefined,voucherCode:undefined}}))}/>
              </div>
            </>}
          </div>
        </div>
      </div>

      {/* RIGHT — client */}
      <div>
        <SH c="Odběratel"/>
        {/* Collapsible client picker */}
        {clients.length>0&&<div style={{marginBottom:14}}>
          <button onClick={()=>setClientOpen(o=>!o)}
            style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px",background:C.s2,border:`1px solid ${C.border}`,borderRadius:3,cursor:"pointer",color:C.hi,...T.m,fontSize:FS.b,marginBottom:4}}>
            <span>{inv.client?.id?(inv.client.name||inv.client.company||"Vybraný klient"):"Vybrat z adresáře…"}</span>
            <span style={{fontSize:14,transition:"transform .2s",transform:clientOpen?"rotate(180deg)":"rotate(0)"}}>▾</span>
          </button>
          {clientOpen&&<div style={{border:`1px solid ${C.border}`,borderRadius:3,overflow:"hidden",marginBottom:10,animation:"fadeIn .18s ease"}}>
            {clients.map(cl=><div key={cl.id} onPointerDown={()=>{setInv(p=>({...p,client:{...cl}}));setClientOpen(false);}}
              style={{padding:"10px 14px",cursor:"pointer",background:inv.client?.id===cl.id?C.mDark:C.s1,borderBottom:`1px solid ${C.border}`,transition:"background .1s",touchAction:"manipulation"}}
              onMouseEnter={e=>e.currentTarget.style.background=inv.client?.id===cl.id?C.mDark:C.s0}
              onMouseLeave={e=>e.currentTarget.style.background=inv.client?.id===cl.id?C.mDark:C.s1}>
              <div style={{...T.m,fontSize:12,fontWeight:500,color:C.ivory}}>{cl.name||cl.company}</div>
              {cl.company&&cl.name&&<div style={{...T.m,fontSize:FS.b,color:C.hi}}>{cl.company}</div>}
            </div>)}
          </div>}
          <div style={{height:1,background:C.border,marginBottom:14}}/>
        </div>}
        <div className="grid-2-inp">
          <Inp lbl="Jméno" val={inv.client?.name} onChange={uc("name")} ph="Jan Novák"/>
          <Inp lbl="Firma" val={inv.client?.company} onChange={uc("company")} ph="Firma s.r.o."/>
          <Inp lbl="Ulice" val={inv.client?.street} onChange={uc("street")} ph="Ulice 123"/>
          <Inp lbl="Město" val={inv.client?.city} onChange={uc("city")} ph="Praha"/>
          <Inp lbl="PSČ" val={inv.client?.zip} onChange={uc("zip")} ph="110 00"/>
          <Inp lbl="Stát" val={inv.client?.country||"Česká republika"} onChange={uc("country")}/>
          <Inp lbl="IČO" val={inv.client?.ico} onChange={uc("ico")} ph="12345678"/>
          <Inp lbl="DIČ" val={inv.client?.dic} onChange={uc("dic")} ph="CZ12345678"/>
          <div style={{gridColumn:"1/-1"}}><Inp lbl="E-mail" type="email" val={inv.client?.email} onChange={uc("email")} ph="klient@firma.cz"/></div>
          <div style={{gridColumn:"1/-1"}}><Inp lbl="Telefon" val={inv.client?.phone} onChange={uc("phone")} ph="+420"/></div>
        </div>
      </div>
    </div>

    {/* Items */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <SH c="Položky"/>
      {templateItems.length>0&&<div style={{position:"relative",marginBottom:16}}>
        <Btn ch="+ Ze šablon" onClick={()=>setTplOpen(o=>!o)} v="g" sx={{padding:"7px 12px",fontSize:9}}/>
        {tplOpen&&<div style={{position:"absolute",right:0,top:"calc(100% + 4px)",background:C.s1,border:`1px solid ${C.bHi}`,borderRadius:4,zIndex:200,minWidth:240,boxShadow:"0 12px 40px rgba(0,0,0,.8)",animation:"fadeDown .18s ease"}}>
          {templateItems.map(tpl=><div key={tpl.id} onClick={()=>{addTpl(tpl);setTplOpen(false);}}
            style={{padding:"10px 14px",cursor:"pointer",...T.m,fontSize:12,color:C.ivory,borderBottom:`1px solid ${C.border}`}}
            onMouseEnter={e=>e.currentTarget.style.background=C.s2}
            onMouseLeave={e=>e.currentTarget.style.background="none"}>
            <div>{tpl.description}</div>
            <div style={{fontSize:10,color:C.hi,marginTop:1}}>{fmt(tpl.unitPrice)} / {tpl.unit}</div>
          </div>)}
        </div>}
      </div>}
    </div>

    <div className="tbl-wrap" style={{marginBottom:18}}>
      <div style={{minWidth:500}}>
        <Card sx={{overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 64px 80px 110px 90px 32px",background:C.s2,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,gap:6}}>
            {["Popis","Počet","Jednotka","Cena/ks","Celkem",""].map((h,i)=><div key={i} style={{...T.m,fontSize:FS.s,letterSpacing:"0.14em",textTransform:"uppercase",color:C.dim}}>{h}</div>)}
          </div>
          {inv.items.length===0&&<div style={{padding:20,textAlign:"center",...T.m,fontSize:12,color:C.dim}}>Zatím žádné položky</div>}
          {inv.items.map(item=>{
            const total=(item.qty||0)*(item.unitPrice||0);
            return <div key={item.id} style={{display:"grid",gridTemplateColumns:"1fr 64px 80px 110px 90px 32px",padding:"8px 12px",borderBottom:`1px solid ${C.border}`,alignItems:"center",gap:6}}>
              <input value={item.description} onChange={e=>ui(item.id,"description",e.target.value)} placeholder="Popis…" style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 9px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%"}}/>
              <input type="number" min="0" step="0.5" value={item.qty} onChange={e=>ui(item.id,"qty",+e.target.value)} style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 6px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%",textAlign:"center"}}/>
              <select value={item.unit} onChange={e=>ui(item.id,"unit",e.target.value)} style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 6px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%",appearance:"none"}}>{UNITS.map(u=><option key={u}>{u}</option>)}</select>
              <input type="number" min="0" value={item.unitPrice} onChange={e=>ui(item.id,"unitPrice",+e.target.value)} style={{background:C.s0,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 6px",color:C.ivory,...T.m,fontSize:12,outline:"none",width:"100%",textAlign:"right"}}/>
              <div style={{...T.m,fontSize:12,color:C.ivory,textAlign:"right",whiteSpace:"nowrap"}}>{fmt(total)}</div>
              <button onClick={()=>di(item.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1,touchAction:"manipulation"}}>×</button>
            </div>;
          })}
          <div style={{padding:"10px 12px",background:C.s2,borderTop:`1px solid ${C.border}`}}>
            <Btn ch="+ Přidat položku" onClick={ai} v="g" sx={{padding:"8px 14px",fontSize:10}}/>
          </div>
        </Card>
      </div>
    </div>

    {/* Totals box */}
    {inv.items.length>0&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:22}}>
      <Card sx={{padding:"18px 22px",minWidth:270}}>
        {/* Rows */}
        <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
          {c.discountAmt>0&&<>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:FS.b,color:C.hi}}><span>Mezisoučet</span><span>{fmt(c.subtotal)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:FS.b,color:"#e08040"}}><span>Sleva {disc.type==="pct"?`(${disc.value}%)`:`(${fmt(disc.value)})`}</span><span>−{fmt(c.discountAmt)}</span></div>
          </>}
          {inv.vatEnabled&&<>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:FS.b,color:C.hi}}><span>Základ DPH {inv.vatRate??21}%</span><span>{fmt(c.base)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",...T.m,fontSize:FS.b,color:C.hi}}><span>DPH {inv.vatRate??21}%</span><span>{fmt(c.vat)}</span></div>
          </>}
        </div>
        {(c.discountAmt>0||inv.vatEnabled)&&<div style={{height:1,background:C.border,marginBottom:12}}/>}
        {/* Total — label above amount */}
        <div>
          <div style={{...T.m,fontSize:FS.s,letterSpacing:"0.2em",textTransform:"uppercase",color:C.hi,marginBottom:4}}>Celkem k úhradě</div>
          <div style={{...T.t,fontSize:36,fontWeight:700,color:C.ivory,lineHeight:1}}>{fmt(c.tot)}</div>
          {inv.vatEnabled&&<div style={{...T.m,fontSize:FS.s,letterSpacing:"0.14em",color:C.dim,marginTop:3,textTransform:"uppercase"}}>Včetně DPH {inv.vatRate??21}%</div>}
        </div>
      </Card>
    </div>}

    <div style={{display:"flex",gap:8,paddingTop:18,borderTop:`1px solid ${C.border}`,flexWrap:"wrap"}}>
      <Btn ch="Uložit" onClick={()=>{onSave(inv);onCancel();}}/>
      <Btn ch="↓ Uložit & PDF" onClick={()=>{onSave(inv);onPrint(inv);onCancel();}} v="g"/>
      <Btn ch="Náhled PDF" onClick={()=>onPrint(inv)} v="g"/>
      <Btn ch="← Zpět" onClick={onCancel} v="g" sx={{marginLeft:"auto"}}/>
    </div>
  </div>;
}

/* ── Archive ───────────────────────────────────────────────────── */
function ArchiveView({invoices,settings,onNew,onEdit,onView,onDup,onStatus,onDelete,confirmFn}){
  const [filter,setFilter]=useState("Vše");
  const [menu,setMenu]=useState(null);
  const mRef=useRef();
  useEffect(()=>{const h=e=>{if(mRef.current&&!mRef.current.contains(e.target))setMenu(null);};document.addEventListener("pointerdown",h);return()=>document.removeEventListener("pointerdown",h);},[]);
  const yr=new Date().getFullYear();
  const yI=invoices.filter(i=>i.issueDate?.startsWith(String(yr)));
  const geff=inv=>inv.status==="Odesláno"&&inv.dueDate&&new Date(inv.dueDate)<new Date()?"Po splatnosti":inv.status;
  const getC=inv=>calcInv(inv.items,inv.vatEnabled,inv.vatRate,inv.discount);
  const stats=[
    {l:`Fakturováno ${yr}`,v:yI.reduce((s,i)=>s+getC(i).tot,0),c:C.ivory},
    {l:"Zaplaceno",v:yI.filter(i=>i.status==="Zaplaceno").reduce((s,i)=>s+getC(i).tot,0),c:"#3aaa5a"},
    {l:"Čeká",v:yI.filter(i=>["Odesláno","Po splatnosti"].includes(i.status)).reduce((s,i)=>s+getC(i).tot,0),c:"#e08040"},
    {l:"Koncepty",v:yI.filter(i=>i.status==="Koncept").length,c:C.hi,cnt:true}
  ];
  const filtered=filter==="Vše"?invoices:filter==="Po splatnosti"?invoices.filter(i=>geff(i)==="Po splatnosti"):invoices.filter(i=>i.status===filter);
  const del=async id=>{
    const inv=invoices.find(i=>i.id===id);
    const ok=await confirmFn(`Smazat fakturu ${inv?.number||""}?\nTato akce je nevratná.`);
    if(ok)onDelete(id);
  };
  return <div className="anim-fadein">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
      <div style={{...T.t,fontSize:28,fontWeight:700,letterSpacing:"0.14em",color:C.ivory}}>FAKTURY</div>
      <Btn ch="+ Nová faktura" onClick={onNew} sx={{padding:"9px 18px"}}/>
    </div>
    <div className="grid-4" style={{marginBottom:24}}>
      {stats.map(s=><Card key={s.l} sx={{padding:"14px 18px"}}>
        <Lbl c={s.l} s={{marginBottom:4,fontSize:8}}/>
        <div style={{...T.t,fontSize:s.cnt?26:20,fontWeight:600,color:s.c,lineHeight:1.2}}>{s.cnt?s.v+" ks":fmt(s.v)}</div>
      </Card>)}
    </div>
    <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch",marginBottom:12}}>
      {["Vše","Koncept","Odesláno","Zaplaceno","Po splatnosti","Storno"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?C.merlot:"transparent",border:`1px solid ${filter===f?C.merlot:C.border}`,borderRadius:3,padding:"7px 12px",cursor:"pointer",...T.m,fontSize:FS.s,fontWeight:filter===f?500:400,letterSpacing:"0.12em",textTransform:"uppercase",color:filter===f?C.ivory:C.dim,whiteSpace:"nowrap",transition:"all .15s",touchAction:"manipulation"}}>{f}</button>
      ))}
    </div>
    {filtered.length===0
      ?<div style={{border:`1px dashed ${C.border}`,borderRadius:4,padding:"64px 0",textAlign:"center"}}>
        <div style={{...T.t,fontSize:22,letterSpacing:"0.2em",color:C.dim,marginBottom:8}}>ŽÁDNÉ FAKTURY</div>
        <div style={{...T.m,fontSize:FS.b,color:C.dim,marginBottom:20}}>{filter==="Vše"?"Začni vytvořením první faktury":"Žádná faktura neodpovídá filtru"}</div>
        {filter==="Vše"&&<Btn ch="+ Nová faktura" onClick={onNew}/>}
      </div>
      :<Card>
        {filtered.map((inv,idx)=>{
          const c2=getC(inv);const eff=geff(inv);const past=eff==="Po splatnosti";
          return <div key={inv.id} onClick={()=>onView(inv)}
            onMouseEnter={e=>e.currentTarget.style.background=C.s0}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}
            style={{padding:"14px 18px",borderBottom:idx<filtered.length-1?`1px solid ${C.border}`:"none",cursor:"pointer",transition:"background .1s",animation:`fadeIn .22s ease ${Math.min(idx,8)*0.04}s both`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,flexWrap:"wrap"}}>
                  <div style={{...T.t,fontSize:15,fontWeight:600,letterSpacing:"0.08em",color:C.ivory}}>{inv.number}</div>
                  <Pill s={eff}/>
                </div>
                <div style={{...T.m,fontSize:13,color:C.ivory,fontWeight:500,marginBottom:3}}>{inv.client?.name||inv.client?.company||<span style={{color:C.dim}}>—</span>}</div>
                {inv.client?.company&&inv.client?.name&&<div style={{...T.m,fontSize:FS.b,color:C.hi,marginBottom:3}}>{inv.client.company}</div>}
                <div style={{display:"flex",gap:18,marginTop:4}}>
                  <span style={{...T.m,fontSize:FS.b,color:C.hi}}>Vystaveno: {fmtD(inv.issueDate)}</span>
                  <span style={{...T.m,fontSize:FS.b,color:past?"#e04040":C.hi,fontWeight:past?600:400}}>Splatnost: {fmtD(inv.dueDate)}</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <div style={{...T.t,fontSize:20,fontWeight:300,color:C.ivory}}>{fmt(c2.tot)}</div>
                <div ref={menu===inv.id?mRef:null} onClick={e=>e.stopPropagation()} style={{position:"relative"}}>
                  <button onPointerDown={e=>{e.stopPropagation();setMenu(p=>p===inv.id?null:inv.id);}}
                    style={{background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"7px 11px",cursor:"pointer",color:C.hi,fontSize:16,touchAction:"manipulation"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=C.bHi}
                    onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}
                  >⋯</button>
                  {menu===inv.id&&<div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:C.s1,border:`1px solid ${C.bHi}`,borderRadius:4,zIndex:300,minWidth:190,boxShadow:"0 20px 60px rgba(0,0,0,.9)",animation:"fadeDown .18s ease"}}>
                    {[
                      {l:"↓ Tisknout / PDF",a:()=>{onView(inv);setMenu(null);}},
                      {l:"Upravit",a:()=>{onEdit(inv);setMenu(null);}},
                      {l:"Duplikovat",a:()=>{onDup(inv);setMenu(null);}},
                      {sep:true},
                      ...STATUSES.filter(s=>s!==inv.status).map(s=>({l:`→ ${s}`,a:()=>{onStatus(inv.id,s);setMenu(null);}})),
                      {sep:true},
                      {l:"Smazat fakturu",a:async()=>{setMenu(null);await del(inv.id);},danger:true}
                    ].map((item,i)=>item.sep
                      ?<div key={i} style={{height:1,background:C.border,margin:"3px 0"}}/>
                      :<button key={i} onClick={item.a}
                        style={{display:"block",width:"100%",background:"none",border:"none",padding:"11px 16px",cursor:"pointer",textAlign:"left",...T.m,fontSize:12,color:item.danger?"#c03030":C.ivory,touchAction:"manipulation"}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.s2}
                        onMouseLeave={e=>e.currentTarget.style.background="none"}
                      >{item.l}</button>
                    )}
                  </div>}
                </div>
              </div>
            </div>
          </div>;
        })}
      </Card>
    }

const FMT2=v=>new Intl.NumberFormat("cs-CZ",{style:"currency",currency:"CZK",maximumFractionDigits:2}).format(v||0);

function filterByPeriod(items,dateKey,period){
  const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  return items.filter(it=>{
    const d=new Date(it[dateKey]||"");if(isNaN(d))return false;
    if(period==="month")return d.getFullYear()===yr&&d.getMonth()===mo;
    if(period==="quarter"){const q=Math.floor(mo/3);return d.getFullYear()===yr&&Math.floor(d.getMonth()/3)===q;}
    if(period==="year")return d.getFullYear()===yr;
    return true;
  });
}
function fmtMins(m){if(!m||m===0)return"—";if(m<60)return m+"m";return Math.floor(m/60)+"h"+(m%60?" "+m%60+"m":"");}
function calcEntryVal(e,people){
  const p=(people||[]).find(x=>x.id===e.personId);
  // Use stored rate first, then person's rate (works even if payType missing)
  const rate=e.rate||p?.rate||0;
  return Math.round((rate*(e.minutes||0)/60)*10)/10;
}

        {p.l}</button>
    ))}
  </div>;
}

function DonutChart({segments,size=120,thickness=16,label,sublabel}){
  const vals=segments.filter(s=>s.value>0);
  const total=vals.reduce((s,d)=>s+d.value,0);
  if(!total)return <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",...T.m,fontSize:9,color:C.dim}}>—</div>;
  const r=(size-thickness)/2,cx=size/2,cy=size/2;
  let angle=-Math.PI/2;
  const paths=vals.map(s=>{
    const sweep=(s.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const a2=angle+sweep;
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const d=`M${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r},0,${sweep>Math.PI?1:0},1,${x2.toFixed(2)},${y2.toFixed(2)}`;
    angle=a2;
    return {d,color:s.color};
  });
  return <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
    <svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke={C.s2} strokeWidth={thickness}/>
      {paths.map((p,i)=><path key={i} d={p.d} fill="none" stroke={p.color} strokeWidth={thickness} strokeLinecap="butt"/>)}</svg>
    {label&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
      <div style={{...T.t,fontSize:Math.round(size/8),fontWeight:300,color:C.ivory,lineHeight:1}}>{label}</div>
      {sublabel&&<div style={{...T.m,fontSize:7,color:C.dim,marginTop:1,letterSpacing:"0.08em"}}>{sublabel}</div>}
    </div>}
  </div>;
}

function AreaChart({series,labels,height,chartType="area",barW}){
  const H=height||160;
  const W=600;
  const PAD={t:18,b:28,l:40,r:12};
  const [hover,setHover]=useState(null);
  const n=labels.length;
  const allVals=series.flatMap(s=>s.values);
  const maxV=Math.max(...allVals,1);
  const xc=i=>PAD.l+(i/(Math.max(n-1,1)))*(W-PAD.l-PAD.r);
  const yc=v=>PAD.t+(1-v/maxV)*(H-PAD.t-PAD.b);
  const colW=barW||(W-PAD.l-PAD.r)/(n)*0.7;
  function makePath(vals){
    if(vals.length<2)return "";
    let d="M"+xc(0)+","+yc(vals[0]);
    for(let i=1;i<vals.length;i++){const cx=(xc(i-1)+xc(i))/2;d+=" C"+cx+","+yc(vals[i-1])+" "+cx+","+yc(vals[i])+" "+xc(i)+","+yc(vals[i]);}
    return d;
  }
  function makeArea(vals){const p=makePath(vals);if(!p)return "";return p+" L"+xc(vals.length-1)+","+(H-PAD.b)+" L"+xc(0)+","+(H-PAD.b)+" Z";}
  const fmtK=v=>v>=1000?Math.round(v/1000)+"k":Math.round(v)+"";
  const NSER=series.length;
  const BAR_SLOT=(W-PAD.l-PAD.r)/n;
  return <div style={{position:"relative",width:"100%"}}>
    <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",height:H,display:"block"}} onMouseLeave={()=>setHover(null)}>
      <defs>
        {series.map((s,si)=><linearGradient key={si} id={"ag"+si} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={s.color} stopOpacity={0.22}/>
          <stop offset="100%" stopColor={s.color} stopOpacity={0}/>
        </linearGradient>)}
      </defs>
      {Array.from({length:4},(_,i)=>{
        const v=maxV*(1-i/3);const y=yc(v);
        return <g key={i}>
          <line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="#1e1e1e" strokeWidth={1}/>
          <text x={PAD.l-4} y={y+3} textAnchor="end" fontSize={7} fill="#5c5650">{fmtK(v)}</text>
        </g>;
      })}
      {chartType==="area"&&<>
        {series.map((s,si)=><g key={si}>
          <path d={makeArea(s.values)} fill={"url(#ag"+si+")"} strokeWidth={0}/>
          <path d={makePath(s.values)} fill="none" stroke={s.color} strokeWidth={1.5} strokeLinejoin="round"/>
        </g>)}
        {labels.map((l,i)=><text key={i} x={xc(i)} y={H-PAD.b+11} textAnchor="middle" fontSize={7} fill="#5c5650">{l}</text>)}
        {Array.from({length:n},(_,i)=><rect key={i} x={xc(i)-colW/2} y={PAD.t} width={colW} height={H-PAD.t-PAD.b} fill="transparent" onMouseEnter={()=>setHover(i)}/>)}
      </>}
      {chartType==="bar"&&<>
        {labels.map((l,i)=>{
          const bw=BAR_SLOT/NSER*0.75;
          return <g key={i}>
            <text x={PAD.l+i*BAR_SLOT+BAR_SLOT/2} y={H-PAD.b+11} textAnchor="middle" fontSize={7} fill="#5c5650">{l}</text>
            {series.map((s,si)=>{
              const bx=PAD.l+i*BAR_SLOT+(si-(NSER-1)/2)*bw;
              const bh=Math.max(1,(s.values[i]||0)/maxV*(H-PAD.t-PAD.b));
              return <rect key={si} x={bx-bw/2} y={H-PAD.b-bh} width={bw} height={bh} fill={s.color} opacity={hover===i?1:0.8} rx={1} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>;
            })}
          </g>;
        })}
      </>}
      {chartType==="scatter"&&<>
        {labels.map((l,i)=><text key={i} x={xc(i)} y={H-PAD.b+11} textAnchor="middle" fontSize={7} fill="#5c5650">{l}</text>)}
        {series.map((s,si)=><g key={si}>
          {s.values.map((v,i)=>v>0&&<circle key={i} cx={xc(i)} cy={yc(v)} r={hover===i?4:3} fill={s.color} opacity={0.85} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>)}
          {s.values.map((v,i)=>i>0&&s.values[i-1]>0&&v>0?<line key={i} x1={xc(i-1)} y1={yc(s.values[i-1])} x2={xc(i)} y2={yc(v)} stroke={s.color} strokeWidth={1} strokeOpacity={0.4}/>:null)}
        </g>)}
        {Array.from({length:n},(_,i)=><rect key={i} x={xc(i)-colW/2} y={PAD.t} width={colW} height={H-PAD.t-PAD.b} fill="transparent" onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>)}
      </>}
      {hover!==null&&<g>
        <line x1={chartType==="bar"?PAD.l+hover*BAR_SLOT+BAR_SLOT/2:xc(hover)} y1={PAD.t} x2={chartType==="bar"?PAD.l+hover*BAR_SLOT+BAR_SLOT/2:xc(hover)} y2={H-PAD.b} stroke="#5c5650" strokeWidth={1} strokeDasharray="3,3"/>
        <rect x={Math.min((chartType==="bar"?PAD.l+hover*BAR_SLOT+BAR_SLOT/2:xc(hover))+6,W-110)} y={PAD.t} width={100} height={NSER*16+8} fill="#0f0f0f" stroke="#1e1e1e" strokeWidth={1} rx={3}/>
        {series.map((s,si)=><text key={si} x={Math.min((chartType==="bar"?PAD.l+hover*BAR_SLOT+BAR_SLOT/2:xc(hover))+12,W-104)} y={PAD.t+14+si*16} fontSize={9} fill={s.color}>{s.label+": "+FMT(s.values[hover]||0)}</text>)}
      </g>}
    </svg>
  </div>;
}


function exportAccounting(invoices,incomes,expenses,year){
  const BOM="\uFEFF";
  const rows=[["Datum","Typ","Popis","Castka","Kategorie","Poznámka"]];
  (invoices||[]).filter(i=>(i.issueDate||"").startsWith(String(year))).forEach(i=>{
    rows.push([i.issueDate,"Faktura","Faktura "+(i.number||"")+" - "+(i.clientName||""),
      calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,"Fakturace",i.status||""]);
  });
  (incomes||[]).filter(i=>(i.date||"").startsWith(String(year))).forEach(i=>{
    rows.push([i.date,"Prijem",i.source||"",i.amount,i.category||"",i.note||""]);
  });
  (expenses||[]).filter(e=>(e.date||"").startsWith(String(year))).forEach(e=>{
    rows.push([e.date,"Vydaj",e.supplier||"","-"+(e.amount||0),e.category||"",e.note||""]);
  });
  rows.sort((a,b)=>a[0]>b[0]?1:-1);
  const csv=BOM+rows.map(r=>r.map(v=>'"'+String(v||"").replace(/"/g,'""')+'"').join(";")).join("\r\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="LIBERTI-ucetnictvi-"+year+".csv";
  a.click();
}

function FinanceDashboard({invoices,incomes,timeEntries,expenses,settings,period,setPeriod}){
  const people=settings.people||[];
  const [chartType,setChartType]=useState("area");
  const [chartPeriod,setChartPeriod]=useState("monthly");
  const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  // ── Period filtering ───────────────────────────────────────────────────────
  const pInc=filterByPeriod(incomes||[],"date",period);
  const pExp=filterByPeriod(expenses||[],"date",period);
  const pEntries=filterByPeriod(timeEntries||[],"date",period);
  // ── KPI calculations ───────────────────────────────────────────────────────
  // 1. Plánované příjmy = Koncept + Odesláno invoices
  const plannedInv=filterByPeriod(invoices.filter(i=>["Koncept","Odesláno"].includes(i.status)),"issueDate",period);
  const plannedRev=plannedInv.reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);
  // 2. Fakturované příjmy = Zaplaceno + Odesláno + Po splatnosti
  const billedInv=filterByPeriod(invoices.filter(i=>["Zaplaceno","Odesláno","Po splatnosti"].includes(i.status)),"issueDate",period);
  const billedRev=billedInv.reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);
  // 3. Ostatní příjmy = manual incomes
  const otherRev=pInc.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  // 4. Plánované výdaje = expenses s budoucím datem
  const today=toDay();
  const plannedExp=(expenses||[]).filter(e=>e.date>today);
  const plannedExpTot=filterByPeriod(plannedExp,"date",period).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  // 5. Odečtené výdaje = expenses s dnešním nebo minulým datem
  const spentExp=(expenses||[]).filter(e=>e.date<=today);
  const spentExpTot=filterByPeriod(spentExp,"date",period).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  // 6. Výplaty = non-CEO/Majitel roles
  const nonCeo=people.filter(p=>p.role!=="ceo"&&p.active!==false);
  const payroll=nonCeo.reduce((sum,p)=>{
    if(p.payType==="fixed")return sum+(p.rate||0);
    if(p.payType==="share")return sum+((billedRev*((p.share||0)/100)));
    return sum+pEntries.filter(e=>e.personId===p.id).reduce((s,e)=>s+calcEntryVal(e,[p]),0);
  },0);
  const personStats=people.filter(p=>p.active!==false).map(p=>({
    p,val:pEntries.filter(e=>e.personId===p.id).reduce((s,e)=>s+calcEntryVal(e,people),0),
    mins:pEntries.filter(e=>e.personId===p.id).reduce((s,e)=>s+(e.minutes||0),0)
  })).filter(s=>s.mins>0);
  const donut=personStats.map(s=>({label:s.p.name,value:s.val,color:s.p.color}));
  // ── Chart data ─────────────────────────────────────────────────────────────
  let chartLabels=[];
  let chartInv=[],chartExp=[],chartInc=[];
  if(chartPeriod==="monthly"){
    chartLabels=MO_NAMES;
    chartInv=MO_NAMES.map((_,i)=>{const k=yr+"-"+String(i+1).padStart(2,"0");return invoices.filter(x=>["Zaplaceno","Odesláno"].includes(x.status)&&(x.issueDate||"").startsWith(k)).reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0);});
    chartExp=MO_NAMES.map((_,i)=>{const k=yr+"-"+String(i+1).padStart(2,"0");return (expenses||[]).filter(e=>(e.date||"").startsWith(k)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);});
    chartInc=MO_NAMES.map((_,i)=>{const k=yr+"-"+String(i+1).padStart(2,"0");return (incomes||[]).filter(e=>(e.date||"").startsWith(k)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);});
  } else if(chartPeriod==="weekly"){
    const weeks=12;
    for(let w=weeks-1;w>=0;w--){
      const d=new Date(now);d.setDate(d.getDate()-w*7);
      const d2=new Date(d);d2.setDate(d2.getDate()+6);
      const s=d.toISOString().slice(0,10),e=d2.toISOString().slice(0,10);
      chartLabels.push("T"+(weeks-w));
      chartInv.push(invoices.filter(x=>["Zaplaceno","Odesláno"].includes(x.status)&&(x.issueDate||"")>=s&&(x.issueDate||"")<=e).reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0));
      chartExp.push((expenses||[]).filter(ex=>(ex.date||"")>=s&&(ex.date||"")<=e).reduce((s,e)=>s+(parseFloat(e.amount)||0),0));
      chartInc.push((incomes||[]).filter(ex=>(ex.date||"")>=s&&(ex.date||"")<=e).reduce((s,e)=>s+(parseFloat(e.amount)||0),0));
    }
  } else {
    const days=30;
    for(let d=days-1;d>=0;d--){
      const dt=new Date(now);dt.setDate(dt.getDate()-d);
      const k=dt.toISOString().slice(0,10);
      chartLabels.push(k.slice(5));

function CashflowView({invoices,expenses}){
  const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  const months=Array.from({length:13},(_,i)=>{const d=new Date(yr,mo-6+i,1);return {yr:d.getFullYear(),mo:d.getMonth(),label:MO_NAMES[d.getMonth()]+(d.getFullYear()!==yr?" "+String(d.getFullYear()).slice(2):""),key:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`,future:i>6};});
  const moData=months.map(({key,future})=>({
    inc:invoices.filter(i=>["Zaplaceno","Odesláno"].includes(i.status)&&i.issueDate?.startsWith(key)).reduce((s,i)=>s+calcInv(i.items,i.vatEnabled,i.vatRate,i.discount).tot,0),
    exp:expenses.filter(e=>e.date?.startsWith(key)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0),future
  })).map(d=>({...d,net:d.inc-d.exp}));
  const max=Math.max(...moData.map(d=>Math.max(d.inc,d.exp)),1);
  let running=0;const rows=moData.map(d=>{running+=d.net;return {...d,bal:running};});
  return <div className="anim-fadein">
    <div style={{...T.t,fontSize:26,fontWeight:700,letterSpacing:"0.15em",color:C.ivory,marginBottom:20}}>CASHFLOW</div>
    <Card sx={{padding:"18px 20px",marginBottom:14}}>
      <SH c="Fakturace vs Výdaje — 13 měsíců"/>
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100,marginBottom:6}}>
        {moData.map((d,i)=>{const iH=Math.max(Math.round((d.inc/max)*90),d.inc>0?2:0);const eH=Math.max(Math.round((d.exp/max)*90),d.exp>0?2:0);
          return <div key={i} style={{flex:1,display:"flex",gap:1,alignItems:"flex-end",height:94,opacity:d.future?0.25:1,position:"relative"}}>
            {d.future&&i===7&&<div style={{position:"absolute",top:0,left:-1,bottom:0,borderLeft:`1px dashed ${C.mBorder}`}}/>}
            <div style={{flex:1,height:iH,background:"#3aaa5a",borderRadius:"2px 2px 0 0"}}/><div style={{flex:1,height:eH,background:"#e08040",borderRadius:"2px 2px 0 0"}}/>
          </div>;})}
      </div>
      <div style={{display:"flex",gap:2}}>{months.map((m,i)=><div key={i} style={{flex:1,textAlign:"center",...T.m,fontSize:6.5,color:i===6?C.ivory:C.dim,overflow:"hidden"}}>{m.label}</div>)}</div>
    </Card>
    <Card><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:480}}>
      <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
        {["Měsíc","Fakturace","Výdaje","Saldo","Kumulativní"].map((h,hi)=><th key={h} style={{...T.m,fontSize:8,letterSpacing:"0.1em",textTransform:"uppercase",color:C.dim,padding:"8px 12px",textAlign:hi===0?"left":"right",whiteSpace:"nowrap"}}>{h}</th>)}
      </tr></thead>
      <tbody>{rows.map((d,i)=><tr key={i} style={{borderBottom:i<rows.length-1?`1px solid ${C.border}`:"none",background:i===6?C.s0:"transparent"}}>
        <td style={{...T.m,fontSize:11,color:i===6?C.ivory:C.hi,padding:"9px 12px",whiteSpace:"nowrap"}}>{months[i].label}</td>
        <td style={{...T.t,fontSize:13,fontWeight:300,color:"#3aaa5a",textAlign:"right",padding:"9px 12px"}}>{d.inc>0?FMT(d.inc):"—"}</td>
        <td style={{...T.t,fontSize:13,fontWeight:300,color:"#e08040",textAlign:"right",padding:"9px 12px"}}>{d.exp>0?FMT(d.exp):"—"}</td>
        <td style={{...T.t,fontSize:13,fontWeight:300,color:d.net>=0?"#3aaa5a":"#e04040",textAlign:"right",padding:"9px 12px"}}>{d.net>=0?"+":""}{FMT(d.net)}</td>
        <td style={{...T.t,fontSize:13,fontWeight:300,color:d.bal>=0?C.ivory:"#e04040",textAlign:"right",padding:"9px 12px"}}>{FMT(d.bal)}</td>
      </tr>)}</tbody>
    </table></div></Card>
  </div>;
}

function OutreachView({leads,setLeads,calls,setCalls,settings,confirmFn}){

  const editLead=l=>{setLeadF({...l});setEditLeadId(l.id);setShowLeadForm(true);setShowCallForm(false);};

    const next=editCallId
      ?(calls||[]).map(c=>c.id===editCallId?{...callF}:c)
      :[{...callF,id:uid()},...(calls||[])];
    setCalls(next);
    setCallF(null);setShowCallForm(false);setEditCallId(null);

  const ul=k=>v=>setLeadF(p=>({...p,[k]:v}));
